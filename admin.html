function App(){

  // Eliminar skeleton de carga con fade-out
  useEffect(()=>{
    const sk=document.getElementById('lana-sk');
    if(!sk) return;
    sk.style.transition='opacity .3s ease';
    sk.style.opacity='0';
    setTimeout(()=>sk.remove(),300);
  },[]);
  const [auth,setAuth]=useState(()=>sessionStorage.getItem("be_admin_auth")==="1");
  const [currentUser,setCurrentUser]=useState(()=>{
    try{ return JSON.parse(sessionStorage.getItem("be_admin_user")||"null"); }catch(e){return null;}
  });
  const rol = (currentUser&&currentUser.rol)||"vendedor";
  const esAdmin = rol==="admin";
  const [section,setSection]=useState("dashboard");
  const [sbCollapsed, setSbCollapsed]=useState(()=>localStorage.getItem("sb_collapsed")==="1");
  const [prods,setProds]=useState([]); // Supabase es la fuente — no cargar localStorage contaminado
  const [imgs,setImgs]=useState({});   // las imágenes vienen de Supabase (main_img / imgs)
  const [brands,setBrands]=useState([]); // marcas desde Supabase
  const [activeBrand,setActiveBrand]=useState(loadActive);
  const [cots,setCots]=useState([]); // Supabase es la fuente — no cargar cots de otro tenant

  // No guardamos prods/brands/imgs en localStorage (multi-tenant: Supabase es la fuente)
  // useEffect(()=>saveProds(prods),[prods]); -- removido
  // useEffect(()=>saveBrands(brands),[brands]); -- removido
  useEffect(()=>saveActive(activeBrand),[activeBrand]);
  // saveCots removido: no cachear cotizaciones en localStorage (multi-tenant)

  // Cargar desde Supabase al iniciar sesión
  useEffect(()=>{
    if(auth){
      // Limpiar estado antes de cargar nuevo tenant (evita datos del tenant anterior)
      setProds([]);
      setBrands([]);
      setCots([]);
      // MY_TENANT_ID ya fue asignado por sbInitTenant() antes del onAuth()
      // Solo lo llamamos de nuevo si por alguna razón no está disponible
      if(MY_TENANT_ID){
        sbInit(setProds, setBrands, setCots, setImgs);
      } else {
        sbInitTenant().then(function(tid){
          if(!tid) return;
          sbInit(setProds, setBrands, setCots, setImgs);
        });
      }
    }
  },[auth]);

  // Recargar cotizaciones cuando otra pestaña (configurador) las modifica
  useEffect(()=>{
    const onStorage = (e)=>{
      if(e.key==="be_cotizaciones"){
        try{ setCots(JSON.parse(e.newValue||"[]")); }catch(e){}
      }
    };
    window.addEventListener("storage", onStorage);
    return ()=>{window.removeEventListener("storage",onStorage);};
  },[]);

  // Sincronizar escalas cuando se edita una regla — vive en App (siempre montado)
  useEffect(()=>{
    const onReglaUpdated = (e)=>{
      const reglaId = e.detail && e.detail.reglaId;
      const escalasNuevas = e.detail && e.detail.escalas;
      if(!reglaId || !escalasNuevas || !sb) return;
      sb.from("productos").select("id")
        .eq("tenant_id", MY_TENANT_ID)
        .eq("regla_precio_id", reglaId)
        .then(function(res){
          if(!res.data || !res.data.length) return;
          const ids = res.data.map(function(r){ return Number(r.id); });
          setProds(function(prev){
            return prev.map(function(p){
              return ids.indexOf(Number(p.id))!==-1
                ? {...p, escalas:escalasNuevas, reglaPrecioId:reglaId}
                : p;
            });
          });
        });
    };
    window.addEventListener("lana:regla_updated", onReglaUpdated);
    return ()=>window.removeEventListener("lana:regla_updated", onReglaUpdated);
  },[]);

  // Sincronizar campos de línea a productos vinculados (mat, desc, tags, cat, shapeCat)
  useEffect(()=>{
    const onLineaUpdated = (e)=>{
      const d = e.detail;
      if(!d || !d.marcaId || !d.lineaNombre || !sb) return;
      // Buscar productos de esta marca y línea
      sb.from("productos").select("id,mat,desc_txt,tags,cat,shape_cat")
        .eq("tenant_id", MY_TENANT_ID)
        .eq("brand", d.marcaId)
        .eq("linea", d.lineaNombre)
        .then(function(res){
          if(!res.data || !res.data.length) return;
          const ids = res.data.map(function(r){ return Number(r.id); });
          // Actualizar en memoria solo los campos que cambiaron
          setProds(function(prev){
            return prev.map(function(p){
              if(ids.indexOf(Number(p.id))===-1) return p;
              var upd = {...p};
              if(d.mat      !== null) upd.mat      = d.mat;
              if(d.desc     !== null) upd.desc     = d.desc;
              if(d.tags     !== null) upd.tags     = d.tags;
              if(d.cat      !== null) upd.cat      = d.cat;
              if(d.shapeCat !== null) upd.shapeCat = d.shapeCat;
              return upd;
            });
          });
          // Persistir en Supabase los campos que cambiaron
          var patch = {};
          if(d.mat      !== null) patch.mat       = d.mat;
          if(d.desc     !== null) patch.desc_txt  = d.desc;
          if(d.tags     !== null) patch.tags       = d.tags;
          if(d.cat      !== null) patch.cat        = d.cat;
          if(d.shapeCat !== null) patch.shape_cat  = d.shapeCat;
          if(Object.keys(patch).length > 0){
            sb.from("productos").update(patch)
              .eq("tenant_id", MY_TENANT_ID)
              .eq("brand", d.marcaId)
              .eq("linea", d.lineaNombre)
              .then(function(r){ if(r.error) console.error("linea_updated patch:", r.error); });
          }
        });
    };
    window.addEventListener("lana:linea_updated", onLineaUpdated);
    return ()=>window.removeEventListener("lana:linea_updated", onLineaUpdated);
  },[]);

  const sinLeer = useMemo(()=>cots.filter(c=>!c.leida).length,[cots]);

  const handleAuth=(user)=>{
    sessionStorage.setItem("be_admin_auth","1");
    sessionStorage.setItem("be_admin_user",JSON.stringify(user));
    setCurrentUser(user);
    setAuth(true);
  };
  const handleLogout=()=>{
    sessionStorage.removeItem("be_admin_auth");
    sessionStorage.removeItem("be_admin_user");
    setCurrentUser(null);
    setAuth(false);
    MY_TENANT_ID = null;
    if(sb) sb.auth.signOut().catch(e=>console.warn("signOut",e));
  };

  if(!auth) return(
    <div>
      <nav>
        <div></div>
        <div className="nr"><a href="index.html" className="btn-n">← Sitio</a></div>
      </nav>
      <Login onAuth={handleAuth}/>
    </div>
  );

  return(
    <div>
      <nav>
        <a className="nl" href="index.html" style={{display:"flex",alignItems:"center",gap:"8px"}}>
          <img src="https://lgjdzaqjrmmzyrenevfm.supabase.co/storage/v1/object/public/Logo%20Lana/LANACLARO.png" alt="LANA" style={{height:"22px",display:"block",opacity:.5}}/>
          {MY_TENANT_NOMBRE&&<span style={{fontFamily:"var(--fh)",fontSize:"15px",fontWeight:900,color:"#0C0C14",letterSpacing:".5px",textTransform:"uppercase"}}>{MY_TENANT_NOMBRE}</span>}
        </a>
        <div className="nr">
          {currentUser&&<span style={{fontSize:"12px",color:"#666",fontFamily:"var(--fh)",fontWeight:700}}>
            {currentUser.nombre} · <span style={{color:esAdmin?"#f66":"#60a0ff",textTransform:"uppercase"}}>{rol}</span>
          </span>}
          <a href={"catalogo.html?tenant="+(MY_TENANT_ID||"")} target="_blank" className="btn-n">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Catálogo
          </a>
          <a href="configurador.html" target="_blank" className="btn-n">Configurador</a>
          <button id="lana-theme-btn" className="btn-n"
            onClick={function(){ window.lanaToggleTheme && window.lanaToggleTheme(); }}
            title="Cambiar modo claro/oscuro">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button className="btn-n" onClick={handleLogout} role="button">Salir →</button>
        </div>
      </nav>
      <div className={`layout${sbCollapsed?" sb-collapsed":""}`}>
        <div className="sidebar" style={{padding:"10px 8px 16px",position:"relative"}}>
          {/* Botón toggle */}
          <div className="sb-toggle" onClick={()=>{ const v=!sbCollapsed; setSbCollapsed(v); localStorage.setItem("sb_collapsed",v?"1":"0"); }}
            title={sbCollapsed?"Expandir menú":"Colapsar menú"}>
            {sbCollapsed?"▶":"◀"}
          </div>
          {/* Logo mini cuando está colapsado */}
          {sbCollapsed&&<div style={{display:"flex",justifyContent:"center",marginBottom:"6px",marginTop:"32px"}}>
            <div style={{width:"30px",height:"30px",background:"var(--red)",borderRadius:"6px",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--fh)",fontSize:"11px",fontWeight:900,color:"white"}}>
              {MY_TENANT_NOMBRE?MY_TENANT_NOMBRE[0].toUpperCase():"P"}
            </div>
          </div>}
          {!sbCollapsed&&<div style={{marginBottom:"8px",marginTop:"32px",padding:"0 4px"}} className="sb-logo-text">
            <div style={{fontFamily:"var(--fh)",fontSize:"13px",fontWeight:900,color:"#0C0C14",textTransform:"uppercase",letterSpacing:".5px"}}>{MY_TENANT_NOMBRE||"Panel"}</div>
          </div>}
          <div className="sb-lbl">Inventario</div>
          <div className={`sb-item${section==="dashboard"?" active":""}`} onClick={()=>setSection("dashboard")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span className="sb-txt">Dashboard</span>
          </div>
          <div className={`sb-item${section==="productos"?" active":""}`} onClick={()=>setSection("productos")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span className="sb-txt">Catálogo de prendas</span>
          </div>

          <div className="sb-bd"></div>
          <div className="sb-lbl">Operaciones</div>
          <div className={`sb-item${section==="clientes"?" active":""}`} onClick={()=>setSection("clientes")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg><span className="sb-txt">Clientes</span>
          </div>
          <div className={`sb-item${section==="inventario"?" active":""}`} onClick={()=>setSection("inventario")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg><span className="sb-txt">Inventario</span>
          </div>
          <div className={`sb-item${section==="cotizaciones"?" active":""}`} onClick={()=>setSection("cotizaciones")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg><span className="sb-txt">Cotizaciones</span>
            {sinLeer>0 && <span className="sb-badge">{sinLeer}</span>}
          </div>
          <div className={`sb-item${section==="ordenes_trabajo"?" active":""}`} onClick={()=>setSection("ordenes_trabajo")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span className="sb-txt">Órdenes de Trabajo</span>
          </div>
          <div className={`sb-item${section==="pagos"?" active":""}`} onClick={()=>setSection("pagos")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span className="sb-txt">Pagos</span>
          </div>
          <div className={`sb-item${section==="surtido"?" active":""}`} onClick={()=>setSection("surtido")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg><span className="sb-txt">Órdenes de Compra</span>
          </div>
          <div className={`sb-item${section==="produccion"?" active":""}`} onClick={()=>setSection("produccion")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span className="sb-txt">Producción / Workflow</span>
          </div>

          <div className="sb-bd"></div>
          <div className="sb-lbl">Sistema</div>
          <div className={`sb-item${section==="arte"?" active":""}`} onClick={()=>setSection("arte")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c.28 0 .5-.22.5-.5 0-.16-.08-.28-.14-.35-.41-.46-.63-1.05-.63-1.65 0-1.38 1.12-2.5 2.5-2.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/></svg><span className="sb-txt">Reglas de Arte</span>
          </div>
          <div className={`sb-item${section==="ia_config"?" active":""}`} onClick={()=>setSection("ia_config")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 12h10M12 7v10"/></svg><span className="sb-txt">Capacitar IA</span>
          </div>
          <div className={`sb-item${section==="config"?" active":""}`} onClick={()=>setSection("config")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M4.93 19.07l1.41-1.41M19.07 19.07l-1.41-1.41M12 2v2M12 20v2M2 12h2M20 12h2"/></svg><span className="sb-txt">Configuración</span>
          </div>
          <div className={`sb-item${section==="respaldos"?" active":""}`} onClick={()=>setSection("respaldos")}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg><span className="sb-txt">Respaldos</span>
          </div>
        </div>
        <div className="adm-main">
          {section==="dashboard"&&<Dashboard cots={cots} prods={prods} setSection={setSection}/>}
          {section==="productos"&&<Productos prods={prods} setProds={setProds} imgs={imgs} setImgs={setImgs}
             brands={brands} setBrands={setBrands} activeBrand={activeBrand} setActiveBrand={setActiveBrand}/>}
          {section==="cotizaciones"&&<Cotizaciones cots={cots} setCots={setCots} prods={prods} brands={brands} esAdmin={esAdmin} imgs={imgs}/>}
          {section==="ordenes_trabajo"&&<OrdenesTrabajo/>}
          {section==="pagos"&&(
            <div style={{margin:"-20px -24px",height:"calc(100vh - 56px)"}}>
              <iframe src="pagos.html" style={{width:"100%",height:"100%",border:"none"}} title="Pagos"/>
            </div>
          )}
          {section==="surtido"&&<OrdenesSurtido/>}
          {section==="pedidos"&&<PedidosPage/>}
          {section==="calendario"&&<CalendarioPage/>}
          {section==="ordenes"&&<OrdenesPage/>}
          {section==="importar"&&<ImportadorFotos prods={prods} brands={brands} imgs={imgs} setImgs={setImgs}/>}
          {section==="arte"&&<ArteConfig/>}
          {section==="ia_config"&&<IAConfig/>}
          {section==="config"&&<ConfiguracionPage esAdmin={esAdmin} brands={brands} setBrands={setBrands} prods={prods}/>}
          {section==="apariencia"&&<ThemeEditor/>}
          {section==="respaldos"&&<BackupTab prods={prods} imgs={imgs} brands={brands} cots={cots}
             setProds={setProds} setImgs={setImgs} setBrands={setBrands} setCots={setCots}/>}
          {section==="clientes"&&(
            <div style={{margin:"-20px -24px",height:"calc(100vh - 56px)"}}>
              <iframe src="clientes.html" style={{width:"100%",height:"100%",border:"none"}} title="Clientes CRM"/>
            </div>
          )}
          {section==="inventario"&&<Inventario prods={prods} imgs={imgs}/>}
          {section==="produccion"&&(
            <div style={{margin:"-20px -24px",height:"calc(100vh - 56px)"}}>
              <iframe src="flowshop.html" style={{width:"100%",height:"100%",border:"none"}} title="Producción FlowShop"/>
            </div>
          )}
        </div>
      </div>

      {/* ── BOTTOM NAV MÓVIL ── */}
      <nav className="mob-bottom-nav">
        <button className={`mob-tab${section==="dashboard"?" active":""}`} onClick={()=>setSection("dashboard")}>
          <span className="mob-tab-icon">🏠</span>
          <span>Inicio</span>
        </button>
        <button className={`mob-tab${section==="cotizaciones"?" active":""}`} onClick={()=>setSection("cotizaciones")} style={{position:"relative"}}>
          <span className="mob-tab-icon">📋</span>
          <span>Cots.</span>
          {sinLeer>0&&<span className="mob-tab-badge">{sinLeer}</span>}
        </button>
        <button className={`mob-tab${section==="ordenes_trabajo"?" active":""}`} onClick={()=>setSection("ordenes_trabajo")}>
          <span className="mob-tab-icon">📝</span>
          <span>OTs</span>
        </button>
        <button className={`mob-tab${section==="clientes"?" active":""}`} onClick={()=>setSection("clientes")}>
          <span className="mob-tab-icon">👥</span>
          <span>Clientes</span>
        </button>
        <button className={`mob-tab${(section==="config"||section==="productos"||section==="arte"||section==="ia_config"||section==="respaldos"||section==="pagos"||section==="surtido"||section==="produccion")?" active":""}`}
          onClick={()=>setSection("mob_menu")}>
          <span className="mob-tab-icon">☰</span>
          <span>Más</span>
        </button>
      </nav>

      {/* ── FAB nueva cotización ── */}
      {section==="cotizaciones"&&(
        <button className="mob-fab" title="Nueva cotización"
          onClick={()=>{ const ev=new CustomEvent("lana:nueva_cot"); window.dispatchEvent(ev); }}>
          +
        </button>
      )}

      {/* ── MENÚ MÓVIL "Más" ── */}
      {section==="mob_menu"&&(
        <div style={{padding:"16px 14px 80px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"10px",background:"#FFFFFF",borderRadius:"10px",padding:"12px 14px",marginBottom:"16px",border:"1px solid #E4E4EE"}}>
            <div style={{width:"36px",height:"36px",background:"#6B3FC8",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"13px",color:"white",fontWeight:900,fontFamily:"var(--fh)"}}>
              {currentUser&&currentUser.nombre?currentUser.nombre[0].toUpperCase():"U"}
            </div>
            <div>
              <div style={{fontFamily:"var(--fh)",fontSize:"14px",fontWeight:900,color:"#0C0C14"}}>{(currentUser&&currentUser.nombre)||"Usuario"}</div>
              <div style={{fontSize:"11px",color:"#888"}}>{esAdmin?"Admin":"Operador"} · {MY_TENANT_NOMBRE}</div>
            </div>
          </div>
          {[
            {icon:"📦",label:"Catálogo de prendas",sec:"productos"},
            {icon:"💰",label:"Pagos",sec:"pagos"},
            {icon:"📦",label:"Órdenes de Compra",sec:"surtido"},
            {icon:"🏭",label:"Producción / Workflow",sec:"produccion"},
            {icon:"🎨",label:"Reglas de Arte",sec:"arte"},
            {icon:"🤖",label:"Capacitar IA",sec:"ia_config"},
            {icon:"⚙️",label:"Configuración",sec:"config"},
            {icon:"💾",label:"Respaldos",sec:"respaldos"},
          ].map(it=>(
            <div key={it.sec} onClick={()=>setSection(it.sec)}
              style={{background:"#FFFFFF",border:"1px solid #E4E4EE",borderRadius:"9px",padding:"12px 14px",marginBottom:"6px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer"}}>
              <span style={{fontSize:"18px"}}>{it.icon}</span>
              <span style={{fontFamily:"var(--fh)",fontSize:"14px",fontWeight:700,color:"#0C0C14",flex:1}}>{it.label}</span>
              <span style={{color:"#ccc",fontSize:"14px"}}>›</span>
            </div>
          ))}
          <div onClick={handleLogout}
            style={{background:"#FFF0F0",border:"1px solid #FFD0D0",borderRadius:"9px",padding:"12px 14px",marginTop:"8px",display:"flex",alignItems:"center",gap:"12px",cursor:"pointer"}}>
            <span style={{fontSize:"18px"}}>🚪</span>
            <span style={{fontFamily:"var(--fh)",fontSize:"14px",fontWeight:700,color:"#E24B4A"}}>Cerrar sesión</span>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* == DESIGN TOKENS == */
:root{
  --red:var(--lana-purple);--rdk:var(--lana-purple-dk);
  --blk:var(--bg-page);--g1:var(--bg-card);--g2:var(--bg-muted);--g3:var(--border);
  --lt:var(--text-primary);--mt:var(--text-secondary);
  --fh:var(--font-display);--fb:var(--font-body);
  --c-bg:#FAFAFC;--c-surface:#FFFFFF;--c-surface2:#F4F4F8;--c-surface3:#ECEDF4;
  --c-border:#E2E2EE;--c-border2:#CCCCE0;
  --c-text:#0C0C18;--c-text2:#4A4A62;--c-text3:#8A8AA8;
  --c-purple:#7C3AED;--c-purple-dk:#6028CC;--c-purple-lt:#8B5CF6;
  --c-purple-bg:rgba(124,58,237,.08);--c-purple-bd:rgba(124,58,237,.22);--c-purple-glow:rgba(124,58,237,.30);
  --c-success:#16a34a;--c-success-bg:rgba(22,163,74,.09);--c-success-bd:rgba(22,163,74,.25);
  --c-danger:#dc2626;--c-danger-bg:rgba(220,38,38,.08);--c-danger-bd:rgba(220,38,38,.22);
  --c-warning:#b45309;--c-warning-bg:rgba(180,83,9,.09);--c-warning-bd:rgba(180,83,9,.25);
  --c-info:#1d4ed8;--c-info-bg:rgba(29,78,216,.08);--c-info-bd:rgba(29,78,216,.22);
  --r-xs:4px;--r-sm:6px;--r-md:8px;--r-lg:10px;--r-xl:14px;--r-2xl:18px;
  --sh-sm:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --sh-lg:0 8px 30px rgba(0,0,0,.10),0 4px 8px rgba(0,0,0,.04);
  --tr:.18s ease;
}
[data-theme="dark"]{
  --c-bg:#0C0C14;--c-surface:#18182a;--c-surface2:#1E1E30;--c-surface3:#252538;
  --c-border:rgba(255,255,255,.09);--c-border2:rgba(255,255,255,.16);
  --c-text:#F0F0F8;--c-text2:#9898B0;--c-text3:#5A5A7A;
  --c-purple:#8B5CF6;--c-purple-dk:#7C3AED;--c-purple-lt:#a78bfa;
  --c-purple-bg:rgba(139,92,246,.12);--c-purple-bd:rgba(139,92,246,.28);--c-purple-glow:rgba(139,92,246,.35);
  --c-success:#4ade80;--c-success-bg:rgba(74,222,128,.08);--c-success-bd:rgba(74,222,128,.22);
  --c-danger:#f87171;--c-danger-bg:rgba(248,113,113,.08);--c-danger-bd:rgba(248,113,113,.22);
  --c-warning:#fbbf24;--c-warning-bg:rgba(251,191,36,.09);--c-warning-bd:rgba(251,191,36,.26);
  --c-info:#93c5fd;--c-info-bg:rgba(147,197,253,.08);--c-info-bd:rgba(147,197,253,.22);
  --sh-sm:0 1px 4px rgba(0,0,0,.35);--sh-md:0 4px 12px rgba(0,0,0,.45);--sh-lg:0 8px 30px rgba(0,0,0,.55);
}
body{font-family:var(--fb);background:var(--c-bg);color:var(--c-text);min-height:100vh;transition:background var(--tr),color var(--tr)}

/* == TOOLBAR INPUTS == */
.si{flex:1;min-width:200px;padding:9px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-md);color:var(--c-text);font-size:13px;outline:none;transition:border-color var(--tr),box-shadow var(--tr);font-family:var(--fb)}
.si:focus{border-color:var(--c-purple);box-shadow:0 0 0 3px var(--c-purple-bg)}
.as{padding:9px 12px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-md);color:var(--c-text);font-size:13px;outline:none;cursor:pointer;transition:border-color var(--tr);font-family:var(--fb)}
.as:focus,.as:hover{border-color:var(--c-purple)}
.tb-btn{padding:8px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-md);color:var(--c-text2);font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all var(--tr);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.tb-btn:hover{background:var(--c-surface2);border-color:var(--c-purple-bd);color:var(--c-purple)}
.tb-btn.active{background:var(--c-purple-bg);border-color:var(--c-purple-bd);color:var(--c-purple);font-weight:800}

/* == STAT CARDS == */
.stat-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-xl);padding:18px 20px;box-shadow:var(--sh-sm);transition:transform var(--tr),box-shadow var(--tr);position:relative;overflow:hidden;cursor:default}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--c-purple),var(--c-purple-lt));opacity:.7}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
.stat-num{font-family:var(--fh);font-size:36px;font-weight:900;color:var(--c-purple);line-height:1;margin:10px 0 3px;letter-spacing:-1px}
.stat-lbl{font-family:var(--fh);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--c-text3)}
.stat-sub{font-size:12px;color:var(--c-text3);margin-top:4px}
.stat-num{font-family:var(--fh);font-size:34px;font-weight:900;color:var(--c-purple);line-height:1;margin:8px 0 4px}
.stat-lbl{font-family:var(--fh);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--c-text3)}
.stat-sub{font-size:11px;color:var(--c-text3);margin-top:3px}

/* == COT LIST == */
.cot-row-mini{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);margin-bottom:4px;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr);position:relative;overflow:hidden}
.cot-row-mini:hover{border-color:var(--c-purple-bd);box-shadow:var(--sh-md)}
.cot-row-mini.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--c-purple)}
.cot-folio{font-family:var(--fh);font-size:11px;font-weight:900;color:var(--c-purple);text-transform:uppercase;letter-spacing:.5px}
.cot-cliente-nom{font-size:14px;color:var(--c-text);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cot-cliente-emp{font-size:11px;color:var(--c-text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cot-piezas{font-family:var(--fh);font-size:18px;font-weight:900;color:var(--c-text);text-align:center;min-width:50px}
.cot-piezas-lbl{font-size:9px;color:var(--c-text3);font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cot-fecha{font-size:11px;color:var(--c-text3);text-align:right;min-width:80px;line-height:1.4}

/* == STATUS BADGES == */
.cot-estado{padding:4px 12px;border-radius:20px;font-family:var(--fh);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border:1.5px solid transparent}
.cot-estado.nueva{background:var(--c-purple-bg);color:var(--c-purple);border-color:var(--c-purple-bd)}
.cot-estado.en_proceso{background:var(--c-info-bg);color:var(--c-info);border-color:var(--c-info-bd)}
.cot-estado.cotizada{background:var(--c-warning-bg);color:var(--c-warning);border-color:var(--c-warning-bd)}
.cot-estado.ganada{background:var(--c-success-bg);color:var(--c-success);border-color:var(--c-success-bd)}
.cot-estado.perdida{background:var(--c-danger-bg);color:var(--c-danger);border-color:var(--c-danger-bd)}

/* == MODAL == */
.modal-box{background:var(--c-surface);border-radius:var(--r-2xl);box-shadow:var(--sh-lg),0 0 0 1px var(--c-border);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--c-border);display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.modal-foot{padding:14px 24px;border-top:1px solid var(--c-border);background:var(--c-surface2);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

/* == DARK MODE OVERRIDES == */
[data-theme="dark"] select,[data-theme="dark"] input:not([type="checkbox"]):not([type="radio"]):not([type="color"]),[data-theme="dark"] textarea{background:var(--c-surface2)!important;border-color:var(--c-border)!important;color:var(--c-text)!important}
[data-theme="dark"] select option{background:var(--c-surface2);color:var(--c-text)}
[data-theme="dark"] .si,[data-theme="dark"] .as{background:var(--c-surface2);border-color:var(--c-border);color:var(--c-text)}
[data-theme="dark"] .stat-card{background:var(--c-surface)}
[data-theme="dark"] .cot-row{background:var(--c-surface)}
[data-theme="dark"] .group-card,[data-theme="dark"] .grupo-box{background:var(--c-surface2);border-color:var(--c-border)}
[data-theme="dark"] .zona-chip{background:var(--c-surface3);border-color:var(--c-border)}
[data-theme="dark"] .var-pricing{background:var(--c-surface2);border-color:var(--c-border)}
[data-theme="dark"] .escala-box{background:var(--c-surface2);border-color:var(--c-border)}
[data-theme="dark"] .escala-inp{background:var(--c-surface3);border-color:var(--c-border);color:var(--c-text)}
[data-theme="dark"] .bulk-drop{border-color:var(--c-purple-bd);background:var(--c-purple-bg)}
[data-theme="dark"] .bulk-stat{background:var(--c-surface2)}
[data-theme="dark"] .modal-foot{background:var(--c-surface2);border-top-color:var(--c-border)}
[data-theme="dark"] .inv-row:hover,[data-theme="dark"] .client-row:hover{background:var(--c-surface2)}
[data-theme="dark"] .prenda-img-wrap{background:var(--c-surface2)}

/* == SCROLLBAR == */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-border2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--c-text4)}
*{scrollbar-width:thin;scrollbar-color:var(--c-border2) transparent}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:var(--c-surface);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:54px;border-bottom:1px solid var(--c-border);box-shadow:0 1px 12px rgba(0,0,0,.06)}
.nl{font-family:var(--fh);font-size:18px;font-weight:900;color:var(--lt);text-decoration:none;display:flex;align-items:center;gap:10px}
.nb{background:var(--red);color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:2px;letter-spacing:1px;text-transform:uppercase}
.nr{display:flex;gap:8px;align-items:center}
.btn-n{background:none;border:1.5px solid var(--c-border);color:var(--c-text2);font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 13px;border-radius:5px;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block}
.btn-n:hover{background:var(--c-surface2);color:var(--c-text)}

/* LOGIN */
.login-wrap{min-height:calc(100vh - 54px);display:flex;align-items:center;justify-content:center;background:var(--c-surface2);padding:20px;background:radial-gradient(circle at top,rgba(124,58,237,.08),transparent 60%)}
.login-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:14px;padding:38px;max-width:380px;width:100%;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.5)}
.login-title{font-family:var(--fh);font-size:28px;font-weight:900;text-transform:uppercase;color:var(--c-text);margin-bottom:6px}
.login-sub{color:var(--c-text2);font-size:13px;margin-bottom:24px}
.lf{text-align:left;margin-bottom:14px}
.lf-lbl{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--c-text3);margin-bottom:5px;display:block}
.li{width:100%;padding:11px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:7px;color:var(--c-text);font-size:14px;outline:none;transition:border-color .2s}
.li:focus{border-color:var(--red)}
.login-btn{width:100%;padding:11px;background:var(--red);color:white;border:none;border-radius:7px;font-family:var(--fh);font-size:15px;font-weight:900;text-transform:uppercase;cursor:pointer;letter-spacing:.5px;margin-top:8px}
.login-btn:hover{background:var(--rdk)}
.login-err{color:#f66;font-size:12px;margin-bottom:6px}

/* LAYOUT */
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 54px);transition:grid-template-columns .2s ease}
.layout.sb-collapsed{grid-template-columns:52px 1fr}
.sidebar{background:var(--c-surface2);border-right:1px solid var(--c-border);overflow:hidden;position:relative;transition:width .2s ease}
.sb-toggle{position:absolute;top:10px;right:8px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;color:var(--c-text2);font-size:13px;transition:all .15s;border:1px solid transparent;z-index:10}
.sb-toggle:hover{background:var(--c-surface2);color:var(--c-text2);border-color:var(--c-border)}
.sb-txt{transition:opacity .15s,width .15s;white-space:nowrap;overflow:hidden}
.sb-collapsed .sidebar .sb-txt{opacity:0;width:0;display:none}
.sb-collapsed .sidebar .sb-lbl{opacity:0;height:0;margin:0;padding:0;overflow:hidden;pointer-events:none}
.sb-collapsed .sidebar .sb-bd{margin:4px 8px}
.sb-collapsed .sidebar .sb-item{padding:10px;justify-content:center;gap:0}
.sb-collapsed .sidebar .sb-badge{display:none}
.sb-collapsed .sidebar .sb-item.active{border-left:none;padding-left:10px;border-radius:7px}
.sb-collapsed .sb-logo-text{display:none}
.sidebar{background:var(--c-surface2);border-right:1px solid var(--c-border);padding:18px 12px}
.sb-lbl{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--c-text3);text-transform:uppercase;padding:6px 10px;margin-top:8px}
.sb-item{padding:10px 12px;border-radius:7px;cursor:pointer;transition:all .15s;font-size:13px;color:var(--c-text2);display:flex;align-items:center;gap:9px}
.sb-item:hover{background:rgba(124,58,237,.06);color:var(--c-text)}
.sb-item.active{background:rgba(124,58,237,.12);color:var(--c-purple);border-left:3px solid var(--c-purple);padding-left:9px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(124,58,237,.08)}
.sb-bd{height:1px;background:var(--c-border);margin:8px 4px}
.adm-main{padding:24px 28px;overflow-y:auto;max-height:calc(100vh - 54px);background:var(--c-surface2)}

/* HEADER */
.adm-title{font-family:var(--fh);font-size:28px;font-weight:900;text-transform:uppercase;color:var(--c-text);margin-bottom:3px;letter-spacing:-.5px}
.adm-sub{color:var(--c-text2);font-size:13px;margin-bottom:18px}

/* MARCA SELECTOR */
.brand-bar{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand-bar-lbl{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--c-text3)}
.brand-pill{padding:7px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:7px;color:var(--c-text2);font-family:var(--fh);font-weight:800;font-size:13px;text-transform:uppercase;cursor:pointer;transition:all .15s;letter-spacing:.5px;display:flex;align-items:center;gap:7px}
.brand-pill:hover{border-color:var(--c-purple);color:var(--c-purple)}
.brand-pill.active{background:rgba(124,58,237,.12);border-color:var(--red);color:var(--red)}
.brand-pill .br-cnt{background:var(--c-surface2);font-size:10px;padding:1px 6px;border-radius:9px;font-weight:700}
.brand-pill.active .br-cnt{background:rgba(124,58,237,.2);color:var(--c-purple)}
.brand-pill .br-x{background:none;border:none;color:var(--c-text2);cursor:pointer;font-size:12px;padding:0;margin-left:3px;line-height:1}
.brand-pill .br-x:hover{color:#f66}
.brand-pill .br-edit{background:none;border:none;color:var(--c-text2);cursor:pointer;font-size:12px;padding:0;margin-left:2px;line-height:1}
.brand-pill .br-edit:hover{color:#9bf}
.brand-pill.off{opacity:.45}
.brand-pill.off.active{opacity:.7}
.br-tog{width:26px;height:14px;border-radius:8px;background:#333;position:relative;cursor:pointer;flex-shrink:0;transition:background .15s}
.br-tog.on{background:#4a8}
.br-tog::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;background:white;border-radius:50%;transition:left .15s}
.br-tog.on::after{left:14px}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.si{flex:1;min-width:200px;padding:10px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:8px;color:var(--c-text);font-size:13px;outline:none;transition:border-color .2s}
.si:focus{border-color:var(--red)}
.as{padding:9px 13px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:var(--r-md);color:var(--c-text);font-size:13px;font-family:var(--fb);outline:none;cursor:pointer;appearance:none;transition:border-color var(--tr)}
.as:focus,.as:hover{border-color:var(--c-purple);outline:none}
.tb-btn{padding:9px 14px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:7px;color:var(--c-text2);font-family:var(--fh);font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;letter-spacing:.5px;transition:all .15s}
.tb-btn:hover{border-color:var(--c-purple);color:var(--c-purple)}
.tb-btn.red{background:var(--c-purple);border-color:var(--c-purple);color:white}
.tb-btn.red:hover{background:var(--c-purple-dk);border-color:var(--c-purple-dk)}
.tb-btn.green{background:var(--c-success-bg);border-color:#86efac;color:#166534}
.tb-btn.green:hover{background:var(--c-success-bg)}
.tb-btn.blue{background:var(--c-surface2);border-color:var(--c-border);color:var(--c-text2)}
.tb-btn.blue:hover{background:var(--c-surface2);color:var(--c-text)}

/* PROD GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.prod-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s}
.prod-card:hover{border-color:var(--c-purple);transform:translateY(-2px);box-shadow:0 8px 22px rgba(124,58,237,.12)}
.prod-img-wrap{aspect-ratio:1;background:var(--c-surface2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border-bottom:1px solid var(--c-border)}
.prod-img-wrap img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
.prod-img-empty{font-size:48px;color:var(--c-text)}
.prod-img-count{position:absolute;bottom:6px;right:6px;background:rgba(12,12,20,.7);color:#FFFFFF;font-family:var(--fh);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.prod-card-body{padding:11px 13px}
.prod-card-name{font-family:var(--fh);font-size:15px;font-weight:900;text-transform:uppercase;color:var(--c-text);line-height:1.1;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prod-card-cat{color:var(--c-text2);font-size:11px;margin-bottom:6px}
.prod-card-stats{display:flex;flex-wrap:wrap;gap:5px}
.prod-stat{font-family:var(--fh);font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:3px;letter-spacing:.4px}
.prod-stat.active{background:rgba(80,180,80,.15);color:#7d7}
.prod-stat.inactive{background:rgba(150,150,150,.15);color:var(--c-text3)}
.prod-stat:not(.active):not(.inactive){background:var(--c-surface2);color:var(--c-text3)}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(4px);overflow-y:auto}
.modal-box{background:var(--c-surface);border:1px solid var(--c-border);border-radius:13px;width:100%;max-width:920px;max-height:96vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--c-border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-ttl{font-family:var(--fh);font-size:22px;font-weight:900;text-transform:uppercase;color:var(--c-text)}
.modal-x{background:none;border:1.5px solid var(--c-border);color:var(--c-text2);width:32px;height:32px;border-radius:7px;cursor:pointer;font-size:13px}
.modal-x:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:18px 22px;flex:1;overflow-y:auto}
.modal-footer{padding:14px 22px;border-top:1px solid var(--c-border);display:flex;justify-content:flex-end;gap:9px;flex-shrink:0}

/* TABS */
.mtabs{display:flex;gap:3px;margin-bottom:18px;background:var(--c-surface2);padding:4px;border-radius:8px;border:1px solid var(--c-border);overflow-x:auto}
.mtab{padding:9px 13px;background:transparent;border:none;border-radius:5px;color:var(--c-text2);font-family:var(--fh);font-size:12px;font-weight:800;text-transform:uppercase;cursor:pointer;letter-spacing:.4px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.mtab:hover{color:var(--c-text)}
.mtab.active{background:var(--red);color:white}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--c-text3)}
.ai{padding:9px 12px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:6px;color:var(--c-text);font-family:var(--fb);font-size:13px;outline:none;transition:border-color .2s;width:100%;font-family:inherit}
.ai:focus{border-color:var(--red)}
textarea.ai{resize:vertical;min-height:60px}

/* TAGS */
.tag-list{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:var(--c-surface2);border:1.5px solid var(--c-border);border-radius:7px;min-height:42px;align-items:center}
.tag-chip{padding:5px 10px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:14px;color:var(--c-purple);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px}
.tag-chip-x{background:none;border:none;color:var(--c-purple);cursor:pointer;font-size:11px;padding:0;line-height:1;opacity:.7}
.tag-chip-x:hover{opacity:1;color:#fff}
.tag-add{padding:5px 10px;background:transparent;border:1.5px dashed var(--c-border);border-radius:14px;color:var(--c-text3);font-size:12px;outline:none;flex:1;min-width:100px}
.tag-add:focus{border-color:var(--c-purple);color:var(--c-text)}

/* PRECIOS ESCALA SIMPLE */
.escalas-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.escala-box{background:var(--c-surface2);border:1.5px solid var(--c-border);border-radius:7px;padding:10px;text-align:center}
.escala-lbl{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--c-text3);margin-bottom:5px;letter-spacing:.5px}
.escala-inp{width:100%;padding:6px;background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:5px;color:var(--c-text);font-family:var(--fh);font-size:14px;font-weight:800;text-align:center;outline:none}
.escala-inp:focus{border-color:var(--red)}

/* PRECIOS POR VARIANTE */
.var-pricing{background:var(--c-surface2);border:1.5px solid var(--c-border);border-radius:8px;padding:12px;margin-bottom:14px}
.var-pricing-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.var-pricing-name{font-family:var(--fh);font-size:13px;font-weight:900;text-transform:uppercase;color:var(--c-text);letter-spacing:.5px}
.var-pricing-name span{color:var(--c-text3);font-weight:600;font-size:11px;letter-spacing:0;text-transform:none;margin-left:6px;font-family:var(--fb)}
.var-pricing-copy{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;color:#9bf;background:none;border:1.5px solid rgba(150,200,255,.2);border-radius:5px;padding:4px 8px;cursor:pointer;letter-spacing:.4px}
.var-pricing-copy:hover{border-color:#9bf;background:rgba(150,200,255,.1)}
.var-esc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.var-esc-box{background:var(--c-surface2);border:1px solid var(--c-border);border-radius:5px;padding:7px;text-align:center}
.var-esc-lbl{font-size:9px;color:var(--c-text2);font-family:var(--fh);font-weight:700;text-transform:uppercase;margin-bottom:3px;letter-spacing:.3px}
.var-esc-inp{width:100%;padding:5px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:4px;color:var(--c-text);font-family:var(--fh);font-size:12px;font-weight:800;text-align:center;outline:none}
.var-esc-inp:focus{border-color:var(--red)}

/* IMÁGENES */
.img-section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.img-section-title h3{font-family:var(--fh);font-size:14px;font-weight:800;text-transform:uppercase;color:var(--c-border);letter-spacing:.5px}

.paste-zone{margin-bottom:14px;background:var(--c-surface2);border:2px dashed var(--c-border);border-radius:9px;padding:18px;display:flex;align-items:center;gap:14px;cursor:text;transition:all .15s;outline:none}
.paste-zone:hover,.paste-zone:focus{border-color:var(--c-purple);background:rgba(124,58,237,.04)}
.paste-zone.armed{border-color:var(--c-purple);background:rgba(124,58,237,.06);border-style:solid}
.paste-zone-icon{font-size:32px;flex-shrink:0;line-height:1}
.paste-zone-txt{flex:1;min-width:0}
.paste-zone-ttl{font-family:var(--fh);font-size:13px;font-weight:900;text-transform:uppercase;color:var(--c-text);letter-spacing:.5px;margin-bottom:2px}
.paste-zone-sub{font-size:12px;color:var(--c-text3);line-height:1.4}
.paste-zone-kbd{display:inline-block;padding:1px 6px;background:var(--c-surface2);border:1px solid var(--c-border);border-radius:4px;font-family:monospace;font-size:11px;color:var(--c-text2)}

.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.img-item{background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.img-item-preview{aspect-ratio:1;background:var(--c-surface2);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden}
.img-item-preview img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
.img-item-x{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.75);border:none;color:white;width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center}
.img-item:hover .img-item-x{display:flex}
.img-item-x:hover{background:var(--red)}
.img-item-meta{padding:8px;display:flex;flex-direction:column;gap:5px}
.img-item-sel{padding:5px 7px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:4px;color:var(--c-text);font-size:11px;outline:none;cursor:pointer;width:100%}
.img-item-sel:focus{border-color:var(--red)}
.img-item-add{display:flex;align-items:center;justify-content:center;border:2px dashed var(--c-border);border-radius:8px;cursor:pointer;background:var(--c-surface2);transition:all .15s;aspect-ratio:1;flex-direction:column;gap:4px;min-height:150px}
.img-item-add:hover{border-color:var(--c-purple);background:rgba(124,58,237,.05)}
.img-item-add-icon{font-size:28px;color:var(--c-text2)}
.img-item-add-txt{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--c-text2);letter-spacing:.5px}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-track{width:38px;height:21px;border-radius:11px;background:var(--c-border);transition:background .2s;flex-shrink:0;position:relative}
.toggle-track.on{background:var(--c-purple)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:15px;height:15px;background:white;border-radius:50%;transition:left .2s}
.toggle-track.on .toggle-thumb{left:20px}

/* BUTTONS */
.save-btn{padding:10px 24px;background:var(--c-purple);color:white;border:none;border-radius:7px;font-family:var(--fh);font-size:14px;font-weight:900;text-transform:uppercase;cursor:pointer;letter-spacing:.5px}
.save-btn:hover{background:var(--c-purple-dk)}
.cancel-btn{padding:10px 18px;background:transparent;color:var(--c-text2);border:1.5px solid var(--c-border);border-radius:7px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer}
.del-btn{padding:10px 18px;background:transparent;color:#f66;border:1.5px solid rgba(255,100,100,.3);border-radius:7px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer;margin-right:auto}
.del-btn:hover{background:rgba(255,100,100,.1)}

.section-title{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;color:var(--c-text3);margin-bottom:8px;letter-spacing:1.5px;border-bottom:1px solid rgba(255,255,255,.05);padding-bottom:5px}
.section{margin-bottom:18px}
.help{font-size:11px;color:var(--c-text3);margin-top:4px;font-style:italic;line-height:1.5}

/* COTIZACIONES */
.cot-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:18px}
.cot-stat-card{background:var(--c-surface);border:1px solid var(--c-border);border-left:4px solid var(--c-border);border-radius:10px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cot-stat-num{font-family:var(--fh);font-size:34px;font-weight:900;color:var(--c-text);line-height:1;margin-bottom:4px}
.cot-stat-lbl{font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--c-text3);margin-top:0}
.cot-stat-card.red{border-left-color:var(--c-purple)}.cot-stat-card.red .cot-stat-num{color:var(--c-purple)}
.cot-stat-card.green{border-left-color:#16a34a}.cot-stat-card.green .cot-stat-num{color:#16a34a}
.cot-stat-card.blue{border-left-color:#1d4ed8}.cot-stat-card.blue .cot-stat-num{color:#1d4ed8}
.cot-stat-card.yellow{border-left-color:#b45309}.cot-stat-card.yellow .cot-stat-num{color:#b45309}

.cot-list{display:flex;flex-direction:column;gap:6px}
.cot-row{background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--r-lg);margin-bottom:4px;padding:14px 18px;display:grid;grid-template-columns:auto 1fr auto auto auto;gap:16px;align-items:center;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr);box-shadow:var(--sh-sm)}
.cot-row:hover{border-color:var(--c-purple-bd);box-shadow:var(--sh-md);transform:translateY(-1px)}
.cot-row.unread{border-left:3px solid var(--c-purple)}
.ot-row-item:hover{border-color:var(--c-purple)!important;box-shadow:0 4px 16px rgba(124,58,237,.12)!important;background:rgba(124,58,237,.015)!important;transition:all .15s}
.oc-row-item:hover{border-color:var(--c-purple)!important;box-shadow:0 4px 16px rgba(124,58,237,.12)!important;background:rgba(124,58,237,.015)!important;transition:all .15s}
.cot-folio{font-family:var(--fh);font-size:14px;font-weight:900;color:var(--c-text);letter-spacing:.5px;min-width:90px;font-size:13px}
.cot-cliente{min-width:0;overflow:hidden}
.cot-cliente-nom{font-size:14px;color:var(--c-text);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cot-cliente-emp{font-size:11px;color:var(--c-text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cot-piezas{font-family:var(--fh);font-size:18px;font-weight:900;color:var(--c-text);text-align:center;min-width:50px}
.cot-piezas-lbl{font-size:9px;color:var(--c-text2);font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cot-fecha{font-size:11px;color:var(--c-text3);text-align:right;min-width:80px;line-height:1.4}
.cot-estado{padding:5px 14px;border-radius:20px;font-family:var(--fh);font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;border:1.5px solid transparent}
.cot-estado.nueva{background:var(--c-purple-bg);color:var(--c-purple);border-color:var(--c-purple-bd)}
.cot-estado.en_proceso{background:var(--c-info-bg);color:var(--c-info);border-color:var(--c-info-bd)}
.cot-estado.cotizada{background:var(--c-warning-bg);color:var(--c-warning);border-color:var(--c-warning-bd)}
.cot-estado.ganada{background:var(--c-success-bg);color:var(--c-success);border-color:var(--c-success-bd)}
.cot-estado.perdida{background:var(--c-danger-bg);color:var(--c-danger);border-color:var(--c-danger-bd)}

.cot-empty{text-align:center;padding:60px 20px;color:var(--c-text3);border:2px dashed var(--c-border);border-radius:10px;background:var(--c-surface)}

/* DETALLE COTIZACIÓN */
.cot-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.cot-info-card{background:var(--c-surface2);border:1px solid var(--c-border);border-radius:8px;padding:12px 14px}
.cot-info-lbl{font-family:var(--fh);font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--c-text3);margin-bottom:3px}
.cot-info-val{font-size:13px;color:var(--c-text);word-break:break-word}
.cot-info-val.big{font-size:18px;font-family:var(--fh);font-weight:900}
.cot-grupo{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:background .35s,border-color .35s,box-shadow .35s}
.cot-grupo.em{background:#0f0c1e!important;border-color:rgba(124,58,237,.5)!important;box-shadow:0 8px 32px rgba(124,58,237,.2)!important}
.edit-btn{padding:4px 10px;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:6px;color:var(--c-purple);font-family:var(--fh);font-size:11px;font-weight:800;text-transform:uppercase;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.edit-btn:hover{background:rgba(124,58,237,.15)}
.edit-btn.on{background:rgba(124,58,237,.9);border-color:var(--c-purple);color:white}
.cot-grupo-ttl{font-family:var(--fh);font-size:14px;font-weight:900;color:var(--c-text);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.cot-grupo-modo{font-family:var(--fh);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:var(--c-surface2);color:var(--c-text3);padding:3px 8px;border-radius:10px}
.cot-prendas-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.cot-prenda-row{display:flex;justify-content:space-between;padding:6px 10px;background:var(--c-surface2);border-radius:6px;font-size:12px;color:var(--c-text2);border:1px solid var(--c-border)}
.cot-prenda-row strong{color:var(--c-text);font-family:var(--fh);font-weight:900;min-width:36px;display:inline-block}
.cot-disenos-list{display:flex;flex-direction:column;gap:4px}
.cot-diseno-row{padding:6px 10px;background:var(--c-surface2);border-radius:6px;font-size:12px;color:var(--c-text2);display:flex;justify-content:space-between;gap:8px;border:1px solid var(--c-border)}
.cot-diseno-tech{color:var(--c-purple);font-family:var(--fh);font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
.cot-mockup-link{color:#9bf;font-size:11px;text-decoration:none;border:1px solid rgba(150,200,255,.2);padding:3px 8px;border-radius:4px}
.cot-mockup-link:hover{background:rgba(150,200,255,.1)}

.estado-selector{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.estado-btn{padding:6px 11px;background:var(--c-surface2);border:1.5px solid var(--c-border);border-radius:6px;color:var(--c-text2);font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer;letter-spacing:.4px;transition:all .15s}
.estado-btn:hover{border-color:rgba(255,255,255,.2);color:white}
.estado-btn.active{background:var(--c-purple);border-color:var(--c-purple);color:white}

.cot-actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* SIDEBAR BADGE */
.sb-badge{margin-left:auto;background:var(--c-purple);color:white;font-size:10px;font-weight:800;padding:1px 7px;border-radius:9px;font-family:var(--fh);min-width:18px;text-align:center}

/* BACKUP CARD */
.backup-card{background:var(--c-surface);border:1px solid var(--c-border);border-radius:10px;padding:18px;margin-bottom:14px}
.backup-row{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--c-border)}
.backup-row:last-child{border-bottom:none}
.backup-icon{font-size:24px;width:40px;text-align:center;flex-shrink:0}
.backup-txt{flex:1;min-width:0}
.backup-txt-ttl{font-family:var(--fh);font-size:14px;font-weight:800;text-transform:uppercase;color:var(--c-text);letter-spacing:.5px}
.backup-txt-sub{color:var(--c-text2);font-size:12px;margin-top:2px;line-height:1.4}


/* ── LANDSCAPE HINT ── */
#lana-rotate-hint{display:none;position:fixed;inset:0;z-index:99999;background:rgba(9,7,22,.96);
  flex-direction:column;align-items:center;justify-content:center;gap:16px;color:white;text-align:center;padding:32px}
#lana-rotate-hint .rh-icon{font-size:56px;animation:rotateHint 2s ease-in-out infinite}
#lana-rotate-hint .rh-title{font-family:var(--fh);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.5px}
#lana-rotate-hint .rh-sub{font-size:14px;color:rgba(255,255,255,.6);line-height:1.6;max-width:280px}
#lana-rotate-hint .rh-skip{margin-top:8px;padding:10px 24px;background:rgba(124,58,237,.3);border:1px solid rgba(124,58,237,.5);
  border-radius:8px;color:white;font-family:var(--fh);font-size:13px;font-weight:800;text-transform:uppercase;
  cursor:pointer;letter-spacing:.5px}
@keyframes rotateHint{0%,100%{transform:rotate(0deg)}40%{transform:rotate(90deg)}60%{transform:rotate(90deg)}}

/* ── TABLET (768px–1024px) ── */
@media(max-width:1024px) and (min-width:769px){
  .layout{grid-template-columns:200px 1fr}
  .sb-item{font-size:12px;padding:9px 10px}
  .adm-main{padding:18px 20px}
  .modal-box{max-width:96vw}
  .cot-row{grid-template-columns:auto 1fr auto auto;gap:10px;padding:12px 14px}
  .cot-folio{min-width:70px;font-size:12px}
  .cot-piezas{font-size:16px;min-width:40px}
  .cot-fecha{display:none}
  .cot-stats{grid-template-columns:repeat(3,1fr)}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
  .form-grid{grid-template-columns:1fr 1fr}
  .escalas-grid,.var-esc-grid{grid-template-columns:repeat(4,1fr)}
  .toolbar{gap:6px}
  .tb-btn{padding:8px 10px;font-size:11px}
}

/* ── MOBILE (≤768px) — portrait como modo principal ── */
@media(max-width:768px){
  .layout{display:block;min-height:calc(100vh - 54px - 60px)}
  .sidebar{display:none}
  .adm-main{padding:14px 14px 80px;max-height:none;overflow-y:visible}
  nav{height:50px;padding:0 14px}
  nav .nr .btn-n{font-size:11px;padding:4px 10px}
  nav .nr span{display:none}
  .adm-title{font-size:22px}
  .adm-sub{font-size:12px;margin-bottom:12px}
  .cot-stats{grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  .cot-stat-num{font-size:26px}
  .cot-stat-card{padding:12px 14px}
  .cot-row{grid-template-columns:auto 1fr auto;gap:8px;padding:12px 14px}
  .cot-folio{min-width:60px;font-size:11px}
  .cot-fecha{display:none}
  .cot-piezas{font-size:16px;min-width:36px}
  .prod-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .form-grid{grid-template-columns:1fr}
  .escalas-grid,.var-esc-grid{grid-template-columns:repeat(3,1fr)}
  .modal-ov{padding:0;align-items:flex-end}
  .modal-box{max-width:100vw;width:100%;border-radius:18px 18px 0 0;max-height:92vh}
  .modal-hdr{padding:14px 18px}
  .modal-body{padding:14px 18px}
  .modal-footer{padding:12px 18px}
  .toolbar{gap:6px}
  .tb-btn{padding:8px 10px;font-size:11px}
  .si{min-width:0}
  .brand-bar{padding:10px 12px;gap:8px}
  #lana-rotate-hint{display:none!important}
}

/* ── BOTTOM NAV MÓVIL ── */
.mob-bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--c-surface);border-top:1px solid var(--c-border);height:60px;
  grid-template-columns:repeat(5,1fr);align-items:stretch;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
}
.mob-tab{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;padding:6px 2px 8px;
  color:var(--c-text3);font-family:var(--fh);font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;transition:color .15s;
  position:relative;border:none;background:none;
}
.mob-tab.active{color:var(--c-purple)}
.mob-tab.active::before{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:var(--c-purple);border-radius:0 0 2px 2px;
}
.mob-tab-icon{font-size:20px;line-height:1}
.mob-tab-badge{
  position:absolute;top:4px;right:calc(50% - 16px);
  background:var(--c-purple);color:white;font-size:9px;font-weight:800;
  padding:1px 5px;border-radius:8px;font-family:var(--fh);min-width:16px;text-align:center;
}
.mob-fab{
  display:none;position:fixed;bottom:72px;right:16px;z-index:201;
  width:52px;height:52px;border-radius:50%;
  background:var(--c-purple);color:white;border:none;
  font-size:26px;cursor:pointer;
  box-shadow:0 4px 18px rgba(124,58,237,.45);
  align-items:center;justify-content:center;
  transition:transform .15s,box-shadow .15s;
}
.mob-fab:hover{transform:scale(1.07);box-shadow:0 6px 24px rgba(124,58,237,.55)}
.mob-fab:active{transform:scale(0.95)}
@media(max-width:768px){
  .mob-bottom-nav{display:grid}
  .mob-fab{display:flex}
}

@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes confettiPop{0%{transform:scale(0) rotate(0deg);opacity:1}30%{transform:scale(1.4) rotate(180deg);opacity:1}100%{transform:scale(1) translateY(60px) rotate(360deg);opacity:0}}

/* ── IMPORTADOR MASIVO ── */
.bulk-drop{border:2px dashed rgba(124,58,237,.4);border-radius:12px;background:rgba(124,58,237,.04);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;user-select:none}
.bulk-drop:hover,.bulk-drop.drag-over{border-color:var(--c-purple);background:rgba(124,58,237,.09)}
.bulk-drop-icon{font-size:40px;margin-bottom:10px}
.bulk-drop-title{font-family:var(--fh);font-size:18px;font-weight:900;text-transform:uppercase;color:var(--c-text);margin-bottom:4px}
.bulk-drop-sub{font-size:12px;color:var(--c-text2)}
.bulk-stat{background:var(--c-surface2);border-radius:8px;padding:10px 16px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:80px}
.bulk-stat span{font-family:var(--fh);font-size:26px;font-weight:900;color:var(--c-text);line-height:1}
.bulk-stat{font-size:11px;color:var(--c-text2);font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px}
.bulk-stat.warn span{color:#f5b942}
.bulk-stat.ok span{color:#4a9a4a}
.bulk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-top:4px}
.bulk-card{background:var(--c-surface);border:1.5px solid var(--c-border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:border-color .15s}
.bulk-card.saved{border-color:rgba(74,154,74,.4);background:rgba(74,154,74,.04)}
.bulk-thumb{width:100%;aspect-ratio:4/3;overflow:hidden;background:#111;position:relative}
.bulk-thumb img{width:100%;height:100%;object-fit:cover}
.bulk-saved-badge{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:20px;font-weight:900;color:#4a9a4a;letter-spacing:1px}
.bulk-route{padding:12px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.bulk-route-name{font-size:11px;color:var(--c-text2);font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bulk-field{display:flex;flex-direction:column;gap:3px}
.bulk-field label{font-size:10px;font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--c-text3)}
.bulk-field label span{font-weight:400;color:var(--c-text2);text-transform:none;letter-spacing:0}
.bulk-field select{background:var(--c-surface);border:1px solid var(--c-border);border-radius:5px;color:var(--c-text);font-size:12px;padding:6px 9px;font-family:var(--fb);width:100%}
.bulk-field select:focus{border-color:var(--red);outline:none}
.bulk-breadcrumb{display:flex;align-items:center;flex-wrap:wrap;gap:3px;background:rgba(124,58,237,.06);border:1px solid rgba(124,58,237,.2);border-radius:5px;padding:5px 9px;font-size:11px;color:var(--c-text);font-family:var(--fh);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.bulk-sep{color:var(--c-purple);font-size:12px;font-weight:900}
.bulk-tip{font-size:11px;color:var(--c-text2);font-style:italic;text-align:center;padding:6px 0}
.bulk-remove{position:absolute;top:7px;right:7px;width:22px;height:22px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:var(--c-text3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.bulk-remove:hover{background:var(--c-purple);color:white}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ════════════════════════════════════════════════════════
   LANA — Skeleton de carga (se elimina al montar React)
   ════════════════════════════════════════════════════════ */
@keyframes sk-shimmer{
  0%  {background-position:-700px 0}
  100%{background-position: 700px 0}
}
@keyframes sk-orb-pulse{
  0%,100%{opacity:.8;transform:scale(1)}
  50%    {opacity:1; transform:scale(1.08)}
}
.sk-bone{
  background:linear-gradient(90deg,#e8e9ef 25%,#f3f4f9 50%,#e8e9ef 75%);
  background-size:700px 100%;
  animation:sk-shimmer 1.4s ease-in-out infinite;
  border-radius:5px;
}
#lana-sk{
  position:fixed;inset:0;z-index:99999;
  display:flex;flex-direction:column;
  background:var(--c-surface2);
  font-family:'Barlow Condensed','Barlow',sans-serif;
}
/* NAV */
#lana-sk .sk-nav{
  height:54px;background:var(--c-surface);
  border-bottom:1px solid var(--c-border);
  box-shadow:0 1px 12px rgba(0,0,0,.06);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;flex-shrink:0;
}
#lana-sk .sk-nav-logo{display:flex;align-items:center;gap:10px;}
#lana-sk .sk-nav-orb{
  width:22px;height:22px;border-radius:4px;
  background:var(--c-purple);
  animation:sk-orb-pulse 2s ease-in-out infinite;
  flex-shrink:0;
}
#lana-sk .sk-nav-name{width:130px;height:12px;}
#lana-sk .sk-nav-links{display:flex;gap:10px;align-items:center;}
#lana-sk .sk-nav-link{height:28px;border-radius:5px;}
/* BODY */
#lana-sk .sk-body{display:flex;flex:1;overflow:hidden;}
/* SIDEBAR */
#lana-sk .sk-sb{
  width:240px;flex-shrink:0;
  background:var(--c-surface2);border-right:1px solid var(--c-border);
  padding:16px 12px;display:flex;flex-direction:column;gap:4px;
}
#lana-sk .sk-sb-section{width:70px;height:8px;margin:10px 0 5px;border-radius:3px;}
#lana-sk .sk-sb-item{
  height:36px;border-radius:7px;
  display:flex;align-items:center;gap:9px;padding:0 12px;
}
#lana-sk .sk-sb-item.act{
  background:rgba(124,58,237,.12);
  border-left:3px solid var(--c-purple);padding-left:9px;
}
#lana-sk .sk-sb-ico{width:16px;height:16px;border-radius:4px;flex-shrink:0;}
#lana-sk .sk-sb-lbl{height:10px;border-radius:4px;}
/* MAIN */
#lana-sk .sk-main{
  flex:1;padding:24px 28px;overflow:hidden;
  display:flex;flex-direction:column;gap:0;
}
/* Header */
#lana-sk .sk-hdr{display:flex;align-items:baseline;gap:14px;margin-bottom:26px;}
#lana-sk .sk-hdr-title{width:170px;height:24px;border-radius:5px;}
#lana-sk .sk-hdr-date {width:110px;height:13px;border-radius:4px;}
/* KPI grid */
#lana-sk .sk-cards{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;margin-bottom:26px;
}
#lana-sk .sk-card{
  background:var(--c-surface);
  border:1px solid var(--c-border);
  border-radius:10px;padding:18px 18px 16px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
#lana-sk .sk-c-ico{width:34px;height:34px;border-radius:8px;margin-bottom:13px;}
#lana-sk .sk-c-val{height:30px;width:44px;border-radius:5px;margin-bottom:7px;}
#lana-sk .sk-c-lbl{height:9px;width:88%;border-radius:4px;margin-bottom:5px;}
#lana-sk .sk-c-sub{height:9px;width:60%;border-radius:4px;}
/* Acciones */
#lana-sk .sk-act-lbl{width:110px;height:9px;border-radius:4px;margin-bottom:10px;}
#lana-sk .sk-acts{display:flex;gap:8px;margin-bottom:26px;}
#lana-sk .sk-act{height:36px;border-radius:8px;}
/* Grid gráfico */
#lana-sk .sk-grid{
  display:grid;grid-template-columns:1fr 260px;
  gap:14px;margin-bottom:18px;
}
#lana-sk .sk-panel{
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:10px;padding:18px 22px;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
#lana-sk .sk-p-lbl{width:180px;height:9px;border-radius:4px;margin-bottom:18px;}
#lana-sk .sk-bars{display:flex;align-items:flex-end;gap:6px;height:110px;}
#lana-sk .sk-bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
#lana-sk .sk-bar{width:100%;border-radius:4px 4px 0 0;}
#lana-sk .sk-blbl{width:80%;height:8px;border-radius:3px;}
#lana-sk .sk-cv-num{width:74px;height:42px;border-radius:5px;margin-bottom:5px;}
#lana-sk .sk-cv-sub{width:140px;height:9px;border-radius:4px;margin-bottom:14px;}
#lana-sk .sk-cv-bar{width:100%;height:5px;border-radius:3px;margin-bottom:16px;}
#lana-sk .sk-cv-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f9fafb;}
#lana-sk .sk-cv-rl{height:10px;border-radius:4px;}
#lana-sk .sk-cv-rv{width:20px;height:12px;border-radius:4px;}
/* Tabla */
#lana-sk .sk-tbl{
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:10px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
#lana-sk .sk-tbl-hdr{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 20px;border-bottom:1px solid #f3f4f6;
}
#lana-sk .sk-tbl-row{
  display:grid;grid-template-columns:110px 1fr 60px 70px;
  gap:12px;align-items:center;padding:12px 20px;
  border-bottom:1px solid #f9fafb;
}
@media(max-width:960px){
  #lana-sk .sk-cards{grid-template-columns:repeat(3,1fr);}
  #lana-sk .sk-grid{grid-template-columns:1fr;}
}
@media(max-width:600px){
  #lana-sk .sk-sb{display:none;}
  #lana-sk .sk-cards{grid-template-columns:repeat(2,1fr);}
}

<script>
// LANA Dark Mode
(function(){
  var t = localStorage.getItem('lana-theme');
  if(t) document.documentElement.dataset.theme = t;
})();
function lanaToggleTheme(){
  var html = document.documentElement;
  var dark = html.dataset.theme === 'dark';
  html.dataset.theme = dark ? 'light' : 'dark';
  localStorage.setItem('lana-theme', html.dataset.theme);
  var btn = document.getElementById('lana-theme-btn');
  if(btn) btn.textContent = dark ? '🌙' : '☀️';
  lanaUpdateLogos();
}
function lanaUpdateLogos(){
  var dark = document.documentElement.dataset.theme === 'dark';
  var logoClaro = 'https://lgjdzaqjrmmzyrenevfm.supabase.co/storage/v1/object/public/Logo%20Lana/LANACLARO.png';
  var logoOscuro = 'https://lgjdzaqjrmmzyrenevfm.supabase.co/storage/v1/object/public/Logo%20Lana/LANA%20OBSCURO.png';
  var logos = document.querySelectorAll('img[alt="LANA"]');
  logos.forEach(function(img){
    img.src = dark ? logoOscuro : logoClaro;
  });
}
// Aplicar logo al cargar
document.addEventListener('DOMContentLoaded', function(){ lanaUpdateLogos(); });
</script>

<script>
  // No mostrar si ya eligió continuar
  if(localStorage.getItem('lana_skip_rotate')==='1'){
    document.getElementById('lana-rotate-hint').style.display='none';
  }
  // Ocultar automáticamente al rotar a landscape
  window.addEventListener('orientationchange', function(){
    setTimeout(function(){
      if(window.innerWidth > window.innerHeight){
        document.getElementById('lana-rotate-hint').style.display='none';
      } else if(window.innerWidth <= 768 && !localStorage.getItem('lana_skip_rotate')){
        document.getElementById('lana-rotate-hint').style.display='flex';
      }
    }, 300);
  });

    const {data} = await sb.from("usuarios").select("tenant_id").eq("auth_id", session.user.id).single();
    MY_TENANT_ID = (data&&data.tenant_id) || null;
    console.log("[LANA] tenant_id:", MY_TENANT_ID);

    // Crear tenant si es usuario nuevo sin tenant asignado
    if(!MY_TENANT_ID){
      await renderSetupTenant();
      return null;
    }

    // Cargar trial_ends_at del tenant
    if(MY_TENANT_ID){
      const {data:tenant} = await sb.from("tenants").select("trial_ends_at, plan, nombre, activo").eq("id", MY_TENANT_ID).single();
      MY_TRIAL_ENDS = (tenant&&tenant.trial_ends_at) || null;
      MY_TENANT_NOMBRE = (tenant&&tenant.nombre) || null;

      // Bloqueo total si cuenta inactiva (suscripción cancelada)
      if(tenant&&tenant.activo === false){
        renderBloqueoTotal();
        return null;
      }

      renderTrialBanner(tenant);
    }

    return MY_TENANT_ID;
  }catch(e){ console.error("sbInitTenant",e); return null; }
}

function renderSetupTenant(){
  return new Promise((resolve) => {
    const prev = document.getElementById('lana-setup-overlay');
    if(prev) return resolve();

    const overlay = document.createElement('div');
    overlay.id = 'lana-setup-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#09090F;display:flex;align-items:center;justify-content:center;font-family:Urbanist,sans-serif;';
    overlay.innerHTML = `
      <div style="text-align:center;max-width:440px;padding:40px 20px;width:100%;">
        <div style="font-size:56px;margin-bottom:20px">🏪</div>
        <div style="font-family:Urbanist,sans-serif;font-size:26px;font-weight:900;color:white;margin-bottom:10px">¡Bienvenido a LANA!</div>
        <div style="font-size:15px;color:#9898B2;margin-bottom:28px;line-height:1.6">
          Ingresa el nombre de tu negocio para continuar.
        </div>
        <input id="setup-nombre" type="text" placeholder="Ej: Bordados García"
          style="width:100%;padding:14px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.15);
          background:rgba(255,255,255,.06);color:white;font-size:16px;font-family:Urbanist,sans-serif;
          outline:none;margin-bottom:12px;box-sizing:border-box;">
        <div id="setup-error" style="color:#f66;font-size:13px;margin-bottom:12px;display:none;"></div>
        <button id="setup-btn" onclick="doSetupTenant()"
          style="background:#5B2FD4;color:white;border:none;padding:14px 32px;border-radius:12px;
          font-size:16px;font-weight:700;cursor:pointer;width:100%;font-family:Urbanist,sans-serif;">
          Crear mi cuenta →
        </button>
        <div style="margin-top:12px;">
          <button onclick="window.sbLogout()" style="background:transparent;color:#9898B2;border:none;
          font-size:13px;cursor:pointer;font-family:Urbanist,sans-serif;">Cerrar sesión</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    window.doSetupTenant = async function(){
      const nombre = document.getElementById('setup-nombre').value.trim();
      const errEl  = document.getElementById('setup-error');
      const btn    = document.getElementById('setup-btn');
      if(!nombre){ errEl.textContent='Ingresa el nombre de tu negocio.'; errEl.style.display='block'; return; }
      btn.textContent = 'Creando...'; btn.disabled = true; errEl.style.display='none';
      try{
        const {data:tenantId, error:rpcErr} = await sb.rpc('register_tenant', {
          p_nombre: nombre,
          p_plan:   'pro'
        });
        if(rpcErr) throw new Error(rpcErr.message);
        MY_TENANT_ID = tenantId;
        overlay.remove();
        // Recargar para inicializar todo correctamente
        window.location.reload();
      }catch(e){
        errEl.textContent = 'Error: ' + e.message;
        errEl.style.display = 'block';
        btn.textContent = 'Crear mi cuenta →'; btn.disabled = false;
      }
    };

    // Enter key
    document.getElementById('setup-nombre').addEventListener('keydown', e => {
      if(e.key === 'Enter') window.doSetupTenant();
    });

    resolve();
  });
}


function renderTrialBanner(tenant){
  if(!tenant || !tenant.trial_ends_at) return;
  const now = new Date();
  const end = new Date(tenant.trial_ends_at);
  const days = Math.ceil((end - now) / (1000*60*60*24));

  // Eliminar banner anterior si existe
  const prev = document.getElementById('lana-trial-banner');
  if(prev) prev.remove();

  const banner = document.createElement('div');
  banner.id = 'lana-trial-banner';

  if(days <= 0){
    // Trial vencido
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#DC2626;color:white;padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:12px;font-family:Urbanist,sans-serif;font-size:14px;font-weight:600;';
    banner.innerHTML = `⚠️ Tu período de prueba ha vencido. 
      <button onclick="window.lanaStarterCheckout()" style="background:white;color:#7c3aed;border:none;padding:6px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px;margin-right:6px;">Starter $299 →</button>
      <button onclick="window.lanaCheckout()" style="background:transparent;color:white;border:1px solid rgba(255,255,255,.4);padding:6px 16px;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px;">Ver planes →</button>`;
  } else if(days <= 5){
    // Próximo a vencer
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#F59E0B;color:white;padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:12px;font-family:Urbanist,sans-serif;font-size:13px;font-weight:600;';
    banner.innerHTML = `⏳ Tu prueba vence en ${days} día${days===1?'':'s'}. 
      <button onclick="window.lanaCheckout()" style="background:white;color:#F59E0B;border:none;padding:5px 14px;border-radius:6px;font-weight:700;cursor:pointer;font-size:12px;">Suscribirme →</button>
      <button onclick="this.parentElement.remove()" style="background:none;border:none;color:white;cursor:pointer;font-size:16px;margin-left:4px;">✕</button>`;
  }

  if(days <= 5 || days <= 0){
    document.body.prepend(banner);
  }
}

  React.useEffect(()=>{
    const hash=window.location.hash;
    if(hash.includes("type=recovery")||hash.includes("type=signup")){setMode("reset");return;}
    if(hash.includes("access_token")||hash.includes("type=magiclink")){
      (async function(){
        const {data:{session},error}=await sb.auth.getSession();
        if(session&&!error){
          const {data:u}=await sb.from("usuarios").select("nombre,rol,tenant_id").eq("auth_id",session.user.id).maybeSingle();
          if(!u){await sb.auth.signOut();window.location.hash="";alert("Tu cuenta de Google no está registrada en LANA. Contacta al administrador.");return;}
          const tenantOk=await sbInitTenant();

        }

  },[]);

    if(!usuario.trim()||!pass.trim()){setErr("Ingresa email y contraseña.");return;}
    setLoading(true);setErr("");
    try{
      if(sb){
        const {data,error}=await sb.auth.signInWithPassword({email:usuario.trim(),password:pass.trim()});
        if(!error&&data&&data.user){
          const tenantOk=await sbInitTenant();
          if(!tenantOk){setLoading(false);return;}
          const {data:u}=await sb.from("usuarios").select("nombre,rol").eq("auth_id",data.user.id).single();
          onAuth({nombre:(u&&u.nombre)||data.user.email,rol:(u&&u.rol)||"admin"});

          {/* ── RESET ── */}
          {mode==="reset"&&<>

            <div style={{fontSize:"13px",color:"#52526E",marginBottom:"28px"}}>Elige una contraseña segura de al menos 8 caracteres.</div>
            <div style={{marginBottom:"12px"}}>
              <div style={{fontSize:"10px",color:"#52526E",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"7px"}}>Nueva contraseña</div>
              <input autoFocus className="lana-inp-dark" type="password" value={newPass} onChange={e=>setNewPass(e.target.value)} style={inp}/>

              <div style={{fontSize:"10px",color:"#52526E",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,textTransform:"uppercase",letterSpacing:"1.5px",marginBottom:"7px"}}>Confirmar contraseña</div>
              <input className="lana-inp-dark" type="password" value={newPass2} onChange={e=>setNewPass2(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleReset()} style={inp}/>
            </div>
            {err&&<div style={{background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",borderRadius:"8px",padding:"10px 14px",fontSize:"12px",color:"#F87171",marginBottom:"16px",display:"flex",gap:"8px"}}><span>⚠️</span><span>{err}</span></div>}
            <button className="lana-login-btn" onClick={handleReset} disabled={loading} style={{width:"100%",padding:"14px",border:"none",borderRadius:"10px",background:"linear-gradient(135deg,#5B21B6,#7C3AED)",color:"white",fontFamily:"'Barlow Condensed',sans-serif",fontSize:"15px",fontWeight:900,textTransform:"uppercase",letterSpacing:".8px",cursor:"pointer",boxShadow:"0 4px 20px rgba(91,33,182,.4)"}}>

        </div>

        {/* Indicador conectado */}
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginTop:"32px"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"#4ADE80",animation:"pulse-dot 2s ease infinite"}}/>
          <span style={{fontSize:"11px",color:"#36364E",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px"}}>

      {/* ══ PANEL DERECHO — Visual decorativo ══ */}

        {/* Contenido central */}
        <div style={{position:"relative",zIndex:1,width:"100%",maxWidth:"440px"}}>

            L{"A"}N<span style={{background:"linear-gradient(135deg,#a78bfa,#7C3AED)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>A</span>
          </div>

          {/* Tagline */}
          <div style={{fontSize:"15px",color:"#52526E",lineHeight:1.7,marginBottom:"40px",maxWidth:"360px"}}>
            Descubre todo lo que hemos{" "}

          {/* Stats */}

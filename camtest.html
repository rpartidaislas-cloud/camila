<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Test Cámara CAMILA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px;text-align:center}
video{width:100%;max-width:400px;border-radius:12px;background:#111;margin:16px 0}
button{padding:14px 28px;border-radius:12px;background:#5B47E0;color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;width:100%;max-width:300px;margin-top:12px}
#log{margin-top:16px;font-size:12px;color:#aaa;max-width:320px;line-height:1.6;text-align:left;background:#111;padding:12px;border-radius:8px;width:100%;word-break:break-all}
</style>
</head>
<body>

<div style="font-size:22px;font-weight:700;margin-bottom:8px">🦷 Test Cámara</div>
<div style="font-size:13px;color:#aaa;margin-bottom:16px">CAMILA · Diagnóstico iOS</div>

<video id="vid" autoplay muted playsinline></video>

<button onclick="testCamera()">Probar cámara</button>
<button onclick="testCameraEnv()" style="background:#0D9488;margin-top:8px">Probar cámara trasera</button>

<div id="log">Toca "Probar cámara" para iniciar...</div>

<script>
var logEl = document.getElementById('log');

function log(msg, color) {
  var line = document.createElement('div');
  line.style.color = color || '#fff';
  line.textContent = new Date().toLocaleTimeString() + ' — ' + msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

log('Página cargada', '#4ade80');
log('HTTPS: ' + (location.protocol === 'https:' ? '✅' : '❌ NO ES HTTPS'), location.protocol === 'https:' ? '#4ade80' : '#f87171');
log('mediaDevices: ' + (navigator.mediaDevices ? '✅' : '❌ NO DISPONIBLE'), navigator.mediaDevices ? '#4ade80' : '#f87171');
log('getUserMedia: ' + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? '✅' : '❌ NO DISPONIBLE'), '#aaa');
log('iOS: ' + (/iPhone|iPad|iPod/.test(navigator.userAgent) ? '✅ Sí' : 'No'), '#aaa');
log('Safari: ' + (/Safari/.test(navigator.userAgent) && !/CriOS/.test(navigator.userAgent) ? '✅ Sí' : 'No/Otro'), '#aaa');
log('Standalone: ' + (window.navigator.standalone ? 'Sí (PWA)' : 'No (navegador)'), '#aaa');

async function testCamera() {
  log('Iniciando getUserMedia...', '#facc15');
  try {
    if (!navigator.mediaDevices) {
      log('❌ navigator.mediaDevices no existe', '#f87171');
      return;
    }
    if (!navigator.mediaDevices.getUserMedia) {
      log('❌ getUserMedia no existe', '#f87171');
      return;
    }
    log('Solicitando permiso de cámara frontal...', '#facc15');
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: false
    });
    log('✅ Stream obtenido! Tracks: ' + stream.getVideoTracks().length, '#4ade80');
    var v = document.getElementById('vid');
    v.srcObject = stream;
    v.play();
    log('✅ Video iniciado', '#4ade80');
  } catch(e) {
    log('❌ Error: ' + e.name, '#f87171');
    log('❌ Mensaje: ' + e.message, '#f87171');
    log('Código: ' + (e.code || 'N/A'), '#f87171');
  }
}

async function testCameraEnv() {
  log('Iniciando cámara trasera...', '#facc15');
  try {
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' },
      audio: false
    });
    log('✅ Cámara trasera OK!', '#4ade80');
    var v = document.getElementById('vid');
    v.srcObject = stream;
    v.play();
  } catch(e) {
    log('❌ Error trasera: ' + e.name + ' — ' + e.message, '#f87171');
  }
}
</script>
</body>
</html>

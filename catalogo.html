*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --light:#f5f5f5;--white:#fafafa;

  --nav-bg:#1a1a1a;
  --page-bg:#f5f4f1;
  --card-bg:#ffffff;
  --txt-h:#1a1a1a;
  --txt-b:#444444;
  --txt-m:#888888;
  --brd:#e0ddd8;
  --price-c:#d62020;
  --badge-bg:#f0ede8;
  --fh-cat:'Barlow Condensed',sans-serif;
  --fh-w:900;
  --fb-cat:'Barlow',sans-serif;
  --fb-w:400;
  --f-price:'Barlow Condensed',sans-serif;
  --f-price-w:900;
  --f-btn:'Barlow Condensed',sans-serif;
  --f-btn-w:800;
  --f-sub:'Barlow',sans-serif;
  --f-sub-w:600;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb-cat);background:var(--page-bg);color:var(--txt-b);overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* Safe area for notched phones */

.cart-fab{right:max(24px,env(safe-area-inset-right));bottom:max(24px,env(safe-area-inset-bottom))}
.scroll-top{left:max(24px,env(safe-area-inset-left));bottom:max(24px,env(safe-area-inset-bottom))}

nav{position:sticky;top:0;z-index:200;background:var(--nav-bg);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;border-bottom:3px solid var(--red)}
.nav-logo{font-family:var(--fh);font-size:19px;font-weight:900;color:white;text-decoration:none;display:flex;align-items:center;gap:10px}
.nav-badge{background:var(--red);color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:2px;letter-spacing:1px;text-transform:uppercase}

.nbtn{background:none;border:1.5px solid rgba(255,255,255,.2);color:#ccc;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 14px;border-radius:4px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}

.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 56px);align-items:start}
.sidebar{background:var(--card-bg);border-right:1px solid var(--brd);padding:20px 0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;display:block}
.sb-label{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#aaa;padding:8px 18px 4px}

.sb-item:hover{background:#f8f8f8;color:var(--black)}
.sb-item.active{background:#fff0f0;color:var(--red);border-left-color:var(--red)}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

.main{padding:28px}
.ph{margin-bottom:24px}
.ph h1{font-family:var(--fh-cat);font-weight:var(--fh-w);font-size:40px;font-weight:900;text-transform:uppercase;line-height:.95;letter-spacing:-1px}
.ph h1 em{color:var(--red);font-style:normal}
.ph p{color:#777;font-size:14px;margin-top:6px}

.fb{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:20px;align-items:center;padding-bottom:6px;scrollbar-width:none;-ms-overflow-style:none;position:relative}
.fb::-webkit-scrollbar{display:none}
.chip{font-family:var(--fh);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 13px;border-radius:20px;border:1.5px solid #ddd;background:white;cursor:pointer;transition:all .15s;color:#777}
.chip:hover{border-color:var(--red);color:var(--red)}
.chip.on{background:var(--red);border-color:var(--red);color:white}
.si{flex:1;min-width:180px;max-width:300px;padding:7px 14px;border:1.5px solid #ddd;border-radius:20px;font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}

.c-badge{position:absolute;top:8px;left:8px;background:var(--red);color:white;font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:2px}

.c-body{padding:12px}

.c-dots{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px}

.c-tags{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.ctag{font-size:10px;background:#f0f0f0;color:#777;padding:2px 7px;border-radius:3px;font-family:var(--fh);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.c-acts{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.btn-ver{background:#f5f5f5;color:var(--black);border:none;padding:7px;border-radius:6px;font-family:var(--fh);font-size:12px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:all .15s}

.cfg-input{width:100%;padding:10px 12px;border:1.5px solid #E4E4EE;border-radius:8px;font-size:14px;font-family:inherit;margin-bottom:12px;box-sizing:border-box}
.cfg-btn-pagar{width:100%;padding:14px;background:#16a34a;color:white;border:none;border-radius:10px;font-family:var(--fh);font-size:16px;font-weight:900;text-transform:uppercase;cursor:pointer;letter-spacing:.5px;transition:background .2s}

.m-body{padding:26px;display:flex;flex-direction:column;gap:14px}
.m-brand{font-family:var(--fh);font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red);text-transform:uppercase}

.cart-cta{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:8px;font-family:var(--fh);font-size:17px;font-weight:800;text-transform:uppercase;cursor:pointer;transition:background .2s}

.ai:focus{border-color:var(--red)}
.ab{padding:7px 14px;border:none;border-radius:5px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer;transition:all .15s}
.ab.pri{background:var(--red);color:white}
.ab.pri:hover{background:var(--red-dark)}
.ab.gh{background:rgba(255,255,255,.07);color:#bbb;border:1px solid rgba(255,255,255,.12)}
.ab.gh:hover{background:rgba(255,255,255,.12);color:white}
.ab.dn{background:rgba(214,32,32,.15);color:#f99;border:1px solid rgba(214,32,32,.25)}
.ab.dn:hover{background:rgba(214,32,32,.28);color:white}
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.adm-fl{display:block}
.adm-fl-lbl{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#666;margin-bottom:5px;display:block}
.tog{display:flex;align-items:center;gap:7px;cursor:pointer}
.tog input{width:15px;height:15px;accent-color:var(--red);cursor:pointer}

.login-box{background:var(--dark);border-radius:14px;padding:36px;width:100%;max-width:360px}
.login-t{font-family:var(--fh);font-size:26px;font-weight:900;text-transform:uppercase;color:white;margin-bottom:4px}
.login-s{color:#666;font-size:13px;margin-bottom:24px}
.lf{margin-bottom:14px}
.lf label{display:block;font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#aaa;margin-bottom:5px}
.li{width:100%;padding:11px 13px;background:#2a2a2a;border:1.5px solid rgba(255,255,255,.12);border-radius:6px;color:white;font-family:var(--fb);font-size:14px;outline:none;transition:border-color .2s}
.li:focus{border-color:var(--red)}
.login-btn{width:100%;padding:13px;background:var(--red);color:white;border:none;border-radius:7px;font-family:var(--fh);font-size:17px;font-weight:800;text-transform:uppercase;cursor:pointer;margin-top:6px;transition:background .2s}
.login-btn:hover{background:var(--red-dark)}

.empty{text-align:center;padding:50px 20px;color:#bbb}
.empty .ei{font-size:44px;margin-bottom:10px}
.empty p{font-family:var(--fh);font-size:16px;text-transform:uppercase;letter-spacing:.5px}

/* ── SKELETON LOADING ────────────────────────────── */
.skeleton{background:#f0eeeb;border-radius:10px;overflow:hidden;border:2px solid transparent}
.skel-img{aspect-ratio:3/4;background:linear-gradient(90deg,#ebe9e4 25%,#f5f3ef 50%,#ebe9e4 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
.skel-body{padding:12px}
.skel-line{height:12px;background:linear-gradient(90deg,#ebe9e4 25%,#f5f3ef 50%,#ebe9e4 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;margin-bottom:8px}
.skel-line.sm{height:9px;width:60%}
.skel-line.xs{height:9px;width:40%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── RESULTS BAR ─────────────────────────────────── */
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.results-count{font-family:var(--fh);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#aaa}
.results-count em{color:var(--red);font-style:normal;font-weight:900}
.sort-sel{font-family:var(--fh);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:5px 12px;border:1.5px solid #ddd;border-radius:20px;background:white;color:#555;cursor:pointer;outline:none;transition:border-color .15s}
.sort-sel:focus{border-color:var(--red)}

/* ── CARD BADGES ─────────────────────────────────── */
.c-badge-new{position:absolute;top:8px;left:8px;background:#16a34a;color:white;font-family:var(--fh);font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px;z-index:2}
.c-badge-pop{position:absolute;top:8px;left:8px;background:#f59e0b;color:white;font-family:var(--fh);font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px;z-index:2}

/* ── FLOATING CART BADGE ─────────────────────────── */
.cart-fab{position:fixed;bottom:24px;right:24px;z-index:400;background:var(--red);color:white;border:none;border-radius:24px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-family:var(--fh);font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;box-shadow:0 6px 24px rgba(214,32,32,.4);transition:all .2s;transform:translateY(100px);opacity:0}
.cart-fab.vis{transform:translateY(0);opacity:1}
.cart-fab:hover{background:var(--red-dark);box-shadow:0 8px 28px rgba(214,32,32,.5);transform:translateY(-2px)}
.cart-fab-count{background:white;color:var(--red);border-radius:12px;padding:2px 8px;font-size:13px;font-weight:900}

/* ── SCROLL TO TOP ───────────────────────────────── */
.scroll-top{position:fixed;bottom:24px;left:24px;z-index:400;width:40px;height:40px;background:white;color:#666;border:1.5px solid #ddd;border-radius:50%;font-size:16px;cursor:pointer;box-shadow:0 3px 12px rgba(0,0,0,.1);transition:all .2s;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(20px);pointer-events:none}
.scroll-top.vis{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top:hover{background:var(--red);color:white;border-color:var(--red)}

/* ── MOBILE FILTER BUTTON ────────────────────────── */
.mob-filter-btn{display:none;align-items:center;gap:6px;padding:7px 14px;border:1.5px solid #ddd;border-radius:20px;background:white;font-family:var(--fh);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;color:#555;transition:all .15s}
.mob-filter-btn:hover{border-color:var(--red);color:var(--red)}
.mob-filter-btn.has-filter{background:var(--red);color:white;border-color:var(--red)}

/* ── MOBILE FILTER SHEET ─────────────────────────── */
.mob-sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:450;display:flex;align-items:flex-end}
.mob-sheet{background:white;width:100%;border-radius:20px 20px 0 0;padding:20px;max-height:80vh;overflow-y:auto}
.mob-sheet-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mob-sheet-title{font-family:var(--fh);font-size:18px;font-weight:900;text-transform:uppercase}

/* ── COLOR FILTER CHIPS ──────────────────────────── */
.color-filter-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.color-chip{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 6px;border:1.5px solid #ddd;border-radius:20px;background:white;cursor:pointer;font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#666;transition:all .15s}
.color-chip:hover{border-color:var(--red);color:var(--red)}
.color-chip.on{border-color:var(--red);background:#fff0f0;color:var(--red)}
.color-chip-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.1)}

/* ── PRICE TABLE IN MODAL ────────────────────────── */
.price-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.price-table th{font-family:var(--fh);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#aaa;padding:5px 8px;border-bottom:1.5px solid #eee;text-align:center}
.price-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #f5f5f5;color:#555;font-size:12px}
.price-table tr.active-tier td{background:#fff5f5;color:var(--red);font-family:var(--fh);font-weight:800}
.price-table tr.active-tier td:first-child{border-radius:4px 0 0 4px}
.price-table tr.active-tier td:last-child{border-radius:0 4px 4px 0}

/* ── RELATED PRODUCTS ────────────────────────────── */
.related-wrap{padding:16px 20px;border-top:1px solid #eee}
.related-title{font-family:var(--fh);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:10px}
.related-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.related-scroll::-webkit-scrollbar{display:none}
.related-card{flex:0 0 80px;cursor:pointer;border:1.5px solid #eee;border-radius:8px;overflow:hidden;transition:all .15s;background:white}
.related-card:hover{border-color:var(--red);transform:translateY(-2px)}
.related-card-img{aspect-ratio:1;background:#f8f8f6;display:flex;align-items:center;justify-content:center;font-size:20px}
.related-card-name{font-family:var(--fh);font-size:9px;font-weight:800;text-transform:uppercase;padding:4px 5px;color:#333;line-height:1.2;text-align:center}

/* ── CART CTA HIERARCHY ──────────────────────────── */
.cart-cta-primary{width:100%;padding:14px;background:var(--red);color:white;border:none;border-radius:8px;font-family:var(--fh);font-size:15px;font-weight:900;text-transform:uppercase;cursor:pointer;letter-spacing:.5px;margin-bottom:8px;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.cart-cta-primary:hover{background:var(--red-dark)}
.cart-cta-secondary{width:100%;padding:10px;background:transparent;color:#888;border:1.5px solid #ddd;border-radius:8px;font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase;cursor:pointer;letter-spacing:.3px;transition:all .2s}
.cart-cta-secondary:hover{border-color:#bbb;color:#555}

/* ═══════════════════════════════════════════════════
   RESPONSIVE — TABLET  (769px–1024px)
═══════════════════════════════════════════════════ */
@media(min-width:769px) and (max-width:1024px){
  .layout{grid-template-columns:180px 1fr}
  .sidebar{padding:14px 0}
  .sb-item{font-size:11px;padding:8px 12px}
  .main{padding:18px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
  .cart{width:300px}
  .ph h1{font-size:34px}
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE — MÓVIL  (≤768px)
═══════════════════════════════════════════════════ */
@media(max-width:768px){

  /* ── Layout ── */
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}

  /* ── Nav ── */
  nav{padding:0 14px;height:52px}
  .nav-logo{font-size:16px}
  .nav-r{gap:6px}
  .nbtn-desktop{display:none}
  .nbtn.red{padding:7px 14px;font-size:13px}

  /* ── Main ── */
  .main{padding:12px}
  .ph h1{font-size:28px}
  .ph p{font-size:12px}
  .ph{margin-bottom:14px}

  /* ── Filtros ── */
  .mob-filter-btn{display:flex}
  .fb{gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .fb::-webkit-scrollbar{display:none}
  .service-chips{display:none}   /* chips ocultos → disponibles en sheet */
  .si{min-width:140px;flex:1;font-size:13px;padding:6px 12px}

  /* ── Color chips scroll ── */
  .color-filter-wrap{
    flex-wrap:nowrap;
    overflow-x:auto;
    padding-bottom:6px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .color-filter-wrap::-webkit-scrollbar{display:none}
  .color-chip{white-space:nowrap;font-size:11px;flex-shrink:0}

  /* ── Results bar ── */
  .results-bar{gap:6px}
  .sort-sel{font-size:11px;padding:4px 10px}

  /* ── Grid — 2 columnas ── */
  .grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important;width:100%;box-sizing:border-box}

  /* ── Card compacta móvil ── */
  .card{border-radius:10px;min-width:0;width:100%;box-sizing:border-box}
  .c-img{height:140px!important;aspect-ratio:unset!important;max-height:140px!important;min-height:140px!important;width:100%!important}
  .c-img img{max-height:140px!important;width:auto!important;object-fit:contain!important}
  .c-ph{width:100%!important;height:100%!important}
  .c-body{padding:7px 9px 9px;min-width:0}
  .c-name{font-size:12px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .c-sub{display:none}
  .c-dots{margin-bottom:4px;gap:3px}
  .cdot{width:10px;height:10px}
  .c-tags{display:none}
  .c-acts{grid-template-columns:1fr!important;gap:3px}
  .btn-ver{display:none}
  .btn-cot{font-size:11px;padding:7px 4px}
  .c-price{font-size:10px;padding:3px 7px;bottom:6px;right:6px}

  /* ── Skeleton ── */
  .skel-img{height:130px!important;aspect-ratio:unset!important}

  /* ── Modal — pantalla completa ── */
  .ov{padding:0;align-items:flex-end}
  .modal{
    width:100%!important;
    max-width:100%!important;
    max-height:96dvh;
    height:96dvh;
    border-radius:18px 18px 0 0!important;
    grid-template-columns:1fr!important;
    display:flex!important;
    flex-direction:column!important;
    overflow:hidden;
  }
  .modal::before{
    content:'';display:block;width:36px;height:4px;
    background:#ddd;border-radius:2px;
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    z-index:10;
  }
  .m-img{
    border-radius:0!important;
    min-height:0!important;
    height:auto!important;
    max-height:240px;
    flex-shrink:0;
    padding:20px 16px 12px!important;
  }
  .m-img-main{height:200px!important;max-height:200px!important}
  .m-img-main img{max-height:200px!important;width:auto!important;object-fit:contain!important}
  .m-body{
    padding:14px!important;
    overflow-y:auto;
    flex:1;
    -webkit-overflow-scrolling:touch;
  }
  .m-name{font-size:22px}
  .m-price{font-size:18px}
  .m-thumb{width:38px;height:38px}
  .modal .m-close{
    top:10px;right:12px;
    background:rgba(0,0,0,.5);
    width:30px;height:30px;font-size:13px;
  }
  .vchip,.sz{font-size:11px;padding:4px 9px}
  .related-wrap{grid-column:1!important}
  .price-table{font-size:11px}
  .price-table th,.price-table td{padding:4px 6px}
  .related-card{flex:0 0 70px}

  /* ── Cart — bottom sheet ── */
  .cart{
    width:100%!important;
    right:0!important;
    left:0!important;
    top:auto!important;
    bottom:0!important;
    height:75dvh!important;
    border-radius:18px 18px 0 0!important;
    border-left:none!important;
    border-top:2px solid #eee;
    box-shadow:0 -12px 40px rgba(0,0,0,.18)!important;
    transform:translateY(100%)!important;
    transition:transform .3s cubic-bezier(.32,0,.67,0)!important;
  }
  .cart.open{transform:translateY(0)!important;transition:transform .35s cubic-bezier(.34,1.1,.64,1)!important}
  .cart-hdr{padding:16px 16px 10px;border-bottom:1px solid #f0f0f0}
  .cart-hdr::before{
    content:'';display:block;width:36px;height:4px;
    background:#ddd;border-radius:2px;
    margin:0 auto 12px;
  }
  .cart-hdr h2{font-size:16px}
  .cart-body{padding:10px 14px}
  .cart-ft{padding:12px 14px}

  /* ── Floating cart ── */
  .cart-fab{
    left:12px!important;
    right:12px!important;
    bottom:max(14px,env(safe-area-inset-bottom))!important;
    width:auto!important;
    border-radius:14px!important;
    justify-content:center;
    font-size:14px;
    padding:13px 20px!important;
  }
  .scroll-top{
    display:none!important;   /* en móvil hay poco espacio — scroll es nativo */
  }

  /* ── Mi Pedido ── */
  #mi-pedido{padding:10px 12px!important}
  #mi-pedido > div{flex-direction:column!important;gap:8px!important}

  /* ── Banner ── */
  .merch-banner{gap:10px!important;padding:12px 14px!important}
  .merch-banner > div:first-child{font-size:28px!important}
  .merch-banner-btn{padding:8px 14px!important;font-size:12px!important}

  /* ── Filter sheet ── */
  .mob-sheet{padding:16px;border-radius:20px 20px 0 0;padding-bottom:max(20px,env(safe-area-inset-bottom))}
  .mob-sheet-title{font-size:17px}
}

/* ═══════════════════════════════════════════════════
   PHONE PEQUEÑO  (≤380px)
═══════════════════════════════════════════════════ */
@media(max-width:380px){
  .c-body{padding:7px}
  .c-name{font-size:13px}
  .grid{gap:6px}
  .main{padding:10px}
  nav{padding:0 10px}
  .nav-logo{font-size:14px}
}

/* ── ADD TO CART FEEDBACK ────────────────────────── */
.cart-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-16px);
  background:#1a1a1a;color:white;padding:10px 20px;border-radius:20px;
  font-family:var(--fh);font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;white-space:nowrap;z-index:600;opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;
  display:flex;align-items:center;gap:8px}
.cart-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.cart-toast-check{width:20px;height:20px;background:#22c55e;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

/* ── WHATSAPP FLOAT ──────────────────────────────── */
.wa-btn{position:fixed;right:24px;bottom:84px;z-index:350;transition:right .35s cubic-bezier(.34,1.1,.64,1);
  width:50px;height:50px;border-radius:50%;background:#25d366;
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(37,211,102,.45);transition:all .2s}
.wa-btn:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.55)}
.wa-btn svg{width:26px;height:26px;fill:white}
@media(max-width:768px){
  .wa-btn{right:14px;bottom:80px;width:44px;height:44px}
  .wa-btn svg{width:22px;height:22px}
}

/* ── EMPTY STATES ────────────────────────────────── */
.empty-state{text-align:center;padding:50px 20px;max-width:360px;margin:0 auto}
.empty-state-icon{font-size:52px;margin-bottom:14px;opacity:.5}
.empty-state-title{font-family:var(--fh);font-size:20px;font-weight:900;
  text-transform:uppercase;color:#333;margin-bottom:8px}
.empty-state-sub{font-size:13px;color:#888;line-height:1.6;margin-bottom:20px}
.empty-state-wa{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;
  background:#25d366;color:white;border:none;border-radius:8px;
  font-family:var(--fh);font-size:13px;font-weight:900;text-transform:uppercase;
  cursor:pointer;text-decoration:none;transition:background .15s}
.empty-state-wa:hover{background:#1ebe5a}

.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;padding:30px 20px;text-align:center}
.cart-empty-icon{font-size:44px;margin-bottom:10px;opacity:.4}
.cart-empty-title{font-family:var(--fh);font-size:16px;font-weight:900;
  text-transform:uppercase;color:#333;margin-bottom:6px}
.cart-empty-sub{font-size:12px;color:#aaa;line-height:1.5;margin-bottom:16px}
.cart-empty-cta{padding:9px 20px;background:var(--red);color:white;border:none;
  border-radius:8px;font-family:var(--fh);font-size:12px;font-weight:900;
  text-transform:uppercase;cursor:pointer;letter-spacing:.04em}
/* ── MI PEDIDO ────────────────────────────────────── */
.mip-wrap{padding:48px 28px;background:var(--black);margin-top:0}
.mip-inner{max-width:680px;margin:0 auto}
.mip-title{font-family:var(--fh);font-size:36px;font-weight:900;text-transform:uppercase;color:white;margin-bottom:6px;letter-spacing:-.5px}
.mip-title em{color:var(--red);font-style:normal}
.mip-sub{font-size:14px;color:#888;margin-bottom:28px}
.mip-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.mip-tab{padding:14px 16px;border:2px solid #333;border-radius:10px;cursor:pointer;transition:all .15s;background:#1e1e1e;text-align:left}
.mip-tab:hover{border-color:#555}
.mip-tab.on{border-color:var(--red);background:rgba(214,32,32,.08)}
.mip-tab-ico{font-size:22px;margin-bottom:6px}
.mip-tab-lbl{font-family:var(--fh);font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.3px;color:white}
.mip-tab-ex{font-size:11px;color:#666;margin-top:2px;font-family:var(--fb)}
.mip-tab.on .mip-tab-lbl{color:var(--red)}
.mip-field{margin-bottom:14px}
.mip-label{font-family:var(--fh);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#666;display:block;margin-bottom:6px}
.mip-input{width:100%;padding:13px 16px;background:#1e1e1e;border:1.5px solid #333;border-radius:8px;color:white;font-size:15px;font-family:var(--fb);outline:none;transition:border-color .2s;letter-spacing:.5px}
.mip-input:focus{border-color:var(--red);background:#222}

const KEY_THEME = "be_catalog_theme";
function applyTheme(raw){
  try{
    const theme = raw ? JSON.parse(raw) : null;
    if(!theme) return;
    const r = document.documentElement.style;
    const c = theme.colors || {};
    const f = theme.fonts  || {};
    if(c.primary)    r.setProperty("--red",     c.primary);
    if(c.navBg)      r.setProperty("--nav-bg",  c.navBg);
    if(c.pageBg)     r.setProperty("--page-bg", c.pageBg);
    if(c.cardBg)     r.setProperty("--card-bg", c.cardBg);
    if(c.textHead)   r.setProperty("--txt-h",   c.textHead);
    if(c.textBody)   r.setProperty("--txt-b",   c.textBody);
    if(c.textMuted)  r.setProperty("--txt-m",   c.textMuted);
    if(c.border)     r.setProperty("--brd",     c.border);
    if(c.price)      r.setProperty("--price-c", c.price);
    if(c.badge)      r.setProperty("--badge-bg",c.badge);
    // Fuentes — inyectar Google Font si no está cargada
    const allFonts=[f.headFamily,f.bodyFamily,f.subFamily,f.priceFamily,f.btnFamily].filter(Boolean);
    const unique=[...new Set(allFonts)];
    unique.forEach(font=>{
      const slug = font.replace(/ /g,"+");
      if(!document.querySelector(`link[data-gf="${slug}"]`)){
        const link=document.createElement("link");
        link.rel="stylesheet"; link.dataset.gf=slug;
        link.href=`https://fonts.googleapis.com/css2?family=${slug}:wght@400;500;600;700;800;900&display=swap`;
        document.head.appendChild(link);
      }
    });
    if(f.headFamily)  r.setProperty("--fh-cat",     `'${f.headFamily}',sans-serif`);
    if(f.headWeight)  r.setProperty("--fh-w",        f.headWeight);
    if(f.bodyFamily)  r.setProperty("--fb-cat",     `'${f.bodyFamily}',sans-serif`);
    if(f.bodyWeight)  r.setProperty("--fb-w",        f.bodyWeight);
    if(f.priceFamily) r.setProperty("--f-price",    `'${f.priceFamily}',sans-serif`);
    if(f.priceWeight) r.setProperty("--f-price-w",   f.priceWeight);
    if(f.btnFamily)   r.setProperty("--f-btn",      `'${f.btnFamily}',sans-serif`);
    if(f.btnWeight)   r.setProperty("--f-btn-w",     f.btnWeight);
    if(f.subFamily)   r.setProperty("--f-sub",      `'${f.subFamily}',sans-serif`);
    if(f.subWeight)   r.setProperty("--f-sub-w",     f.subWeight);
  }catch(e){}
}
// Aplicar al cargar

const cx = (n) => {
  if(!n) return "#ccc";
  // Match directo
  if(CHX[n]) return CHX[n];
  // Normalizar: minúsculas, sin acentos, sin puntos
  const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"").replace(/\s+/g," ").trim();
  const nn = norm(n);
  // Buscar en CHX por nombre normalizado
  for(const k in CHX){ if(norm(k)===nn) return CHX[k]; }
  // Expansión de abreviaturas comunes: "azul cielo" -> "a cielo", "azul rey" -> "a rey", etc
  const abrev = nn.replace(/^azul /,"a ").replace(/^gris /,"g ").replace(/^verde /,"v ");
  for(const k in CHX){ if(norm(k)===abrev) return CHX[k]; }
  // Y al revés: "a cielo" guardado, buscar "azul cielo"
  const expand = nn.replace(/^a /,"azul ").replace(/^g /,"gris ").replace(/^v /,"verde ");
  for(const k in CHX){ if(norm(k)===expand) return CHX[k]; }
  // Heurística por palabra clave de color
  if(nn.includes("blanc")) return "#FFFFFF";
  if(nn.includes("negro")||nn.includes("black")) return "#1a1a1a";
  if(nn.includes("azul")||nn.startsWith("a ")) return "#2255cc";
  if(nn.includes("gris")||nn.startsWith("g ")) return "#888888";
  if(nn.includes("verde")||nn.startsWith("v ")) return "#2a8a3a";
  if(nn.includes("rojo")||nn.includes("red")) return "#d62020";
  if(nn.includes("rosa")||nn.includes("pink")) return "#e890b0";
  if(nn.includes("plumbago")||nn.includes("plomo")) return "#4a5a7a";
  if(nn.includes("cielo")) return "#82caee";
  if(nn.includes("marino")) return "#1a2a4a";
  if(nn.includes("amarillo")||nn.includes("yellow")) return "#ffe000";
  if(nn.includes("naranja")||nn.includes("orange")) return "#e06a20";
  return "#ccc";
};

async function sbLoadCatalog(setProds, setBrands, setImgs, setTenantNombre){
  try{
    const [{data:p, error:pe},{data:m},{data:t}] = await Promise.all([
      sbCat.from("productos").select("*").eq("active",true).eq("tenant_id",TENANT_ID_CAT).order("id"),
      sbCat.from("marcas").select("*").eq("tenant_id",TENANT_ID_CAT).order("name"),
      sbCat.from("tenants").select("nombre").eq("id",TENANT_ID_CAT).maybeSingle()
    ]);
    if(pe) console.error("❌ productos RLS:", pe.message);
    if(t?.nombre && setTenantNombre){
      setTenantNombre(t.nombre);
      try{var tid2=localStorage.getItem("be_catalog_tenant")||TENANT_ID_CAT||"default";localStorage.setItem("lana_tenant_nombre_"+tid2,t.nombre);}catch(e){}
    }
    if(p?.length){
      const prods=p.map(dbToProdCat);
      setProds(prods);
      const imgMap={};
      p.forEach(r=>{
        if(r.main_img){ imgMap[r.id]=r.main_img; }
        else if(r.imgs?.length>0&&r.imgs[0]?.src){ imgMap[r.id]=r.imgs[0].src; }
      });
      if(Object.keys(imgMap).length) setImgs(prev=>({...prev,...imgMap}));
    }
    if(m?.length){ const brands=m.map(dbToMarcaCat); setBrands(brands); }
  }catch(e){ console.error("sbLoadCatalog error:",e); }
}

}

        const inTags=pTags.some(function(t){return t.toLowerCase().includes(q);});
        if(!inName&&!inSub&&!inMat&&!inColors&&!inSvcs&&!inTags)return false;
      }
      return true;
    });

  const goConfigurador=()=>{
    const shapeCatMap = {
      "Corporativa":"camisa","Ecológica":"camisa","Performance":"camisa",
      "Sport":"playera","Chamarra & Chaleco":"chamarra",
      "Gourmet":"delantal","Clínica":"delantal",
      "Bottoms":"pantalon","Seguridad Industrial":"camisa",
      "Gorras":"gorra","Gorra":"gorra","Sudaderas":"sudadera","Chamarras":"chamarra",
    };
    const cartWithShapeCat = cart.map(function(it){
      var prod = prods.find(function(p){return p.id===it.pid;});
      var shapeCat = (prod&&prod.shapeCat)||shapeCatMap[(prod&&prod.cat)||it.cat]||it.shapeCat||'camisa';
      var imgUrl = null;
      if(prod&&prod.imgs&&Array.isArray(prod.imgs)&&it.color){
        var norm2=function(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();};
        var found2=prod.imgs.find(function(im){return norm2(im.color)===norm2(it.color);});
        if(!found2) found2=prod.imgs.find(function(im){return norm2(im.color).includes(norm2(it.color))||norm2(it.color).includes(norm2(im.color));});
        if(found2) imgUrl=found2.src;
      }
      if(!imgUrl) imgUrl=(prod&&imgs&&imgs[prod.id])||(prod&&prod.main_img)||it.imgUrl||null;
      // Calcular precio con escala (replicando calcPrecioItem de CartPanel)
      var precioUnit2 = (function(){
        if(!prod) return null;
        // Fix: usar solo la cantidad de este producto, no el total del carrito
        var totalQty=cart.filter(function(x){return x.pid===it.pid;}).reduce(function(a,x){return a+(parseInt(x.qty)||1);},0);
        if(!totalQty) totalQty=parseInt(it.qty)||1;
        // calcEscalas inline
        var escalas2=[];
        if(Array.isArray(prod.escalas)) escalas2=prod.escalas;
        else if(prod.escalas&&typeof prod.escalas==="object"){
          var map2=[["p1_5",1,5],["p6_20",6,20],["p21_50",21,50],["p51_100",51,100],["p101",101,null]];
          escalas2=map2.filter(function(k){return prod.escalas[k[0]];}).map(function(k){return {min:k[1],max:k[2],precio:prod.escalas[k[0]]};});
        }
        // Fallback: usar precios_grupo si no hay escalas
        if(!escalas2.length&&prod.precios_grupo){
          var pgKeys2=Object.keys(prod.precios_grupo).map(Number).sort(function(a,b){return a-b;});
          for(var ki2=pgKeys2.length-1;ki2>=0;ki2--){
            if(totalQty>=pgKeys2[ki2]) return prod.precios_grupo[pgKeys2[ki2]]+(prod.sizeRecargos&&it.size?(parseFloat(prod.sizeRecargos[it.size])||0):0);
          }
        }
        if(!escalas2.length) return prod.desde||null;
        // calcPrecioEnEscala inline
        var sorted2=escalas2.slice().sort(function(a,b){return (parseInt(a.min)||1)-(parseInt(b.min)||1);});
        var idx2=sorted2.findIndex(function(e){
          var mn=parseInt(e.min)||1,mx=e.max===null||e.max===undefined?Infinity:parseInt(e.max);
          return totalQty>=mn&&totalQty<=mx;
        });
        if(idx2===-1) idx2=sorted2.length-1;
        var precioBase2=sorted2[idx2]?parseFloat(sorted2[idx2].precio)||null:null;
        if(!precioBase2) return prod.desde||null;
        // Recargo por talla
        var recargo2=prod.sizeRecargos&&it.size?(parseFloat(prod.sizeRecargos[it.size])||0):0;
        return precioBase2+recargo2;
      })();
      if(!precioUnit2 && prod && prod.desde) precioUnit2 = prod.desde;
      return Object.assign({},it,{shapeCat:shapeCat,imgUrl:imgUrl,precioUnit:precioUnit2||null});
    });
    window._lanaGoConfig = goConfigurador; // exponer para ChatSelector
    localStorage.setItem("be_cfg_cart", JSON.stringify(cartWithShapeCat));
    localStorage.setItem("be_catalog_tenant", TENANT_ID_CAT);

          ruta: "catalogo",
          historial: historialActual.slice(-20),
          prendas: cartWithShapeCat,
          paso: "config"
        }));
      }
    } catch(e) {}
    window.location.href="configurador.html?desde=catalogo";
  };

              var matHint = "";

              if(pConMat) matHint = pConMat.mat;
              return(
                <div>
                  {/* Botón volver */}
                  <button onClick={function(){ setLineaVista(null); }}
                    style={{display:"inline-flex",alignItems:"center",gap:"6px",marginBottom:"16px",
                      padding:"7px 14px",border:"1px solid #e0ddd8",borderRadius:"20px",
                      background:"white",color:"#666",fontFamily:"var(--fb)",fontSize:"13px",cursor:"pointer"}}>
                    ← Todas las colecciones
                  </button>
                  <div style={{marginBottom:"20px"}}>
                    <div style={{fontFamily:"var(--fh)",fontSize:"22px",fontWeight:900,color:"#1a1a1a",letterSpacing:".02em"}}>
                      {lineaVista==="__sin__"?"Sin categoría":lineaVista}
                    </div>
                    {matHint&&<div style={{fontSize:"13px",color:"#888",marginTop:"3px"}}>{matHint}</div>}
                    <div style={{fontSize:"12px",color:"#bbb",marginTop:"4px"}}>{ps.length} modelo{ps.length!==1?"s":""}</div>
                  </div>
                  <div className="grid">
                    {ps.map(function(p){ return <Card key={p.id} p={p} img={imgs[p.id]} onOpen={function(){ setSel(p); }} onBuy={function(p){ setBuyProd(p); }}/>; })}
                  </div>
                </div>
              );
            }

            // PANTALLA 1 — Tarjetas de línea (si hay múltiples líneas y sin búsqueda)
            if(claves.length > 1 && !search && lineaFil==="all"){
              return(
                <div>
                  <div style={{fontSize:"13px",color:"#888",marginBottom:"16px"}}>
                    Elige una colección para ver sus modelos
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(280px,45vw),1fr))",gap:"12px"}}>
                    {claves.map(function(ln){
                      var ps = grupos[ln];
                      if(!ps||!ps.length) return null;
                      var mainImg = null;
                      for(var i=0;i<ps.length;i++){ if(imgs[ps[i].id]){ mainImg=imgs[ps[i].id]; break; } }
                      var matHint="";
                      var pConMat=ps.find(function(p){ return p.mat&&p.mat.trim(); });
                      if(pConMat) matHint=pConMat.mat.split("·")[0].trim();
                      var colores=[];
                      ps.forEach(function(p){
                        (p.colors||[]).forEach(function(col){
                          if(colores.indexOf(col)===-1) colores.push(col);
                        });
                      });
                      var nombre = ln==="__sin__"?"Sin categoría":ln;
                      return(
                        <div key={ln} onClick={function(){ setLineaVista(ln); }}
                          style={{background:"white",border:"none",borderRadius:"16px",
                            overflow:"hidden",cursor:"pointer",transition:"box-shadow .15s",
                            boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}
                          onMouseEnter={function(e){ e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,.12)"; }}
                          onMouseLeave={function(e){ e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,.06)"; }}>
                          {/* Imagen */}
                          <div className="linea-card-img" style={{height:"240px",background:"#f7f6f3",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
                            {mainImg
                              ?<img src={mainImg} alt={nombre}
                                style={{width:"100%",height:"100%",objectFit:"contain",padding:"12px"}}/>
                              :<div style={{fontSize:"40px",opacity:.25}}>👔</div>
                            }
                            {/* Badge modelos */}
                            <div style={{position:"absolute",top:"8px",right:"8px",
                              background:"rgba(0,0,0,.45)",color:"white",fontSize:"10px",
                              padding:"2px 7px",borderRadius:"3px"}}>
                              {ps.length} modelo{ps.length!==1?"s":""}
                            </div>
                            {/* Badge tipo de prenda */}
                            {(function(){
                              var p0=ps[0];
                              var cat=p0&&(p0.sub||p0.cat);
                              if(!cat) return null;
                              return <div style={{position:"absolute",top:"8px",left:"8px",background:"rgba(0,0,0,.55)",color:"white",fontFamily:"var(--fh)",fontSize:"9px",fontWeight:700,letterSpacing:".5px",textTransform:"uppercase",padding:"2px 7px",borderRadius:"3px",backdropFilter:"blur(4px)"}}>{cat}</div>;
                            })()}
                            {/* Precio en imagen */}
                            {desdeP>0&&<div style={{position:"absolute",bottom:"8px",right:"8px",background:"var(--price-c)",color:"white",fontFamily:"var(--fh)",fontSize:"11px",fontWeight:800,padding:"3px 9px",borderRadius:"4px",boxShadow:"0 2px 8px rgba(0,0,0,.3)",letterSpacing:".3px"}}>{"Desde $"+desdeP.toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0})+"/pza"}</div>}
                          </div>
                          {/* Info */}
                          <div style={{padding:"10px 12px"}}>
                            <div style={{fontFamily:"var(--fh)",fontSize:"16px",fontWeight:900,
                              color:"#1a1a1a",textTransform:"uppercase",letterSpacing:".03em",marginBottom:"2px"}}>
                              {nombre}
                            </div>
                            {matHint&&<div style={{fontSize:"11px",color:"#aaa",marginBottom:"6px",
                              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                              {matHint}
                            </div>}
                            {/* Swatches del producto con más colores */}
                            {(function(){
                              var prodMaxCol = ps.reduce(function(best,p){
                                return (p.colors&&p.colors.length>(best.colors&&best.colors.length||0))?p:best;
                              }, ps[0]);
                              var cols = prodMaxCol&&prodMaxCol.colors||[];
                              var mapa = prodMaxCol&&prodMaxCol.colorMap||{};
                              if(!cols.length) return null;
                              return(
                                <div style={{display:"flex",gap:"4px",flexWrap:"wrap",alignItems:"center"}}>
                                  {cols.slice(0,10).map(function(col,ci){
                                    var hex = mapa[col]||col||"#ccc";
                                    return <div key={ci} title={col} style={{width:"13px",height:"13px",borderRadius:"50%",
                                      background:hex,border:"0.5px solid rgba(0,0,0,.12)",flexShrink:0}}/>;
                                  })}
                                  {cols.length>10&&<span style={{fontSize:"10px",color:"#bbb"}}>+{cols.length-10}</span>}
                                </div>
                              );
                            })()}
                            {/* Precio desde */}
                            {(function(){
                              var precioMin = null;
                              ps.forEach(function(p){
                                var escalas = Array.isArray(p.escalas) ? p.escalas.filter(function(e){return e.precio;}) : [];
                                if(!escalas.length && p.escalas && typeof p.escalas==="object"){
                                  var map=[["p1_5","1-5"],["p6_20","6-20"],["p21_50","21-50"],["p51_100","51-100"],["p101","101+"]];
                                  escalas=map.filter(function(k){return p.escalas[k[0]];}).map(function(k){return {precio:p.escalas[k[0]]};});
                                }
                                if(!escalas.length) return;
                                var recValsCol = p.sizeRecargos ? Object.values(p.sizeRecargos).map(function(r){return parseFloat(r)||0;}).filter(function(r){return r>0;}) : [];
                                var recMinCol = recValsCol.length>0 ? Math.min.apply(null,recValsCol) : 0;
                                var minEscala = escalas.reduce(function(min,e){
                                  var pr = parseFloat(e.precio)||0;
                                  return pr>0&&(min===null||pr<min)?pr:min;
                                }, null);
                                // sin recargo en precio minimo coleccion
                                if(minEscala!==null&&(precioMin===null||minEscala<precioMin)) precioMin=minEscala;
                              });
                              if(precioMin===null) return null;
                              return(
                                <div style={{marginTop:"8px",fontSize:"15px",color:"var(--red)",fontFamily:"var(--fh)",fontWeight:700}}>
                                  Desde ${Number(precioMin).toFixed(2)}<span style={{fontWeight:400,color:"#aaa",fontSize:"12px"}}>/pza</span>
                                </div>
                              );
                            })()}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            }

            // Grid plano — búsqueda activa o una sola línea
            return(
              <div className="grid">
                {filtered.map(function(p){ return <Card key={p.id} p={p} img={imgs[p.id]} onOpen={function(){ setSel(p); }} onBuy={function(p){ setBuyProd(p); }}/>; })}
              </div>
            );
          })()}
        </main>
      </div>

      {sel&&<Modal p={sel} img={imgs[sel.id]} brands={brands} prods={prods} onClose={()=>setSel(null)} onAdd={addToCart} onOpenRelated={(p)=>{setSel(null);setTimeout(()=>setSel(p),50);}}/>}
      {buyProd&&<ModalConfigurador p={buyProd} img={imgs[buyProd.id]} arteConfig={arteConfig} onClose={()=>setBuyProd(null)}/>}
      {showCustom&&<ModalPrendaPropia onAdd={item=>{addToCart(item);setShowCustom(false);}} onClose={()=>setShowCustom(false)}/>}
      {showCotSinDiseno&&<ModalCotSinDiseno cart={cart} prods={prods} onClose={()=>setShowCotSinDiseno(false)} onDone={()=>{setShowCotSinDiseno(false);setCart([]);setCartOpen(false);}}/>}
      {(function(){ if(typeof document!=="undefined"){ if(cartOpen) document.body.classList.add("cart-open"); else document.body.classList.remove("cart-open"); } return null; })()}
      <CartPanel cart={cart} open={cartOpen} onClose={()=>setCartOpen(false)} onRm={rmCart} onGoConfig={goConfigurador} onGoConfigPro={goConfiguradorPro} onAddCustom={()=>setShowCustom(true)} prods={prods} imgs={imgs} onCotizarSinDiseno={()=>setShowCotSinDiseno(true)} onExplore={()=>setCartOpen(false)}/>

      {/* CART ADDED TOAST */}
      <div className={`cart-toast${cartToast.show?' show':''}`}>
        <div className="cart-toast-check">✓</div>
        {cartToast.name} agregado
      </div>

      {/* WHATSAPP FLOTANTE */}


      {/* FLOATING CART BADGE */}
      <button className={`cart-fab${cartCount>0&&!cartOpen?' vis':''}`}
        onClick={()=>setCartOpen(true)}>
        🛒 Mi cotización
        <span className="cart-fab-count">{cartCount} pzs</span>
      </button>

      {/* SCROLL TO TOP */}
      <button className={`scroll-top${showScrollTop?' vis':''}`}
        onClick={()=>window.scrollTo({top:0,behavior:'smooth'})}
        title="Ir arriba">↑</button>

      {/* MOBILE FILTER SHEET */}
      {mobileFilterOpen&&(
        <div className="mob-sheet-ov" onClick={()=>setMobileFilterOpen(false)}>
          <div className="mob-sheet" onClick={e=>e.stopPropagation()}>
            <div className="mob-sheet-hdr">
              <div className="mob-sheet-title">Filtros</div>
              <button onClick={()=>setMobileFilterOpen(false)}
                style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#999"}}>✕</button>
            </div>
            <div style={{marginBottom:"16px"}}>
              <div className="sb-label">¿Para qué ocasión?</div>
              {OC_CATS.map(function(c){
                return(
                  <div key={c.id} className={`sb-item${cat===c.id?" active":""}`}
                    onClick={function(){setCat(c.id);setMobileFilterOpen(false);}}>
                    {c.icon} {c.label}
                  </div>
                );
              })}
            </div>
            <div style={{marginBottom:"16px"}}>
              <div className="sb-label">Tipo de prenda</div>
              {SC_CATS.map(function(c){
                return(
                  <div key={c.id} className={`sb-item${shapeFil===c.id?" active":""}`}
                    onClick={function(){setShapeFil(c.id);setMobileFilterOpen(false);}}>
                    {c.icon} {c.label}
                  </div>
                );
              })}
            </div>
            <div style={{marginBottom:"16px"}}>
              <div className="sb-label">Técnica</div>
              {["all","Bordado","Serigrafía","Sublimación","Vinil Textil","DTF"].map(function(s){
                return(
                  <div key={s} className={`sb-item${svc===s?" active":""}`}
                    onClick={function(){setSvc(s);setMobileFilterOpen(false);}}>
                    {s==="all"?"Todas las técnicas":s}
                  </div>
                );
              })}
            </div>
            <div style={{marginBottom:"16px"}}>
              <div className="sb-label">Marca</div>
              <div className={`sb-item${!brandFilter?" active":""}`} onClick={function(){setBrandFilter(null);setMobileFilterOpen(false);}}>
                🏷 Todas las marcas
              </div>
              {brands.filter(function(b){return b.active!==false;}).map(function(b){
                return(
                  <div key={b.id} className={`sb-item sb-brand${brandFilter===b.id?" active":""}`}
                    onClick={function(){setBrandFilter(b.id);setMobileFilterOpen(false);}}>
                    👕 {b.name}
                  </div>
                );
              })}
            </div>
            <div style={{marginBottom:"16px"}}>
              <div className="sb-label">Color</div>
              <div className="color-filter-wrap" style={{padding:"0 18px"}}>
                <button className={`color-chip${colorFilter==="all"&&!lanaColorFiltro?" on":""}`}
                  onClick={function(){
                    setColorFilter("all");
                    setLanaColorFiltro(null);
                    setLanaVistaActiva(false);
                    setChatFilter(null);
                    setMobileFilterOpen(false);
                  }}>Todos</button>
                {allColors.slice(0,20).map(c=>(
                  <button key={c} className={`color-chip${(lanaColorFiltro===c||colorFilter===c)?" on":""}`}
                    onClick={function(){
                      var mismo=(lanaColorFiltro===c||colorFilter===c);
                      if(mismo){
                        setColorFilter("all");
                        setLanaColorFiltro(null);
                        setLanaVistaActiva(false);
                        setChatFilter(null);
                      } else {
                        setColorFilter(c);
                        setLanaColorFiltro(c);
                        setLanaVistaActiva(true);
                        setLineaVista(null);
                        // Filtrar productos con ese color
                        var normC2=function(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");};
                        var cl2=normC2(c);
                        var colorMatch2=function(a,b){
                          var na=normC2(a),nb=normC2(b);
                          return nb.indexOf(na)>=0||na.indexOf(nb)>=0;
                        };
                        var ids2=prods.filter(function(p){
                          if(!p.active) return false;
                          var enColors=(p.colors||[]).some(function(pc){return colorMatch2(c,pc);});
                          var enImgs=p.imgs&&p.imgs.some(function(im){return colorMatch2(c,im.color||"");});
                        // También verificar que haya foto con ese color
                        if(!enImgs) enImgs=p.imgs&&p.imgs.some(function(im){var ic=normC2(im.color||"");return ic.indexOf(normC2(c))>=0||normC2(c).indexOf(ic)>=0;});
                          return enColors||enImgs;
                        }).map(function(p){return p.name;});
                        setChatFilter({ids:ids2,label:ids2.length+" prendas en "+c});
                      }
                      setMobileFilterOpen(false);
                    }}>
                    <span className="color-chip-dot" style={{background:cx(c)}}/>
                    {c}
                  </button>
                ))}
              </div>
            </div>
            <button onClick={function(){setCat("all");setSvc("all");setColorFilter("all");setShapeFil("all");setBrandFilter(null);setLanaColorFiltro(null);setLanaVistaActiva(false);setChatFilter(null);setMobileFilterOpen(false);}}
              style={{width:"100%",padding:"12px",background:"#f5f5f5",border:"none",borderRadius:"8px",
                fontFamily:"var(--fh)",fontSize:"13px",fontWeight:700,textTransform:"uppercase",cursor:"pointer",color:"#666"}}>
              Limpiar filtros
            </button>
          </div>
        </div>
      )}
      {adminOpen&&(
        adminAuth
          ?<AdminPanel prods={prods} imgs={imgs} onUpd={updProd} onDel={delProd} onAdd={addProd} onImg={updImg} onDelImg={delImg} onClose={()=>setAdminOpen(false)}/>
          :<LoginPanel onAuth={p=>{if(p===ADMIN_PASS)setAdminAuth(true);else alert("Contraseña incorrecta");}} onClose={()=>setAdminOpen(false)}/>
      )}

      {/* ── CHAT IA ── */}
      <ChatIA prods={prods} imgs={imgs} open={chatOpen} setOpen={setChatOpen} arteConfig={arteConfig} iaConfig={iaConfig} cart={cart} addToCart={addToCart} setChatFilter={setChatFilter} setLanaVistaActiva={setLanaVistaActiva} setLanaColorFiltro={setLanaColorFiltro} setCat={setCat} setSvc={setSvc} setSearch={setSearch} lineaVista={lineaVista} tipoFil={cat} searchTerm={search} generoFil={generoFil}/>
    </div>
  );
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
const CAT_COLOR={"Corporativa":"#2255cc","Ecológica":"#2a8a3a","Performance":"#e06a20","Bottoms":"#7a4a2a","Sport":"#d62020","Chamarra & Chaleco":"#4a4a8a","Seguridad Industrial":"#e0a020","Gourmet":"#8a4a20","Clínica":"#2a8a7a"};
// Tipos de prenda para el sidebar
// Ocasiones — navegación principal del catálogo
const OC_CATS = [
  {id:"all",                    label:"Todo el catálogo",      icon:"🏪"},
  {id:"Corporativo / Empresa",  label:"Corporativo / Empresa", icon:"🏢"},
  {id:"Restaurante / Gourmet",  label:"Restaurante / Gourmet", icon:"🍽"},
  {id:"Deportivo / Equipos",    label:"Deportivo / Equipos",   icon:"⚽"},
  {id:"Industrial / Seguridad", label:"Industrial / Seguridad",icon:"🦺"},
  {id:"Clínica / Salud",        label:"Clínica / Salud",       icon:"🏥"},
  {id:"Eventos / Promocional",  label:"Eventos / Promocional", icon:"🎪"},
  {id:"Escolar",                label:"Escolar",               icon:"🎒"},
];

// Mapa de migración categorías viejas → nuevas ocasiones
const OC_MIGRATION = {
  "Corporativa":"Corporativo / Empresa",
  "Performance":"Deportivo / Equipos",
  "Sport":"Deportivo / Equipos",
  "Seguridad Industrial":"Industrial / Seguridad",
  "Gourmet":"Restaurante / Gourmet",
  "Clínica":"Clínica / Salud",
  "Chamarra & Chaleco":"Corporativo / Empresa",
  "Bottoms":"Corporativo / Empresa",
  "Ecológica":"Eventos / Promocional",
  "Gorras":"Corporativo / Empresa",
  "Otros":"Corporativo / Empresa",
};

// Obtener ocasión normalizada de un producto
function getOcasion(p){
  var cat = p.cat||"";
  return OC_MIGRATION[cat]||cat||"Corporativo / Empresa";
}

// Tipo de prenda — segundo nivel de filtro
const SC_CATS = [
  {id:"all",      label:"Todos los tipos",    icon:"✨"},
  {id:"camisa",   label:"Camisas / Blusas",   icon:"👔"},
  {id:"playera",  label:"Playeras / Polos",   icon:"👕"},
  {id:"sudadera", label:"Sudaderas / Hoodies",icon:"🧥"},
  {id:"chamarra", label:"Chamarras",          icon:"🥻"},
  {id:"gorra",    label:"Gorras / Caps",      icon:"🧢"},
  {id:"pantalon", label:"Pantalones",         icon:"👖"},
  {id:"delantal", label:"Batas / Delantales", icon:"🥼"},
];

function Sidebar({active,onChange,prods,brandFilter,onBrand,svc,onSvc,shapeFil,onShape,generoFil,onGenero,lineaVista}){
  var SVCS = ["Bordado","Serigrafía","Sublimación","Vinil Textil","DTF"];

  var cntActivos = prods.filter(function(p){ return p.active; }).length;

  // Conteo por género
  var cntCab = prods.filter(function(p){
    if(!p.active) return false;
    var n=(p.name||"").toLowerCase(); var v=(p.variants||[]).map(function(x){ return (x||"").toLowerCase(); });
    return n.indexOf("caballero")!==-1||v.some(function(x){ return x.indexOf("caballero")!==-1||x.indexOf("hombre")!==-1; });
  }).length;
  var cntDama = prods.filter(function(p){
    if(!p.active) return false;
    var n=(p.name||"").toLowerCase(); var v=(p.variants||[]).map(function(x){ return (x||"").toLowerCase(); });
    return n.indexOf("dama")!==-1||n.indexOf("blusa")!==-1||v.some(function(x){ return x.indexOf("dama")!==-1||x.indexOf("mujer")!==-1; });
  }).length;

  return(
    <div className="sidebar">

      {/* OCASIÓN */}
      <div className="sb-label">¿Para qué ocasión?</div>
      {OC_CATS.map(function(oc){
        var count = oc.id==="all"
          ? cntActivos
          : prods.filter(function(p){ return p.active && getOcasion(p)===oc.id; }).length;
        if(oc.id!=="all" && count===0) return null;
        return(
          <div key={oc.id} className={`sb-item${active===oc.id?" active":""}`}
            onClick={function(){ onChange(oc.id); }}>
            <span style={{fontSize:"15px",flexShrink:0}}>{oc.icon}</span>
            <span style={{flex:1}}>{oc.label}</span>
            <span className="sb-count">{count}</span>
          </div>
        );
      })}

      {/* GÉNERO */}
      <div className="sb-divider"/>
      <div className="sb-label">Género</div>
      {[
        {id:"all",   label:"Todos",      icon:"👥", cnt:cntActivos},
        {id:"caballero", label:"Caballero", icon:"👔", cnt:cntCab},
        {id:"dama",  label:"Dama",       icon:"👗", cnt:cntDama},
      ].map(function(g){
        if(g.id!=="all" && g.cnt===0) return null;
        return(
          <div key={g.id} className={`sb-item${generoFil===g.id?" active":""}`}
            onClick={function(){ onGenero(g.id); }}>
            <span style={{fontSize:"15px",flexShrink:0}}>{g.icon}</span>
            <span style={{flex:1}}>{g.label}</span>
            <span className="sb-count">{g.cnt}</span>
          </div>
        );
      })}

      {/* TIPO DE PRENDA — siempre visible */}
      <div className="sb-divider"/>
      <div className="sb-label">Tipo de prenda</div>
      {SC_CATS.map(function(sc){
        var count = sc.id==="all"
          ? prods.filter(function(p){ return p.active; }).length
          : prods.filter(function(p){ return p.active&&(p.shapeCat||"camisa")===sc.id; }).length;
        if(sc.id!=="all" && count===0) return null;
        return(
          <div key={sc.id} className={`sb-item${shapeFil===sc.id?" active":""}`}
            onClick={function(){ onShape(sc.id); }}>
            <span style={{fontSize:"15px",flexShrink:0}}>{sc.icon}</span>
            <span style={{flex:1}}>{sc.label}</span>
            <span className="sb-count">{count}</span>
          </div>
        );
      })}

      {/* TÉCNICA — solo cuando se está viendo una colección */}
      {lineaVista&&(
        <div>
          <div className="sb-divider"/>
          <div className="sb-label">Técnica</div>
          <div className={`sb-item${svc==="all"?" active":""}`} onClick={function(){ onSvc("all"); }}>
            <span style={{fontSize:"15px",flexShrink:0}}>✨</span>
            <span style={{flex:1}}>Todas</span>
          </div>
          {SVCS.map(function(s){
            var cnt = prods.filter(function(p){ return p.active&&(p.services||[]).includes(s); }).length;
            if(!cnt) return null;
            var icons = {"Bordado":"🪡","Serigrafía":"🖨","Sublimación":"🎨","Vinil Textil":"✂️","DTF":"🖼"};
            return(
              <div key={s} className={`sb-item${svc===s?" active":""}`} onClick={function(){ onSvc(s); }}>
                <span style={{fontSize:"15px",flexShrink:0}}>{icons[s]||"⚙️"}</span>
                <span style={{flex:1}}>{s}</span>

  const [saving,  setSaving]  = useState(false);

  // Calcular precio según escalas
  const calcPrecio = useCallback(function(qty){
    var escalas = [];
    if(Array.isArray(p.escalas)){
      escalas = p.escalas.filter(function(e){ return e.precio; });
    } else if(p.escalas && typeof p.escalas === "object"){
      var map=[["p1_5",1,5],["p6_20",6,20],["p21_50",21,50],["p51_100",51,100],["p101",101,null]];
      map.forEach(function(m){
        if(p.escalas[m[0]]) escalas.push({min:m[1],max:m[2],precio:p.escalas[m[0]]});
      });
    }
    var precio = p.desde ? parseFloat(p.desde) : 0;
    escalas.forEach(function(e){
      if(qty >= e.min && (e.max === null || qty <= e.max)){
        precio = parseFloat(e.precio);
      }
    });
    return precio;
  }, [p]);

  // Calcular costo de personalización
  const calcArte = useCallback(function(tec, qty){
    if(tec === "sin_personalizacion" || !arteConfig) return 0;
    var key = tec.toLowerCase().replace(/í/g,"i").replace(/é/g,"e").replace(/ó/g,"o").replace(/á/g,"a").replace(/ú/g,"u").replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
    var cfg = arteConfig[key];
    if(!cfg || !cfg.activa) return 0;
    // Buscar precio en rangos o tabla
    var precio = 0;
    if(cfg.rangos && cfg.rangos.length){
      cfg.rangos.forEach(function(r){
        if(qty >= (r.min||1) && (r.max === null || qty <= (r.max||9999))){
          precio = parseFloat(r.precio||0);
        }
      });
    } else if(cfg.tabla && cfg.tabla.length){
      var row = cfg.tabla[0];
      precio = parseFloat(row.precio || row.precio_capa || 0);
    }
    return precio;
  }, [arteConfig]);

  const precioPrenda = calcPrecio(piezas);

function Modal({p,img,brands=[],prods=[],onClose,onAdd,onOpenRelated}){
  // Imágenes por color/variante desde admin (imgs: [{key, color, variant, src}])
  const allImgs = useMemo(()=>{
    const arr=[];
    const mainSrc = img || p.main_img || null;
    if(p.imgs && Array.isArray(p.imgs)){
      p.imgs.forEach((im,i)=>{
        if(im.src) arr.push({...im,key:im.key||`v${i}`});
      });
    }
    if(mainSrc && !arr.some(im=>im.src===mainSrc)){
      arr.unshift({src:mainSrc,label:"Principal",key:"main"});
    }
    if(arr.length===0 && mainSrc){
      arr.push({src:mainSrc,label:"Principal",key:"main"});
    }
    return arr;
  },[img,p.imgs,p.main_img]);

  // Comparación normalizada de colores (Azul Cielo == azul cielo == A. Cielo)
  const sameColor = (a,b) => {
    if(!a||!b) return false;
    const norm = s => String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"").replace(/\s+/g," ").trim();
    const na=norm(a), nb=norm(b);
    if(na===nb) return true;
    // expandir abreviaturas en ambos sentidos
    const exp = s => s.replace(/^a /,"azul ").replace(/^g /,"gris ").replace(/^v /,"verde ");
    return exp(na)===exp(nb);
  };
  // Encuentra el índice de imagen para un color (y opcionalmente variante)
  const findImgIdx = (c, v) => {
    if(v){
      const exact = allImgs.findIndex(im=>sameColor(im.color,c) && im.variant===v);
      if(exact>=0) return exact;
    }
    const byColor = allImgs.findIndex(im=>sameColor(im.color,c));
    return byColor;
  };

  // Variantes disponibles: las que tienen imagen asignada (con variante)
  // Si ninguna imagen tiene variante, usar p.variants como fallback
  const availVariants = useMemo(()=>{
    const fromImgs = [...new Set(allImgs.filter(im=>im.variant).map(im=>im.variant))];
    if(fromImgs.length>0) return fromImgs;
    return p.variants||[];
  },[allImgs, p.variants]);

  // Colores disponibles para la variante seleccionada:
  // las imágenes que tienen esa variante + color asignados
  const getColorsForVariant = (v) => {
    const fromImgs = [...new Set(allImgs.filter(im=>im.variant===v && im.color).map(im=>im.color))];
    if(fromImgs.length>0) return fromImgs;
    // fallback: si no hay imágenes con esa variante, usar todos los colores
    return p.colors||[];
  };

  const [variant,setVariant]=useState(availVariants[0]||p.variants?.[0]||"");
  const availColors = getColorsForVariant(activeModel);
  const [activeImg,setActiveImg]=useState(0);

  // Sincronizar imagen cuando cambia el color seleccionado (robusto)
  useEffect(()=>{
    if(!color) return;
    const idx = allImgs.findIndex(im=>{
      const norm = s => String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\./g,"").replace(/\s+/g," ").trim();
      const exp = s => norm(s).replace(/^a /,"azul ").replace(/^g /,"gris ").replace(/^v /,"verde ");
      return exp(im.color)===exp(color);
    });
    if(idx>=0) setActiveImg(idx);
  // eslint-disable-next-line
  },[color]);

  // Normalizar nombre de variante para que coincida con clave de varPrices
  const normalizeVariant = (v) => {
    if(!v || !p.varPrices) return v;

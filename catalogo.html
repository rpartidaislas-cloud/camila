  function procesarFiltrar(rawReply, msgsBase) {
    // ── Detectar |||PROPIAS — cliente trae sus prendas ──
    if(rawReply.indexOf("|||PROPIAS")!==-1){
      var cleanPropias = rawReply.replace("|||PROPIAS","").trim();
      if(cleanPropias){
        setMsgs(function(prev){ return prev.concat([{role:"assistant",content:cleanPropias}]); });
      }
      // Guardar contexto y redirigir al configurador
      try {
        var chatKey2 = "lana_chat_"+TENANT_ID_CAT;
        var hist2 = [];
        try { hist2 = JSON.parse(localStorage.getItem(chatKey2)||"[]"); } catch(e2){}
        sessionStorage.setItem("lana_chat_context", JSON.stringify({
          ruta:"propias",
          historial: hist2.slice(-20),
          prendas:[],
          paso:"config"
        }));
      } catch(e){}
      setTimeout(function(){
        window.location.href = "configurador.html?desde=catalogo&tipo=propias";
      }, cleanPropias ? 1800 : 300);
      setCargando(false);
      return;
    }
    var filtrarIdx = rawReply.indexOf("|||FILTRAR:");
    if(filtrarIdx < 0) return rawReply;
    var jsonStart = filtrarIdx + "|||FILTRAR:".length;
    var jsonEnd = rawReply.indexOf("\n", jsonStart);
    if(jsonEnd < 0) jsonEnd = rawReply.length;
    var jsonStr = rawReply.slice(jsonStart, jsonEnd).trim();
    try {
      var fd = JSON.parse(jsonStr);
      if(setChatFilter) {
        // Si hay filtro de color, activar vista especial de modelos
        if(fd.colores&&fd.colores.length>0){
          setLanaColorFiltro(fd.colores[0]);
          setLanaVistaActiva(true);
        } else {
          setLanaColorFiltro(null);
          setLanaVistaActiva(false);
        }

        var filtrados = (prodsRef.current||prods||[]).filter(function(p){
          if(!p.active) return false;
          var pNombre = p.name.toLowerCase();
          var passNombre = !fd.nombres||fd.nombres.length===0||fd.nombres.some(function(n){
            var nl=n.toLowerCase();
            return pNombre.indexOf(nl)>=0||nl.indexOf(pNombre)>=0;
          });
          var normC=function(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");};
          var colorMatch=function(cl,pc){
            var a=normC(cl),b=normC(pc);
            return b.indexOf(a)>=0||a.indexOf(b)>=0||
              (a==="rojo"&&(b.indexOf("rojo")>=0||b.indexOf("guinda")>=0||b.indexOf("vino")>=0||b.indexOf("grana")>=0))||
              (a==="azul"&&(b.indexOf("azul")>=0||b.indexOf("marino")>=0||b.indexOf("navy")>=0||b.indexOf("cielo")>=0||b.indexOf("uva")>=0||b.indexOf("rey")>=0))||
              (a==="negro"&&(b.indexOf("negro")>=0))||(a==="blanco"&&(b.indexOf("blanco")>=0))||
              (a==="verde"&&(b.indexOf("verde")>=0||b.indexOf("olivo")>=0||b.indexOf("militar")>=0))||
              (a==="gris"&&(b.indexOf("gris")>=0||b.indexOf("grey")>=0))||
              (a==="naranja"&&(b.indexOf("naranja")>=0))||(a==="cafe"&&(b.indexOf("cafe")>=0||b.indexOf("tabaco")>=0));
          };
          var passColor = !fd.colores||fd.colores.length===0||fd.colores.some(function(c){
            // Verificar en p.colors
            var enColors=(p.colors||[]).some(function(pc){return colorMatch(c,pc);});
            // Verificar en p.imgs (más preciso — solo prendas con img del color)
            var enImgs=p.imgs&&p.imgs.length>0&&p.imgs.some(function(im){return colorMatch(c,im.color||"");});
            return enColors||enImgs;
          });
          var passVariante = !fd.variantes||fd.variantes.length===0||fd.variantes.some(function(v){
            var vl=v.toLowerCase();
            return pNombre.indexOf(vl)>=0||(p.variants||[]).some(function(pv){return (pv||"").toLowerCase().indexOf(vl)>=0;});
          });
          var passGenero = !fd.genero||(function(){
            var g=(fd.genero||"").toLowerCase();
            if(g==="dama"||g==="mujer"||g==="femenino") return pNombre.indexOf("dama")>=0||pNombre.indexOf("blusa")>=0||(p.variants||[]).some(function(v){return (v||"").toLowerCase().indexOf("dama")>=0;});
            if(g==="caballero"||g==="hombre"||g==="masculino") return pNombre.indexOf("caballero")>=0||(p.variants||[]).some(function(v){return (v||"").toLowerCase().indexOf("caballero")>=0;});
            return true;
          })();
          // === BÚSQUEDA INTELIGENTE EXPANDIDA ===
          var pVarText = (p.variants||[]).join(' ').toLowerCase();
          var pCatText = (p.cat||'').toLowerCase();
          var pSubText = (p.sub||'').toLowerCase();
          var pMatText = (p.mat||'').toLowerCase();
          var pDescText = (p.desc||'').toLowerCase();

          // Inferir tipo de prenda por estructura del producto
          var pInferred = [];
          var hasManga = pVarText.indexOf('manga') >= 0 || pDescText.indexOf('manga') >= 0;
          var notBottom = pNombre.indexOf('pantalon') < 0 && pVarText.indexOf('pantalon') < 0
                       && pVarText.indexOf('bermuda') < 0 && pVarText.indexOf('falda') < 0
                       && pNombre.indexOf('bata') < 0 && pNombre.indexOf('filipina') < 0;
          if(hasManga && notBottom) pInferred.push('camisa blusa uniforme');
          if(pSubText === 'polo' || pDescText.indexOf('polo') >= 0 || pNombre.indexOf('polo') >= 0) pInferred.push('polo playera camisa');
          if(pVarText.indexOf('pantalon') >= 0 || pNombre.indexOf('pantalon') >= 0 || pDescText.indexOf('pantalon') >= 0) pInferred.push('pantalon');
          if(pVarText.indexOf('bermuda') >= 0 || pNombre.indexOf('bermuda') >= 0 || pDescText.indexOf('bermuda') >= 0) pInferred.push('bermuda short pantalon');
          if(pVarText.indexOf('falda') >= 0 || pNombre.indexOf('falda') >= 0) pInferred.push('falda');
          if(pVarText.indexOf('chamarra') >= 0 || pNombre.indexOf('chamarra') >= 0 || pCatText.indexOf('chamarra') >= 0) pInferred.push('chamarra jacket');
          if(pVarText.indexOf('chaleco') >= 0 || pNombre.indexOf('chaleco') >= 0 || pCatText.indexOf('chaleco') >= 0) pInferred.push('chaleco vest');
          if(pNombre.indexOf('gorra') >= 0 || pNombre.indexOf('gorro') >= 0 || pDescText.indexOf('gorra') >= 0 || pCatText.indexOf('gorra') >= 0) pInferred.push('gorra gorro cap cachucha');
          if(pNombre.indexOf('bata') >= 0 || pDescText.indexOf('bata') >= 0) pInferred.push('bata laboratorio');
          if(pNombre.indexOf('filipina') >= 0 || pDescText.indexOf('filipina') >= 0) pInferred.push('filipina');
          if(pCatText === 'clinica' || pCatText.indexOf('clinic') >= 0) pInferred.push('medico clinico hospital enfermero');
          if(pCatText === 'gourmet' || pCatText.indexOf('gourmet') >= 0) pInferred.push('chef cocina gourmet cocinero restaurante');
          if(pCatText.indexOf('seguridad') >= 0 || pSubText.indexOf('visibilidad') >= 0 || pSubText.indexOf('retardante') >= 0) pInferred.push('industrial seguridad proteccion obra');
          if(pCatText === 'performance' || pSubText === 'microfibra' || pDescText.indexOf('deport') >= 0) pInferred.push('deportivo sport performance activo');

          function normProd(s){ return (s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,' '); }
          var pFullText = normProd([pNombre, pCatText, pSubText, pMatText, pDescText, pVarText, (p.colors||[]).join(' ').toLowerCase()].join(' ') + ' ' + pInferred.join(' '));

          function smartMatch(tag, fullText){
            var tl = normProd(tag.toLowerCase());
            if(!tl || tl.length < 2) return false;
            if(fullText.indexOf(tl) >= 0) return true;
            var stem = tl;
            if(tl.endsWith('ones') && tl.length > 5) stem = tl.slice(0,-2);
            else if(tl.endsWith('es') && tl.length > 4) stem = tl.slice(0,-2);
            else if(tl.endsWith('s') && tl.length > 3) stem = tl.slice(0,-1);
            if(stem !== tl && fullText.indexOf(stem) >= 0) return true;
            if(tl.length >= 4){
              var words = fullText.split(/\s+/);
              for(var wi=0; wi<words.length; wi++){
                var w = words[wi];
                if(w.length >= 4 && (w.indexOf(tl) >= 0 || tl.indexOf(w) >= 0)) return true;
              }
            }
            return false;
          }

          var pTags = Array.isArray(p.tags) ? p.tags : (p.tags||'').split(',').map(function(t){return t.trim().toLowerCase();});

          var passTags = !fd.tags || fd.tags.length === 0 || fd.tags.some(function(tag){
            return smartMatch(tag, pFullText);
          });

          var passNombreOTag = passNombre || (!fd.nombres||fd.nombres.length===0 ? false : fd.nombres.some(function(n){
            return smartMatch(n, pFullText);
          }));

          return (passNombre||passNombreOTag)&&passColor&&passVariante&&passGenero&&passTags;
        });
        var ids = filtrados.map(function(p){return p.name;});
        var label = fd.label||(ids.length+" producto"+(ids.length!==1?"s":"")+" encontrado"+(ids.length!==1?"s":""));
        setChatFilter({ids: ids, label: label});
        if(msgsBase) {
          var avisoMsg = "👆 Filtré el catálogo — "+label+". Puedes verlos arriba.";
          var cleanReply = rawReply.replace("|||FILTRAR:"+jsonStr, "").trim();
          return cleanReply ? cleanReply+" "+avisoMsg : avisoMsg;
        }
      }
    } catch(e){ console.warn("FILTRAR parse error", e); }
    return rawReply.replace("|||FILTRAR:"+jsonStr, "").trim();
  }

  function enviarTexto(txt) {
    if(!txt||cargando) return;
    setWelcomeBtns(null);

    // BÚSQUEDA LOCAL — interceptar antes de llamar a Claude
    var txtLow=txt.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
    var busquedaLocal=(function(){
      // Palabras de búsqueda de producto
      var coloresMap={rojo:["rojo","red","vino","bordo"],azul:["azul","blue","marino","navy","indigo","celeste"],
        blanco:["blanco","white"],negro:["negro","black"],gris:["gris","gray","grey"],verde:["verde","green"],
        naranja:["naranja","orange"],rosa:["rosa","pink"],morado:["morado","purple","violeta"],
        amarillo:["amarillo","yellow"],cafe:["cafe","brown","caoba"],beige:["beige","crema"]};
      var tiposMap={camisa:["camisa","shirt"],blusa:["blusa"],playera:["playera","t-shirt","polo"],
        gorra:["gorra","cap"],sudadera:["sudadera","hoodie"],chamarra:["chamarra","jacket"],
        pantalon:["pantalon","pants"],manga_larga:["manga larga","m.larga"],manga_corta:["manga corta","m.corta"],
        dama:["dama","mujer","femenin"],caballero:["caballero","hombre","masculin"]};
      var palabrasCompra=["busca","muestra","enseña","ensenm","quiero","ver","tiene","hay","disponible","cual","precio","cuanto","cotiza","necesito","dame","trae","opciones","linea","tipo","modelo","variante","prenda","ropa","uniforme","playera","camisa","blusa","gorra","polo"];
      var esBusqueda=palabrasCompra.some(function(p){return txtLow.indexOf(p)>=0;})||txtLow.split(" ").length<=5;
      var mencionaColor=Object.keys(coloresMap).some(function(c){return coloresMap[c].some(function(k){return txtLow.indexOf(k)>=0;});});
      var mencionaTipo=Object.keys(tiposMap).some(function(t){return tiposMap[t].some(function(k){return txtLow.indexOf(k)>=0;});});
      if(!esBusqueda&&!mencionaColor&&!mencionaTipo) return null;
      // Si no hay color ni tipo específico → mostrar todo el catálogo
      if(!mencionaColor&&!mencionaTipo&&esBusqueda){
        return prods.filter(function(p){return p.active;});
      }
      // Detectar color y tipo
      var colorDetect=null,tipoDetect=[];
      Object.keys(coloresMap).forEach(function(c){if(coloresMap[c].some(function(k){return txtLow.indexOf(k)>=0;})) colorDetect=c;});
      Object.keys(tiposMap).forEach(function(t){if(tiposMap[t].some(function(k){return txtLow.indexOf(k)>=0;})) tipoDetect.push(t);});
      if(!colorDetect&&tipoDetect.length===0) return null;
      // Filtrar productos
      var resultados=prods.filter(function(p){
        if(!p.active) return false;
        var nombre=(p.name||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
        var tags=((p.tags||[]).join(" ")).toLowerCase();
        var colores=((p.colors||[]).join(" ")).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"");
        var matchColor=!colorDetect||coloresMap[colorDetect].some(function(k){return colores.indexOf(k)>=0;});
        var matchTipo=tipoDetect.length===0||tipoDetect.some(function(t){
          return tiposMap[t].some(function(k){return nombre.indexOf(k)>=0||tags.indexOf(k)>=0;});
        });
        return matchColor&&matchTipo;
      });
      if(resultados.length===0) return null;
      return resultados;
    })();

    if(busquedaLocal){
      var ids=busquedaLocal.map(function(p){return p.id;});
      // Controlar el panel completo
      if(busquedaLocal.length>0){
        // Si es todo el catálogo, limpiar filtros
        if(busquedaLocal.length===prods.filter(function(p){return p.active;}).length){
          if(setChatFilter) setChatFilter(null);
          if(setCat) setCat("all");
        } else {
          if(setChatFilter) setChatFilter({ids:ids,label:busquedaLocal.length+" prendas"});
        }
        // Activar vista de color si aplica
        var colorActivado=null;
        Object.keys(coloresMap).forEach(function(c){
          if(coloresMap[c].some(function(k){return txtLow.indexOf(k)>=0;})){colorActivado=c;}
        });
        if(colorActivado&&setLanaColorFiltro&&setLanaVistaActiva){
          setLanaColorFiltro(colorActivado.charAt(0).toUpperCase()+colorActivado.slice(1));
          setLanaVistaActiva(true);
        } else if(setLanaVistaActiva){
          setLanaVistaActiva(false);
        }
        // Scroll al catálogo
        setTimeout(function(){
          var el=document.querySelector('.catalog-grid,.prods-grid');
          if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
        },300);
      }
      var resp=busquedaLocal.length>0
        ?"Aquí están 👆"+(busquedaLocal.length<prods.length?" "+busquedaLocal.length+" opciones.":"")+" ¿Alguna en especial?"
        :"No encontré eso. ¿Describes diferente?";
      setMsgs(msgs.concat([
        {role:"user",content:txt},
        {role:"assistant",content:resp}
      ]));
      setWelcomeBtns(null);
      setCargando(false);
      return;
    }

    var newMsgs2 = msgs.concat([{role:"user",content:txt}]);
    setMsgs(newMsgs2);
    setInput(""); setPendingImg(null); setPendingCot(null); setCargando(true);
    var apiM = newMsgs2.map(function(m,i){
      if(m.role==="assistant"&&typeof m.content==="string"&&i<newMsgs2.length-1){
        return {role:m.role,content:(function(c){var r=c;["|||BOTONES_JSON:","|||PRECIO_JSON:","|||RESUMEN_JSON:","|||SELECTOR_JSON:","|||PROPIAS","|||FILTRAR:"].forEach(function(s){var idx=r.indexOf(s);while(idx>=0){var e=r.indexOf("\n",idx);r=r.slice(0,idx)+(e>=0?r.slice(e):"");idx=r.indexOf(s);}});return r.trim()||c;})(m.content)};
      }
      return {role:m.role,content:m.content};
    });
    sbCat.functions.invoke("claude",{body:{system:systemPrompt,model:"claude-haiku-4-5",max_tokens:700,messages:apiM,tenant_id:TENANT_ID_CAT}})
    .then(function(res){
      if(res.error) throw res.error;
      var raw=(res.data&&res.data.content&&res.data.content.find(function(b){return b.type==="text";})&&res.data.content.find(function(b){return b.type==="text";}).text)||"";
      var calcM=raw.match(/\|\|\|CALCULAR:(\{[\s\S]*?\})/);
      if(calcM){
        try{
          var ap=JSON.parse(calcM[1]), ar=calcularArte(ap);
          if(ar&&ar.precio){
            var td=buildTicketData(ap,ar), pm=buildPrecioMsg(ap,ar,td);
            var lim=raw.replace(/\|\|\|CALCULAR:[\s\S]*$/,"").trim();
            setMsgs(newMsgs2.concat([{role:"assistant",content:(lim?"\n":"")+"|\||PRECIO_JSON:"+JSON.stringify(td)}]));
            sbCat.functions.invoke("claude",{body:{system:systemPrompt,model:"claude-haiku-4-5",max_tokens:400,messages:apiM.concat([{role:"assistant",content:lim||"ok"},{role:"user",content:pm}]),tenant_id:TENANT_ID_CAT}})
            .then(function(r3){
              var raw3=(r3.data&&r3.data.content&&r3.data.content.find(function(b){return b.type==="text";})&&r3.data.content.find(function(b){return b.type==="text";}).text)||"";
              var c3=raw3.match(/\|\|\|COT:(\{[\s\S]*?\})/);
              if(c3){try{setPendingCot(JSON.parse(c3[1]));}catch(e2){} raw3=raw3.replace(/\|\|\|COT:[\s\S]*$/,"").trim();}
              setMsgs(newMsgs2.concat([{role:"assistant",content:"|||PRECIO_JSON:"+JSON.stringify(td)+(raw3?"\n\n"+raw3:"")}]));
            }).catch(function(){}).finally(function(){setCargando(false);});
            return;
          }
        }catch(pe){console.warn(pe);}
      }
      if(raw&&raw.length>10&&procesarIrConfigurador(raw, newMsgs2)) return;
      var reply=procesarFiltrar(raw, newMsgs2);
      var cotM=reply.match(/\|\|\|COT:(\{[\s\S]*?\})/);
      if(cotM){try{setPendingCot(JSON.parse(cotM[1]));}catch(e2){} reply=reply.replace(/\|\|\|COT:[\s\S]*$/,"").trim();}
      setMsgs(newMsgs2.concat([{role:"assistant",content:reply}]));
      setCargando(false);
    }).catch(function(e2){
      console.error("[LANA CHAT] Error en promise:", e2);
      setMsgs(newMsgs2.concat([{role:"assistant",content:(()=>{ var waLink=(()=>{ var wa=(iaConfig&&iaConfig.negocio&&(iaConfig.negocio.whatsapp||iaConfig.negocio.telefono))||""; var t=wa.replace(/\D/g,""); return t?"https://wa.me/"+(t.startsWith("52")?t:"52"+t):"https://wa.me/"; })(); return "Hubo un error de conexión. Por favor intenta enviar tu mensaje de nuevo 🔄\n\nSi el problema persiste, escríbenos por WhatsApp:\n👉 "+waLink; })()}]));
      setCargando(false);
    });
  }

  async function enviar() {
    setWelcomeBtns(null); // Hide welcome buttons when conversation starts
    const txt = input.trim();
    if((!txt && !pendingImg) || cargando) return;

    var userContent;
    if(pendingImg){
      userContent = [
        { type:"image", source:{ type:"base64", media_type:pendingImg.mediaType, data:pendingImg.base64 } },
        { type:"text", text: txt||"¿Qué opinas de este diseño? ¿Qué técnica recomiendas?" }
      ];
    } else {
      userContent = txt;
    }

    const newMsgs = msgs.concat([{role:"user",content:userContent}]);
    setMsgs(newMsgs);
    setInput("");
    setPendingImg(null);
    setPendingCot(null);
    setCargando(true);

    try {
      const apiMsgs = newMsgs.map(function(m, i){
        if(i < newMsgs.length-1 && Array.isArray(m.content)){
          const tb = m.content.find(function(b){ return b.type==="text"; });
          return { role:m.role, content: tb?tb.text:"[imagen compartida]" };
        }
        return { role:m.role, content:m.content };
      });

      // ── PASO 1: primera llamada ──
      const res1 = await sbCat.functions.invoke("claude",{
        body:{ system:systemPrompt, model:"claude-haiku-4-5", max_tokens:700, messages:apiMsgs, tenant_id:TENANT_ID_CAT }
      });
      if(res1.error) throw res1.error;
      // Verificar límite de consultas
      if(res1.data&&res1.data.error==="limite_alcanzado"){
        var ld = res1.data;
        var msg = "⚠️ Se alcanzó el límite de **"+ld.limite+" consultas IA** de este mes para este catálogo.\n\nEl catálogo sigue disponible — contacta al administrador para ampliar el plan.";
        setMsgs(newMsgs.concat([{role:"assistant",content:msg}]));
        setCargando(false);
        return;
      }
      let raw1 = (res1.data&&res1.data.content&&res1.data.content.find(function(b){return b.type==="text";})&&res1.data.content.find(function(b){return b.type==="text";}).text)||"Lo siento, ocurrió un error.";

      // ── Detectar |||CALCULAR ──
      const calcMatch = raw1.match(/\|\|\|CALCULAR:(\{[\s\S]*?\})/);
      if(calcMatch) {
        try {
          var artParams = JSON.parse(calcMatch[1]);
          var artRes = calcularArte(artParams);
          if(artRes && artRes.precio) {
            var ticketData = buildTicketData(artParams, artRes);
            var precioMsg  = buildPrecioMsg(artParams, artRes, ticketData);
            var reply1limpio = raw1.replace(/\|\|\|CALCULAR:[\s\S]*$/,"").trim();

            // Mostrar ticket inmediatamente (antes de paso 2)
            var msgConTicket = reply1limpio ? reply1limpio+"\n|||PRECIO_JSON:"+JSON.stringify(ticketData) : "|||PRECIO_JSON:"+JSON.stringify(ticketData);
            setMsgs(newMsgs.concat([{role:"assistant",content:msgConTicket}]));

            // ── PASO 2: IA presenta el precio ──
            const msgs2 = apiMsgs.concat([
              {role:"assistant",content:reply1limpio||"Calculando..."},
              {role:"user",content:precioMsg}
            ]);
            const res2 = await sbCat.functions.invoke("claude",{
              body:{ system:systemPrompt, model:"claude-haiku-4-5", max_tokens:400, messages:msgs2, tenant_id:TENANT_ID_CAT }
            });
            if(res2.error) throw res2.error;
            let raw2 = (res2.data&&res2.data.content&&res2.data.content.find(function(b){return b.type==="text";})&&res2.data.content.find(function(b){return b.type==="text";}).text)||"";

            // Detectar COT en paso 2
            let reply2 = raw2
              .replace(/\|\|\|PRECIO_JSON:[^\n]*/g,"")
              .replace(/\|\|\|CALCULAR:[^\n]*/g,"")
              .replace(/\|\|\|RESUMEN_JSON:[^\n]*/g,"")
              .trim();
            const cot2 = reply2.match(/\|\|\|COT:(\{[\s\S]*?\})/);
            if(cot2){ try{setPendingCot(JSON.parse(cot2[1]));}catch(e2){} reply2=reply2.replace(/\|\|\|COT:[\s\S]*$/,"").trim(); }

            // Reemplazar el mensaje del ticket con ticket + respuesta IA
            var finalContent = "|||PRECIO_JSON:"+JSON.stringify(ticketData)+(reply2?"\n\n"+reply2:"");
            setMsgs(newMsgs.concat([{role:"assistant",content:finalContent}]));
            return;
          }
        } catch(parseErr){ console.warn("CALCULAR err:",parseErr); }
      }

      // ── Flujo normal (sin cálculo) ──
      let reply = procesarFiltrar(raw1);
      const cotM = reply.match(/\|\|\|COT:(\{[\s\S]*?\})/);
      if(cotM){ try{setPendingCot(JSON.parse(cotM[1]));}catch(e2){} reply=reply.replace(/\|\|\|COT:[\s\S]*$/,"").trim(); }
      setMsgs(newMsgs.concat([{role:"assistant",content:reply}]));

    } catch(e) {
      console.error("[LANA CHAT] Error en enviar async:", e);
      setMsgs(newMsgs.concat([{role:"assistant",content:(()=>{ var waLink=(()=>{ var wa=(iaConfig&&iaConfig.negocio&&(iaConfig.negocio.whatsapp||iaConfig.negocio.telefono))||""; var t=wa.replace(/\D/g,""); return t?"https://wa.me/"+(t.startsWith("52")?t:"52"+t):"https://wa.me/"; })(); return "Hubo un error de conexión. Por favor intenta enviar tu mensaje de nuevo 🔄\n\nSi el problema persiste, escríbenos por WhatsApp:\n👉 "+waLink; })()}]));
    } finally {
      setCargando(false);
    }
  }

// ── MI PEDIDO ─────────────────────────────────────────────────────
function MiPedido(){
  const [folio, setFolio] = useState("");
  const [err, setErr]     = useState("");

  const buscar = () => {
    const f = folio.trim().toUpperCase();
    if(!f){ setErr("Escribe el número de tu folio."); return; }
    const esOT = f.startsWith("OT-");
    const base = window.location.origin + window.location.pathname.replace("catalogo.html","");
    const url  = esOT
      ? `${base}aceptar.html?ot=${encodeURIComponent(f)}&tenant=${encodeURIComponent(TENANT_ID_CAT)}`
      : `${base}aceptar.html?folio=${encodeURIComponent(f)}&tenant=${encodeURIComponent(TENANT_ID_CAT)}`;
    window.location.assign(url);
  };

  return(
    <div id="mi-pedido" style={{background:"#1a1a1a",borderBottom:"1px solid #2a2a2a",padding:"12px 28px"}}>
      <div style={{maxWidth:"900px",margin:"0 auto",display:"flex",alignItems:"center",gap:"20px",flexWrap:"wrap"}}>
        <div style={{flexShrink:0}}>
          <div style={{fontFamily:"var(--fh)",fontSize:"13px",fontWeight:900,textTransform:"uppercase",letterSpacing:"1px",color:"white",lineHeight:1}}>📦 Ver mi pedido</div>
          <div style={{fontSize:"11px",color:"#666",marginTop:"2px"}}>Cotización o Orden de Trabajo</div>
        </div>
        <div style={{flex:1,minWidth:"240px",display:"flex",gap:"0",maxWidth:"400px"}}>
          <input
            value={folio}
            onChange={e=>{ setFolio(e.target.value.toUpperCase()); setErr(""); }}
            onKeyDown={e=>e.key==="Enter"&&buscar()}
            placeholder="BE-XXXXX  ó  OT-XXXXX"
            maxLength={20}
            style={{flex:1,padding:"9px 14px",background:"#2a2a2a",border:"1.5px solid #333",borderRight:"none",borderRadius:"6px 0 0 6px",fontFamily:"var(--fh)",fontSize:"14px",fontWeight:800,color:"white",outline:"none",letterSpacing:"1.5px",textTransform:"uppercase"}}
          />
          <button onClick={buscar}
            style={{padding:"9px 18px",background:"var(--red)",border:"none",borderRadius:"0 6px 6px 0",color:"white",fontFamily:"var(--fh)",fontSize:"13px",fontWeight:900,textTransform:"uppercase",cursor:"pointer",letterSpacing:".5px",whiteSpace:"nowrap"}}>
            Ver →
          </button>
        </div>
        {err&&<div style={{fontSize:"11px",color:"#f87171",flexBasis:"100%",marginTop:"-8px"}}>{err}</div>}
      </div>
    </div>
  );
}


// ── window.estimarArte (catálogo — versión compacta) ─────────────────────
window.estimarArte = function(tid, p) {
  try {
    var cfg = window._arteFullConfig; if(!cfg) return null;
    var tc = cfg[tid]; if(!tc||tc.activa===false) return null;
    var tipos={bordado:"rangos",serigrafia:"colores",dtf:"area",sublimacion:"area",vinil:"capas",lona:"m2",rigidos:"cm2",laser:"cm2",tampografia:"colores2",etiqueta:"area",uv:"cm2",digital:"m2"};
    var tipo=tipos[tid]||"area";
    var base=0,det="",ext={};
    if(tipo==="rangos"){
      var pts=parseInt(p.puntadas)||0,cols=parseInt(p.colores)||1;
      var r=(tc.rangos||[]).find(function(r){return pts>=r.min&&(r.max===null||pts<=r.max);}); if(!r) return null;
      var xtr=Math.max(0,cols-(tc.colores_incluidos||1)); base=r.precio+xtr*(tc.recargo_color||0);
      // Aplicar descuento por volumen en bordado
      var cantR=parseInt(p.cantidad)||1;
      var dvR=(tc.descuento||[]).find(function(d){return cantR>=d.min&&(d.max===null||cantR<=d.max);});
      if(dvR&&dvR.pct){base=Math.round(base*(1-dvR.pct/100)*100)/100;}
      det=r.label+(xtr?"+"+xtr+"c":"")+(dvR&&dvR.pct?" -"+dvR.pct+"%":"");
    } else if(tipo==="colores"){
      var c2=parseInt(p.colores)||1,grande=p.area==="grande"||p.area==="espalda";
      var f=(tc.tabla||[]).find(function(f){return f.colores===c2;})||tc.tabla&&tc.tabla.slice(-1)[0];
      base=f?(grande?f.precio_grande:(f.precio_chico||f.precio)):0; det=c2+"c "+(grande?"grande":"chico");
      var s=(tc.fotolito||tc.clise||0)*c2; if(s) ext.setup=s;
    } else if(tipo==="area"){
      var t2=(tc.tabla||[]).find(function(t){return t.id===p.tam_id;})||tc.tabla&&tc.tabla[0];
      var cn=parseInt(p.cantidad)||1,dv=(tc.descuento||[]).find(function(d){return cn>=d.min&&(d.max===null||cn<=d.max);});
      base=t2?Math.round(t2.precio*(1-(dv?dv.pct:0)/100)*100)/100:0; det=(t2&&t2.label)||"";
    } else if(tipo==="capas"){
      var t3=(tc.tabla||[]).find(function(t){return t.id===p.tam_id;})||tc.tabla&&tc.tabla[0];
      base=t3?(t3.precio_capa||0)*(parseInt(p.capas)||1):0;
      // Aplicar descuento por volumen en vinil
      var cantC=parseInt(p.cantidad)||1;
      var dvC=(tc.descuento||[]).find(function(d){return cantC>=d.min&&(d.max===null||cantC<=d.max);});
      if(dvC&&dvC.pct){base=Math.round(base*(1-dvC.pct/100)*100)/100;}
      det=(t3&&t3.label)||"";
    } else if(tipo==="m2"){
      var m2=Math.max(tc.min_m2||0,(parseFloat(p.ancho)||1)*(parseFloat(p.alto)||1));
      base=Math.round(m2*(tc.precio_m2||0)*100)/100; det=p.ancho+"×"+p.alto+"m";
    } else if(tipo==="cm2"||tipo==="laser"){
      var mf=1; if(tc.materiales&&p.material_id){var mt=(tc.materiales||[]).find(function(m){return m.id===p.material_id;});if(mt)mf=mt.factor||1;}
      var cm2=(parseFloat(p.ancho)||1)*(parseFloat(p.alto)||1);
      base=Math.max(tc.minimo||0,Math.round(cm2*(tc.precio_cm2||0)*mf*100)/100); det=p.ancho+"×"+p.alto+"cm";
      if(tc.costo_corte) ext.costo_corte=tc.costo_corte;
    } else if(tipo==="colores2"){
      var c3=parseInt(p.colores)||1,f2=(tc.tabla||[]).find(function(f){return f.colores===c3;})||tc.tabla&&tc.tabla.slice(-1)[0];
      base=f2?f2.precio:0; det=c3+"c"; var s2=(tc.clise||0)*c3; if(s2) ext.setup=s2;
    }
    var fin=base,comp=null;
    if(p.nivel_complejidad&&tc.complejidad&&tc.complejidad.activa){
      var niv=(tc.complejidad.niveles||[]).find(function(n){return n.label.toLowerCase()===p.nivel_complejidad.toLowerCase()||n.id===p.nivel_complejidad;});
      if(niv&&niv.factor!==1.0){comp=niv;fin=Math.round(base*niv.factor*100)/100;det+="+"+niv.label+"×"+niv.factor;}
    }
    // Agregar digitalización si está activa
    var digCfg=tc.digitalizacion;
    if(digCfg&&digCfg.activa){
      var costoDigit=0;
      if(digCfg.tipo==="fijo"){ costoDigit=digCfg.precio_fijo||0; }
      else if(digCfg.tipo==="escala"){
        var cantDig=parseInt(p.cantidad)||1;
        var rd=(digCfg.escala||[]).find(function(e){return cantDig>=e.min&&(e.max===null||cantDig<=e.max);});
        if(rd) costoDigit=rd.precio||0;
      }
      if(costoDigit>0){ext.digitalizacion=costoDigit;ext.label_digitalizacion=digCfg.label||"Digitalización";}
    }
    return Object.assign({precio:fin,precio_base:base,factor_complejidad:comp?comp.factor:1.0,nivel_complejidad:comp?comp.label:null,detalle:det},ext);
  } catch(e){return null;}
};

// ── window.buildIAPrompt (catálogo — inline) ──────────────────────────────
window.buildIAPrompt = function(cfg) {
  if(!cfg) return "";
  var p=cfg.personalidad||{},n=cfg.negocio||{},c=cfg.condiciones||{},faq=cfg.faq||[],libre=cfg.instrucciones_libres||"";
  var tonoDesc={amable:"amable, cercana y empática",profesional:"formal y profesional, sin informalidades",casual:"casual y divertida, usa emojis",experto:"técnica y experta, da detalles precisos"}[p.tono||"amable"]||"amable";
  var bloques=[];
  bloques.push("Tu nombre es "+(p.nombre_ia||"Lana")+". Eres "+tonoDesc+".");
  if(p.instrucciones_extra&&p.instrucciones_extra.trim()) bloques.push("COMPORTAMIENTO:\n"+p.instrucciones_extra.trim());
  var nl=[];
  if(n.nombre) nl.push("Empresa: "+n.nombre);
  if(n.descripcion) nl.push("Descripción: "+n.descripcion);
  if(n.ubicacion) nl.push("Ubicación: "+n.ubicacion);
  if(n.horarios) nl.push("Horarios: "+n.horarios);
  if(n.telefono) nl.push("Tel: "+n.telefono);
  if(n.whatsapp) nl.push("WhatsApp: "+n.whatsapp);
  if(n.email) nl.push("Email: "+n.email);
  if(nl.length) bloques.push("NEGOCIO:\n"+nl.join("\n"));
  var cl=[];
  if(c.minimo_piezas) cl.push("Mínimo: "+c.minimo_piezas);
  if(c.tiempo_entrega) cl.push("Entrega: "+c.tiempo_entrega);
  if(c.formas_pago) cl.push("Pago: "+c.formas_pago);
  if(c.anticipo) cl.push("Anticipo: "+c.anticipo);
  if(c.politica_diseno) cl.push("Arte: "+c.politica_diseno);
  if(c.notas_extra) cl.push(c.notas_extra);
  if(cl.length) bloques.push("CONDICIONES:\n"+cl.join("\n"));
  var fa=faq.filter(function(f){return f.pregunta&&f.respuesta;});
  if(fa.length) bloques.push("FAQ:\n"+fa.map(function(f){return "P: "+f.pregunta+"\nR: "+f.respuesta;}).join("\n\n"));
  if(libre.trim()) bloques.push("INSTRUCCIONES EXTRA:\n"+libre.trim());
  return bloques.join("\n\n");
};

    const match = Object.keys(p.varPrices).find(k=>k.toLowerCase()===v.toLowerCase());
    return match||v;
  };

  const [activeModel, setActiveModel] = useState(normalizeVariant(availVariants[0]||p.variants?.[0]||""));
  const [modelSelections, setModelSelections] = useState({}); // {modelName: {color, sizeQtys}}

  // Selección del modelo activo
  const curSel = modelSelections[activeModel]||{color: getColorsForVariant(activeModel)[0]||"", sizeQtys:{}};
  const color = curSel.color||"";
  const sizeQtys = curSel.sizeQtys||{};

  const setColor = (c) => setModelSelections(prev=>({...prev,[activeModel]:{...curSel,color:c}}));
  const setSizeQty = (s,v) => {
    const n = parseInt(v)||0;
    const newQtys = n>0?{...sizeQtys,[s]:n}:Object.fromEntries(Object.entries({...sizeQtys}).filter(([k])=>k!==s));
    setModelSelections(prev=>({...prev,[activeModel]:{...curSel,sizeQtys:newQtys}}));
  };

  // Mapa: nombre de variante → clave exacta en varPrices (resuelto una vez)
  const vpKeyMap = useMemo(()=>{
    const map = {};
    if(!p.varPrices) return map;
    const vpKeys = Object.keys(p.varPrices);
    // Normalizar: minúsculas, sin paréntesis ni abreviaturas
    const normVp = function(s){
      return String(s||"").toLowerCase()
        .replace(/\([^)]*\)/g,"") // quitar (CC), (CL), etc
        .replace(/[^a-záéíóúüñ\s]/g,"")
        .replace(/\s+/g," ").trim();
    };
    availVariants.forEach(function(v){
      // 1. Match exacto
      if(p.varPrices[v]){ map[v]=v; return; }
      // 2. Match case-insensitive exacto
      const ci = vpKeys.find(function(k){ return k.toLowerCase()===v.toLowerCase().trim(); });
      if(ci){ map[v]=ci; return; }
      // 3. Match por palabras clave normalizadas (sin abreviaturas)
      const nv = normVp(v);
      const fuzzy = vpKeys.find(function(k){ return normVp(k)===nv; });
      if(fuzzy){ map[v]=fuzzy; return; }
      // 4. Match parcial — la variante contiene palabras clave del vpKey
      const partial = vpKeys.find(function(k){
        const nk = normVp(k);
        // Ambos deben compartir género (caballero/dama) y tipo de manga (larga/corta/3/4)
        const hasGen = function(s){ return s.includes("caballero")||s.includes("dama")||s.includes("unisex"); };
        const hasManga = function(s){ return s.includes("larga")||s.includes("corta")||s.includes("3/4")||s.includes("tres cuartos"); };
        if(hasGen(nv)&&hasGen(nk)&&(nv.includes("caballero")!==nk.includes("caballero"))) return false;
        if(hasManga(nv)&&hasManga(nk)){
          if(nv.includes("larga")&&!nk.includes("larga")) return false;
          if(nv.includes("corta")&&!nk.includes("corta")) return false;
        }
        return nk.split(" ").every(function(w){ return w.length<3||nv.includes(w); });
      });
      if(partial){ map[v]=partial; return; }
      // 5. Sin match — NO asignar por índice para evitar precio incorrecto
      // map[v] queda undefined → usará precio base de la escala
    });
    console.log("[PromoDesk] vpKeyMap:", map, "| varPrices keys:", vpKeys, "| availVariants:", availVariants);
    return map;
  },[availVariants, p.varPrices]);

  const switchModel = (v) => {
    const norm = normalizeVariant(v);
    setActiveModel(norm);
    const sel = modelSelections[v]||{};
    const newColor = sel.color || getColorsForVariant(v)[0]||"";
    if(!sel.color || !sel.sizeQtys) {
      setModelSelections(prev=>({...prev,[v]:{color:newColor, sizeQtys:sel.sizeQtys||{}, ...sel, color:newColor}}));
    }
    const idxExact = allImgs.findIndex(im=>im.variant===v&&sameColor(im.color,newColor));
    const idxColor = allImgs.findIndex(im=>sameColor(im.color,newColor));
    const idxVariant = allImgs.findIndex(im=>im.variant===v);
    const idx = idxExact>=0?idxExact:(idxColor>=0?idxColor:idxVariant);
    if(idx>=0) setActiveImg(idx);
  };

  // Total de TODOS los modelos configurados
  const totalQtyTodos = Object.values(modelSelections).reduce((a,sel)=>
    a+Object.values(sel.sizeQtys||{}).reduce((b,q)=>b+(parseInt(q)||0),0),0);
  const totalQty = Object.values(sizeQtys).reduce((a,v)=>a+(parseInt(v)||0),0);

  const handleAdd=()=>{
    if(totalQtyTodos===0){alert("Agrega cantidad en al menos un modelo");return;}
    // Calcular precio usando totalQtyTodos (cantidad de este producto, no total del carrito)
    var escalasP = [];
    if(Array.isArray(p.escalas)) escalasP = p.escalas.filter(function(e){ return e.precio; });
    else if(p.escalas && typeof p.escalas==="object"){
      [["p1_5",1,5],["p6_20",6,20],["p21_50",21,50],["p51_100",51,100],["p101",101,null]].forEach(function(m){
        if(p.escalas[m[0]]) escalasP.push({min:m[1],max:m[2],precio:p.escalas[m[0]]});
      });
    }
    var calcPrecioModal = function(qty, talla){
      var precio = p.desde ? parseFloat(p.desde) : 0;
      var sorted = escalasP.slice().sort(function(a,b){ return (parseInt(a.min)||1)-(parseInt(b.min)||1); });
      var found = sorted.find(function(e){ return qty>=(parseInt(e.min)||1) && (e.max===null||e.max===undefined||qty<=parseInt(e.max)); });
      if(!found && sorted.length) found = sorted[sorted.length-1];
      if(found) precio = parseFloat(found.precio)||precio;
      var recargo = p.sizeRecargos&&talla ? (parseFloat(p.sizeRecargos[talla])||0) : 0;
      return precio + recargo;
    };
    let added = 0;
    Object.entries(modelSelections).forEach(([modelo, sel])=>{
      const {color:c, sizeQtys:sq} = sel;
      if(!c) return;
      Object.entries(sq||{}).filter(([,q])=>parseInt(q)>0).forEach(([s,q])=>{
        var pu = calcPrecioModal(totalQtyTodos, s);
        onAdd({pid:p.id, name:p.name, icon:p.icon, cat:p.cat, color:c, size:s, variant:modelo, qty:parseInt(q), marca:p.brand||"", precioUnit:pu||null});
        added++;
      });
    });
    if(added===0) alert("Selecciona color y cantidad en al menos un modelo");
  };

  const currentImg = allImgs[activeImg]?.src;
  const [zoomed, setZoomed] = useState(false);
  const [zoomOrigin, setZoomOrigin] = useState("50% 50%");

  const handleMouseMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
    const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
    setZoomOrigin(`${x}% ${y}%`);
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="m-img">
          {currentImg
            ? <div className="m-img-main"
                style={{overflow:"hidden", cursor: zoomed?"zoom-out":"zoom-in"}}
                onMouseEnter={()=>setZoomed(true)}
                onMouseLeave={()=>setZoomed(false)}
                onMouseMove={handleMouseMove}>
                <img src={currentImg} alt={p.name}
                  style={{
                    maxWidth:"100%", maxHeight:"100%", width:"auto", height:"auto",
                    objectFit:"contain", display:"block", margin:"auto",
                    transform: zoomed ? "scale(2.2)" : "scale(1)",
                    transformOrigin: zoomOrigin,
                    transition: zoomed ? "transform 0.15s ease-out" : "transform 0.3s ease",
                  }}/>
              </div>
            : <div className="m-img-ph">
                <span>{p.icon||"👔"}</span>
                <p>{p.name}</p>
                <p style={{fontSize:"10px",opacity:.5}}>Sin imagen — carga una desde Admin</p>
              </div>
          }
          <button className="m-close" onClick={onClose}>✕</button>
        </div>
        <div className="m-body">
          <div className="m-brand">{(brands.find(b=>b.id===p.brand)?.name)||"Catálogo"} · {p.cat} / {p.sub}</div>
          <div className="m-name">{p.name}</div>
          <div className="m-mat">{p.mat}</div>
          {p.desc&&<div className="m-desc">{p.desc}</div>}
          {(()=>{
            let escalas = [];
            if(Array.isArray(p.escalas) && p.escalas.length>0){
              escalas = p.escalas.filter(e=>e.precio);
            } else if(p.escalas && typeof p.escalas==="object"){
              const map=[["p1_5"],["p6_20"],["p21_50"],["p51_100"],["p101"]];
              escalas = map.filter(([k])=>p.escalas[k]).map(([k])=>({precio:p.escalas[k]}));
            }
            const precios = escalas.map(function(e){return parseFloat(e.precio);}).filter(Boolean);
            let min=null, max=null;
            if(precios.length>0){ min=Math.min.apply(null,precios); max=Math.max.apply(null,precios); }
            else if(p.desde){ min=parseFloat(p.desde); max=parseFloat(p.hasta)||min; }
            if(min===null) return null;
            // Calcular recargo mínimo de tallas
            const recVals = p.sizeRecargos ? Object.values(p.sizeRecargos).map(function(r){return parseFloat(r)||0;}).filter(function(r){return r>0;}) : [];
            const recMin2 = recVals.length>0 ? Math.min.apply(null,recVals) : 0;
            const dispMin = min;
            const dispMax = max;
            return(
              <div className="m-price">
                {fmt(dispMin)}{dispMax>dispMin?" — "+fmt(dispMax):""}
                <span>precio de prenda (sin decorado)</span>
              </div>
            );
          })()}

          <div>
            <div className="sl">Modelo</div>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
              {availVariants.map(v=>{
                const sel = modelSelections[v]||{};
                const vTotal = Object.values(sel.sizeQtys||{}).reduce((a,q)=>a+(parseInt(q)||0),0);
                const isActive = activeModel===v;
                return(
                  <button key={v} onClick={()=>switchModel(v)}
                    style={{padding:"6px 12px",borderRadius:"7px",border:`2px solid ${isActive?"var(--red)":vTotal>0?"#22c55e":"#ddd"}`,
                      background:isActive?"#fff0f0":vTotal>0?"#f0fff4":"white",
                      fontFamily:"var(--fh)",fontSize:"12px",fontWeight:800,textTransform:"uppercase",cursor:"pointer",
                      color:isActive?"var(--red)":vTotal>0?"#16a34a":"#555",
                      display:"flex",flexDirection:"column",alignItems:"center",gap:"1px",minWidth:"70px"}}>
                    <span>{v}</span>
                    {vTotal>0&&<span style={{fontSize:"9px",fontWeight:700,opacity:.8}}>{vTotal} pzs{sel.color?` · ${sel.color}`:""}</span>}
                  </button>
                );
              })}
            </div>
          </div>

          <div>
            <div className="sl">Color — <strong>{color}</strong></div>
            <div className="c-opts">
              {availColors.map(c=>{
                const hex = p.colorMap?.[c] || cx(c);
                return(
                  <div key={c} className="c-opt"
                    onClick={()=>{
                      setColor(c);
                      const idx = findImgIdx(c, activeModel);
                      if(idx>=0) setActiveImg(idx);
                    }}>
                    <div className={`csw${color===c?" on":""}`}
                      style={{background:hex, boxShadow:hex==="#FFFFFF"||hex==="#ffffff"?"inset 0 0 0 1.5px #ccc":"none"}}/>
                    <div className="clbl">{c}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div>
            <div className="sl">Tallas — cantidad por talla
              <span style={{float:"right",color:"var(--red)",fontWeight:900}}>
                {totalQty>0&&`${activeModel}: ${totalQty} pzs`}
                {totalQtyTodos>totalQty&&` · Total: ${totalQtyTodos} pzs`}
              </span>
            </div>
            {totalQty===0&&<div style={{fontSize:"11px",color:"#aaa",marginTop:"2px",marginBottom:"2px"}}>Escribe la cantidad que necesitas en cada talla</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(60px,1fr))",gap:"4px",marginTop:"6px"}}>
              {p.sizes.map(s=>{
                const q = sizeQtys[s]||"";
                const active = parseInt(q)>0;
                return(
                  <div key={s} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"2px"}}>
                    <div style={{fontFamily:"var(--fh)",fontSize:"10px",fontWeight:800,textTransform:"uppercase",
                      color:active?"var(--red)":"#888",letterSpacing:".5px"}}>{s}</div>
                    <input
                      type="number" min="0" value={q} placeholder="0"
                      onChange={e=>setSizeQty(s,e.target.value)}
                      style={{width:"100%",textAlign:"center",border:`1.5px solid ${active?"var(--red)":"#ddd"}`,
                        borderRadius:"5px",padding:"4px 2px",fontSize:"13px",fontFamily:"var(--fh)",fontWeight:900,
                        outline:"none",background:active?"rgba(214,32,32,.04)":"white",color:active?"var(--red)":"#333"}}
                    />
                  </div>
                );
              })}
            </div>
            {totalQty>0&&(
              <div style={{marginTop:"6px",padding:"5px 8px",background:"#f8f8f8",borderRadius:"5px",fontSize:"11px",color:"#666",lineHeight:1.6}}>
                {Object.entries(sizeQtys).filter(([,q])=>parseInt(q)>0).map(([s,q])=>`${s}: ${q}`).join(" · ")}
              </div>
            )}
          </div>

          {/* PRECIO SEGÚN CANTIDAD Y REGLA */}
          {totalQty>0&&(()=>{
            // Parsear escalas del producto (ambos formatos)
            let escalas = [];
            if(Array.isArray(p.escalas) && p.escalas.length>0){
              escalas = p.escalas.filter(e=>e.precio);
            } else if(p.escalas && typeof p.escalas==="object"){
              const map=[["p1_5",1,5],["p6_20",6,20],["p21_50",21,50],["p51_100",51,100],["p101",101,null]];
              escalas = map.filter(([k])=>p.escalas[k]).map(([k,mn,mx])=>({min:mn,max:mx,precio:p.escalas[k]}));
            }
            if(escalas.length===0) return null;
            // Usar totalQtyTodos (todos los modelos) para determinar escala
            const qtyParaEscala = totalQtyTodos > 0 ? totalQtyTodos : totalQty;
            const sortedEsc = [...escalas].sort((a,b)=>(parseInt(a.min)||1)-(parseInt(b.min)||1));
            let escIdx = sortedEsc.findIndex(e=>{
              const mn=parseInt(e.min)||1;
              const mx=e.max===null||e.max===undefined?Infinity:parseInt(e.max);
              return qtyParaEscala>=mn && qtyParaEscala<=mx;
            });
            if(escIdx===-1) escIdx = sortedEsc.length-1;
            const esc = sortedEsc[escIdx];
            if(!esc) return null;

            // Helper: obtener array de precios usando el mapa pre-calculado
            const getVpArr = (modelName) => {
              if(!p.varPrices) return null;
              const key = vpKeyMap[modelName] || modelName;
              const arr = p.varPrices[key];
              if(arr && Array.isArray(arr)) return arr;
              // último fallback: por índice directo
              const idx = availVariants.indexOf(modelName);
              if(idx>=0){
                const vals = Object.values(p.varPrices);
                if(vals[idx] && Array.isArray(vals[idx])) return vals[idx];
              }
              return null;
            };

            // Precio del modelo activo en el índice de escala actual
            let ppu = 0;
            const activeVpArr = getVpArr(activeModel);
            if(activeVpArr){
              const entry = activeVpArr[escIdx];
              if(entry) ppu = parseFloat(entry.precio)||0;
            }
            // Fallback: precio de la escala base
            if(!ppu) ppu = parseFloat(esc.precio)||0;
            // DEBUG
            console.log("[LANA precio] qtyParaEscala:", qtyParaEscala, "escIdx:", escIdx, "esc:", JSON.stringify(esc), "ppu:", ppu, "activeVpArr:", activeVpArr?activeVpArr[escIdx]:null);
            if(!ppu) return null;
            const total = ppu * totalQty;
            const recargosActivos = Object.entries(sizeQtys)
              .filter(function(arr){return parseInt(arr[1])>0 && p.sizeRecargos && parseFloat(p.sizeRecargos[arr[0]])>0;})
              .map(function(arr){return {size:arr[0], qty:parseInt(arr[1]), recargo:parseFloat(p.sizeRecargos[arr[0]])||0};});
            const totalRecargo = recargosActivos.reduce(function(a,r){return a+r.recargo*r.qty;},0);
            const ppuConRecargo = totalQty>0 ? ppu + (totalRecargo/totalQty) : ppu;
            // Detectar si hay tallas con precios diferentes (recargos mixtos)
            const preciosPorTalla = Object.entries(sizeQtys)
              .filter(function(arr){return parseInt(arr[1])>0;})
              .map(function(arr){
                var rec = p.sizeRecargos ? (parseFloat(p.sizeRecargos[arr[0]])||0) : 0;
                return {size:arr[0], qty:parseInt(arr[1]), precio:ppu+rec, total:(ppu+rec)*parseInt(arr[1])};
              });
            const preciosUnicos = [...new Set(preciosPorTalla.map(function(t){return t.precio;}))];
            const hayPreciosMixtos = preciosUnicos.length > 1;
            const mxn = function(n){return "$"+n.toLocaleString("es-MX",{minimumFractionDigits:2});};
            return(
              <div style={{background:"linear-gradient(135deg,rgba(214,32,32,.06),rgba(214,32,32,.02))",border:"1.5px solid rgba(214,32,32,.15)",borderRadius:"10px",padding:"12px 16px",marginBottom:"4px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"6px"}}>
                  <span style={{fontFamily:"var(--fh)",fontSize:"11px",fontWeight:800,textTransform:"uppercase",color:"#aaa",letterSpacing:".5px"}}>Precio estimado</span>
                  <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                    {totalQtyTodos>totalQty&&<span style={{fontSize:"9px",color:"#888"}}>({totalQtyTodos} pzs total pedido)</span>}
                    <span style={{fontFamily:"var(--fh)",fontSize:"10px",color:"#ccc",background:"rgba(214,32,32,.1)",border:"1px solid rgba(214,32,32,.2)",borderRadius:"4px",padding:"1px 8px"}}>
                      {esc.min}{esc.max===null||esc.max===undefined?"+ pzs":`–${esc.max} pzs`}
                    </span>
                  </div>
                </div>
                {hayPreciosMixtos ? (
                  <div>
                    {preciosPorTalla.map(function(t,ti){
                      return (
                        <div key={ti} style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"3px 0",borderBottom:"1px solid rgba(214,32,32,.08)"}}>
                          <span style={{fontSize:"13px",color:"#555",fontFamily:"var(--fh)",fontWeight:700}}>{t.size}: {t.qty} pza{t.qty>1?"s":""}</span>
                          <div style={{display:"flex",gap:"8px",alignItems:"baseline"}}>
                            <span style={{fontSize:"12px",color:"#aaa"}}>{mxn(t.precio)}/pza</span>
                            <span style={{fontFamily:"var(--fh)",fontSize:"14px",fontWeight:800,color:"var(--red)"}}>{mxn(t.total)}</span>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",paddingTop:"6px",marginTop:"2px"}}>
                      <span style={{fontSize:"12px",color:"#888",fontWeight:700}}>Total: {totalQty} pzas</span>
                      <span style={{fontFamily:"var(--fh)",fontSize:"18px",fontWeight:900,color:"#333"}}>= {mxn(total+totalRecargo)}</span>
                    </div>
                  </div>
                ) : (
                  <div style={{display:"flex",alignItems:"baseline",gap:"8px",flexWrap:"wrap"}}>
                    <span style={{fontFamily:"var(--fh)",fontSize:"28px",fontWeight:900,color:"var(--red)",lineHeight:1}}>{mxn(ppuConRecargo)}</span>
                    <span style={{fontSize:"12px",color:"#aaa"}}>/pza × {totalQty} pzs</span>
                    <span style={{fontFamily:"var(--fh)",fontSize:"16px",fontWeight:800,color:"#333",marginLeft:"auto"}}>= {mxn(total + totalRecargo)}</span>
                  </div>
                )}

                {escalas.length>1&&(
                  <div style={{marginTop:"8px",display:"flex",gap:"4px",flexWrap:"wrap"}}>
                    {sortedEsc.map((e,i)=>{
                      const isActive = i===escIdx;
                      // Precio del modelo activo en este índice
                      let chipPrecio = null;
                      if(activeVpArr){
                        const entry = activeVpArr[i];
                        if(entry && parseFloat(entry.precio)>0) chipPrecio = parseFloat(entry.precio);
                      }
                      if(!chipPrecio && e.precio) chipPrecio = parseFloat(e.precio)||null;
                       var chipDisplay = chipPrecio;
                      return(
                        <span key={i} style={{fontSize:"9px",fontFamily:"var(--fh)",fontWeight:700,padding:"2px 7px",borderRadius:"4px",
                          background:isActive?"rgba(214,32,32,.15)":"#f5f4f1",
                          color:isActive?"var(--red)":"#999",
                          border:`1px solid ${isActive?"rgba(214,32,32,.3)":"#e8e4de"}`}}>
                          {e.min}{e.max===null||e.max===undefined?"+":`–${e.max}`}pz{chipDisplay?` → $${chipDisplay}`:""}
                        </span>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })()}

          {(p.services||[]).length>0&&(
          <div>
            <div className="sl">Servicios disponibles</div>
            <div className="c-tags" style={{gap:"5px",display:"flex",flexWrap:"wrap"}}>
              {(p.services||[]).map(s=><span key={s} className="ctag">{s}</span>)}
            </div>
          </div>
          )}

          {/* RESUMEN DE TODOS LOS MODELOS CONFIGURADOS */}
          {totalQtyTodos>0&&(
            <div style={{background:"#f8f8f8",borderRadius:"8px",padding:"10px 12px",fontSize:"11px",color:"#555",lineHeight:1.8}}>
              <div style={{fontFamily:"var(--fh)",fontSize:"10px",fontWeight:800,textTransform:"uppercase",color:"#aaa",marginBottom:"4px",letterSpacing:"1px"}}>Resumen del pedido</div>
              {Object.entries(modelSelections).filter(([,sel])=>Object.values(sel.sizeQtys||{}).some(q=>parseInt(q)>0)).map(([modelo,sel])=>{
                const t=Object.values(sel.sizeQtys||{}).reduce((a,q)=>a+(parseInt(q)||0),0);
                const sizes=Object.entries(sel.sizeQtys||{}).filter(([,q])=>parseInt(q)>0).map(([s,q])=>`${s}:${q}`).join(", ");
                return <div key={modelo}><strong style={{color:"var(--red)",fontFamily:"var(--fh)"}}>{modelo}</strong> · {sel.color||"—"} · {sizes} <span style={{color:"#999"}}>({t} pzs)</span></div>;
              })}
              <div style={{fontFamily:"var(--fh)",fontWeight:900,color:"#333",marginTop:"4px",borderTop:"1px solid #eee",paddingTop:"4px"}}>
                Total: {totalQtyTodos} piezas
              </div>
            </div>
          )}

          <button className="m-cta" onClick={handleAdd}>
            + Añadir a cotización
          </button>

          {p.url&&(
            <a className="m-link" href={p.url} target="_blank" rel="noopener noreferrer">
              Ver en BigBang Uniformes ↗
            </a>
          )}

           {/* tabla precios volumen removida */}
        </div>

        {/* PRODUCTOS RELACIONADOS */}
        {(()=>{
          return null;
        })()}
      </div>
    </div>
  );
}


// ── CART PANEL ─────────────────────────────────────────────────────────────
function CartPanel({cart,open,onClose,onRm,onGoConfig,onGoConfigPro,onAddCustom,prods,imgs,onCotizarSinDiseno,onExplore}){
  const totalPzs = cart.reduce((a,it)=>a+(parseInt(it.qty)||0),0);
  const mxn = n=>"$"+Number(n).toLocaleString("es-MX",{minimumFractionDigits:2});

  const getEscalas = (pid) => {
    const prod = prods&&prods.find(p=>p.id===pid);
    if(!prod) return [];
    // Escalas base
    let escalas = [];
    if(Array.isArray(prod.escalas)) escalas = prod.escalas;
    else if(prod.escalas&&typeof prod.escalas==="object"){
      const map=[["p1_5",1,5],["p6_20",6,20],["p21_50",21,50],["p51_100",51,100],["p101",101,null]];
      escalas = map.filter(([k])=>prod.escalas[k]).map(([k,mn,mx])=>({min:mn,max:mx,precio:prod.escalas[k]}));
    }
    return escalas;
  };

  // Precio con fallback a varPrices si la escala base no tiene precio
  const getPrecioConVariante = (pid, variant, scaleIdx) => {
    const prod = prods&&prods.find(p=>p.id===pid);
    if(!prod) return null;
    // Buscar clave exacta o case-insensitive
    const vpKey = variant && prod.varPrices
      ? (prod.varPrices[variant]
          ? variant
          : Object.keys(prod.varPrices).find(k=>k.toLowerCase()===(variant||"").toLowerCase()))
      : null;
    if(vpKey){
      const vp = prod.varPrices[vpKey];
      const entry = Array.isArray(vp) ? vp[scaleIdx] : null;
      if(entry && entry.precio && parseFloat(entry.precio)>0) return parseFloat(entry.precio);
    }
    return null;
  };

  const getPrecioEnEscala = (escalas, qty) => {
    if(!escalas||!escalas.length) return null;
    const sorted = [...escalas].sort((a,b)=>(parseInt(a.min)||1)-(parseInt(b.min)||1));
    // Buscar escala exacta
    let idx = sorted.findIndex(e=>{
      const mn=parseInt(e.min)||1;
      const mx=e.max===null||e.max===undefined?Infinity:parseInt(e.max);
      return qty>=mn&&qty<=mx;
    });
    if(idx===-1) idx = sorted.length-1; // usar última si excede
    const esc = sorted[idx];
    return {esc, idx, precio: esc ? parseFloat(esc.precio)||null : null};
  };

  const getPrecioItem = (item) => {
    if(item.isCustom) return null;
    const escalas = getEscalas(item.pid);
    if(!escalas.length) return null;
    const qtyEfec = getQtyEfectiva(item.pid);
    const {esc, idx, precio: precioBase} = getPrecioEnEscala(escalas, qtyEfec);
    // Prioridad: varPrices del modelo específico; fallback: precio base escala
    const precioVar = getPrecioConVariante(item.pid, item.variant, idx);
    let precio = precioVar && precioVar>0 ? precioVar : (precioBase && precioBase>0 ? precioBase : null);
    if(!precio) return null;
    // Agregar recargo por talla
    const prod = prods&&prods.find(p=>p.id===item.pid);
    const recargo = prod&&prod.sizeRecargos&&item.size ? (parseFloat(prod.sizeRecargos[item.size])||0) : 0;
    return precio + recargo;
  };

  // Verificar si existe regla "prioridad_mixta" activa en localStorage
  const reglaPrioridad = (() => {
    try{ return JSON.parse(localStorage.getItem("be_pricing_rules")||"[]").some(r=>r.tipo==="prioridad_mixta"); }
    catch(e){ return false; }
  })();

  // Agrupar por producto y calcular precio propio
  const grupos = {};
  cart.forEach(it=>{
    if(it.isCustom) return;
    if(!grupos[it.pid]) grupos[it.pid]={pid:it.pid,totalQty:0,precioPropio:null};
    grupos[it.pid].totalQty += parseInt(it.qty)||0;
  });
  Object.values(grupos).forEach(g=>{
    const esc = getEscalas(g.pid);
    if(esc.length){
      const {precio, idx} = getPrecioEnEscala(esc, g.totalQty);
      g.precioPropio = precio && precio>0 ? precio : (getPrecioConVariante(g.pid, null, idx)||0);
    } else {
      g.precioPropio = 0;
    }
  });
  // Producto líder: el de precio/pza más alto en su propia escala (solo con regla activa)
  const lider = reglaPrioridad
    ? Object.values(grupos).reduce((best,g)=>(!best||(g.precioPropio>best.precioPropio))?g:best, null)
    : null;
  const qtyLider = lider?.totalQty||0;
  const precioLider = lider?.precioPropio||0;

  // Qty efectiva según si la regla de prioridad está activa
  const getQtyEfectiva = (pid) => {
    const g = grupos[pid];
    if(!g) return 1;
    if(!reglaPrioridad) return totalPzs; // sin regla: total del carrito para todos
    if(g.precioPropio >= precioLider) return g.totalQty; // protegido: usa su propia qty
    return Math.max(g.totalQty, qtyLider); // barato: se beneficia de la qty del líder
  };

  const totalEstimado = cart.reduce((sum,item)=>{
    const ppu = getPrecioItem(item);
    return sum + (ppu ? ppu*(parseInt(item.qty)||0) : 0);
  }, 0);
  const hayPrecios = cart.some(it=>!it.isCustom && getPrecioItem(it)!==null);

  return(
    <div className={`cart${open?" open":""}`}>
      <div className="cart-hdr">
        <h2>Mi Cotización</h2>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:"20px",cursor:"pointer",color:"#999"}}>✕</button>
      </div>
      <div className="cart-body">
        {cart.length===0?(
          <div className="cart-empty">
            <div className="cart-empty-icon">🛒</div>
            <div className="cart-empty-title">Tu cotización está vacía</div>
            <div className="cart-empty-sub">
              Explora el catálogo y agrega las prendas que quieres personalizar.
            </div>
            <button className="cart-empty-cta" onClick={()=>{onClose();onExplore&&onExplore();}}>
              Ver catálogo →
            </button>
          </div>
        ):cart.map(item=>{
          const ppu = getPrecioItem(item);
          const subtotal = ppu ? ppu*(parseInt(item.qty)||0) : null;
          const g = grupos[item.pid];
          const qtyEfec = !item.isCustom ? getQtyEfectiva(item.pid) : null;
          const ciProd = prods&&prods.find(function(p){return p.id===item.pid;});
          const ciImgUrl = (function(){
            if(item.imgUrl) return item.imgUrl;
            if(ciProd&&ciProd.imgs&&Array.isArray(ciProd.imgs)&&item.color){
              var norm=function(s){return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();};
              var found=ciProd.imgs.find(function(im){return norm(im.color)===norm(item.color);});
              if(found) return found.src;
            }
            return (imgs&&imgs[item.pid])||(ciProd&&ciProd.main_img)||null;
          })();
          return(
            <div key={item.k} className="ci">
              {ciImgUrl&&<img src={ciImgUrl} alt={item.name}
                style={{width:"48px",height:"48px",objectFit:"contain",borderRadius:"6px",
                  background:"#f8f8f8",border:"1px solid #eee",flexShrink:0}}
                onError={function(e){e.target.style.display="none";}}/>}
              <div style={{flex:1,minWidth:0}}>
                <div className="ci-name" style={{display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                  <span>{item.name}</span>
                  {item.isCustom&&<span style={{background:"rgba(214,32,32,.12)",color:"var(--red)",fontFamily:"var(--fh)",fontSize:"9px",fontWeight:800,textTransform:"uppercase",padding:"1px 6px",borderRadius:"3px",flexShrink:0}}>Mercancía propia</span>}
                </div>
                <div className="ci-det">
                  {item.variant&&item.variant!=="—"&&<>{item.variant}<br/></>}
                  Color: {item.color}{item.size&&item.size!=="A definir"&&<> · T. {item.size}</>}<br/>
                  <strong>{item.qty} pzas</strong>
                  {ppu&&<span style={{color:"var(--red)",marginLeft:"6px",fontFamily:"var(--fh)",fontWeight:800,fontSize:"11px"}}>
                    {mxn(ppu)}/pza = {mxn(subtotal)}
                    {g&&qtyEfec!==g.totalQty&&<span style={{fontSize:"9px",color:"#c06060",marginLeft:"4px"}}>(esc. {qtyEfec} pzs)</span>}
                  </span>}
                </div>
              </div>
              <button className="ci-rm" onClick={()=>onRm(item.k)} style={{alignSelf:"flex-start",marginTop:"2px",flexShrink:0}}>✕</button>
            </div>
          );
        })}
        <div onClick={onAddCustom}
          style={{margin:"8px 0 4px",border:"1.5px dashed rgba(214,32,32,.4)",borderRadius:"8px",padding:"10px 12px",cursor:"pointer",background:"rgba(214,32,32,.04)",display:"flex",alignItems:"center",gap:"8px"}}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(214,32,32,.08)"}
          onMouseLeave={e=>e.currentTarget.style.background="rgba(214,32,32,.04)"}>
          <span style={{fontSize:"20px",flexShrink:0}}>📦</span>
          <div>
            <div style={{fontFamily:"var(--fh)",fontSize:"12px",fontWeight:900,textTransform:"uppercase",color:"var(--red)"}}>+ Agrego mis mercancías</div>
            <div style={{fontSize:"10px",color:"#c06060"}}>Traes tú el artículo, solo cotiza el servicio</div>
          </div>
        </div>
      </div>
      {cart.length>0&&(
        <div className="cart-ft">
          <div style={{borderTop:"1px solid #f0f0f0",paddingTop:"10px",marginBottom:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}}>
              <span style={{fontFamily:"var(--fh)",fontSize:"11px",fontWeight:700,textTransform:"uppercase",color:"#999"}}>Total piezas</span>
              <span style={{fontFamily:"var(--fh)",fontSize:"22px",fontWeight:900,color:"var(--red)"}}>{totalPzs}</span>
            </div>
            {hayPrecios&&<>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"3px"}}>
                <span style={{fontFamily:"var(--fh)",fontSize:"11px",fontWeight:700,textTransform:"uppercase",color:"#999"}}>Estimado prendas</span>
                <span style={{fontFamily:"var(--fh)",fontSize:"20px",fontWeight:900,color:"#333"}}>{mxn(totalEstimado)}</span>

              <div style={{background:"#fff8e1",border:"1px solid #ffe082",borderRadius:"6px",padding:"6px 10px",fontSize:"10px",color:"#8a6d00",lineHeight:1.4,marginTop:"4px"}}>

                <button onClick={cpLink}

                  📎 Copiar link
                </button>
              </div>
            </div>

            <div style={{background:"#fffbea",border:"1px solid #ffe58f",borderRadius:"8px",padding:"9px 12px",fontSize:"11px",color:"#7a5c00",lineHeight:1.55,display:"flex",gap:"7px",alignItems:"flex-start"}}>
              <span style={{fontSize:"14px",flexShrink:0}}>📞</span>
              <span>Nos comunicaremos contigo pronto al número <strong>{tel}</strong> para confirmar disponibilidad y precios finales incluyendo el servicio de decorado.</span>
            </div>

            <div style={{display:"flex",gap:"7px"}}>
              <a href={waLink} target="_blank" rel="noopener noreferrer"
                style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"5px",padding:"9px 6px",borderRadius:"8px",background:"#25D366",color:"#fff",fontSize:"11px",fontWeight:900,fontFamily:"var(--fh)",textTransform:"uppercase",textDecoration:"none"}}>
                💬 WhatsApp
              </a>
              <a href={cotUrl} target="_blank" rel="noopener noreferrer"
                style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"5px",padding:"9px 6px",borderRadius:"8px",background:"var(--red)",color:"#fff",fontSize:"11px",fontWeight:900,fontFamily:"var(--fh)",textTransform:"uppercase",textDecoration:"none"}}>
                🔗 Ver cotización
              </a>
              <button onClick={onDone}

                Cerrar

          </div>
        </div>

  return(

}

function AdminPanel({prods,imgs,onUpd,onDel,onAdd,onImg,onDelImg,onClose}){
  const [tab,setTab]=useState("list");
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:"",cat:"Corporativa",sub:"",active:true,mat:"",desc:"",colors:"",variants:"",sizes:"",services:"Bordado",icon:"👔",desde:"",hasta:"",url:""});
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const tabs=[["list","Productos"],["add","Agregar"],["prices","Precios Bordado"]];

  const sincronizar = async()=>{
    setSyncing(true); setSyncMsg("Sincronizando...");
    try{
      const sb2 = window.supabase.createClient(SUPA_URL, SUPA_KEY);
      let ok=0, err=0;
      for(const p of prods){
        const row={
          id: p.id,
          name: p.name||"",
          active: p.active!==false,
          url: p.url||null,
          cat: p.cat||null,
          sub: p.sub||null,
          mat: p.mat||null,
          desc: p.desc||null,
          icon: p.icon||null,
          services: p.services||null,
          colors: p.colors||null,
          variants: p.variants||null,
          sizes: p.sizes||null,
          desde: p.desde||null,
          hasta: p.hasta||null,
          brand: p.brand||null,
          linea: p.linea||null,
          main_img: imgs[p.id]||p.main_img||null,
          imgs: p.imgs||[],
        };
        const {error}=await sb2.from("productos").upsert(row,{onConflict:"id"});
        if(error){console.warn("sync prod",p.id,error.message);err++;}
        else ok++;
      }
      setSyncMsg(`✅ Sincronizado: ${ok} productos${err>0?` · ${err} errores`:""}`);
    }catch(e){
      setSyncMsg("❌ Error: "+e.message);
    }
    setSyncing(false);
  };

  const handleImgUpload=(id,e)=>{
    const f=e.target.files[0];
    if(!f)return;
    if(f.size>2*1024*1024){alert("Imagen muy grande. Máximo 2MB.");return;}
    const r=new FileReader();
    r.onload=ev=>onImg(id,ev.target.result);
    r.readAsDataURL(f);
  };

  const editProd = prods.find(p=>p.id===editId);

  return(
    <div className="adm-ov">
      <div className="adm" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"6px"}}>
          <div>
            <div className="adm-title">Panel Admin</div>
            <div className="adm-sub">Catálogo Big Bang · PromoDesk</div>
          </div>
          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <div style={{textAlign:"right"}}>
              {syncMsg&&<div style={{fontSize:"11px",color:syncMsg.startsWith("✅")?"#16a34a":"#888",marginBottom:"4px"}}>{syncMsg}</div>}
              <button onClick={sincronizar} disabled={syncing}
                style={{padding:"7px 14px",background:syncing?"#888":"#2563eb",border:"none",borderRadius:"7px",color:"white",fontFamily:"var(--fh)",fontSize:"12px",fontWeight:900,textTransform:"uppercase",letterSpacing:".5px",cursor:syncing?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:"6px"}}>
                {syncing?"⏳ Sincronizando...":"☁️ Sincronizar con BD"}
              </button>
            </div>
            <button className="ab gh" onClick={onClose}>✕ Cerrar</button>
          </div>
        </div>
        <div className="adm-tabs">
          {tabs.map(([k,l])=>(
            <button key={k} className={`atab${tab===k?" on":" off"}`} onClick={()=>{setTab(k);setEditId(null);}}>{l}</button>
          ))}
        </div>

        {/* ── LISTA DE PRODUCTOS ── */}

          <div>
            <div className="adm-sec-t">Productos ({prods.length} total) — clic en una fila para editar</div>

                        {imgs[p.id]

                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

                    <td style={{color:"#888",fontSize:"12px"}}>{r.d} puntadas</td>
                    {r.p.map((v,i)=><td key={i} style={{color:"white",fontWeight:600}}>${v}</td>)}
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{marginTop:"14px",fontSize:"12px",color:"#555",lineHeight:"1.7"}}>
              <p>• Precios son MÁS IVA (16%) · No incluyen precio de prenda</p>
              <p>• Servicio urgente tiene cargo extra según tiempo de entrega</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CHAT IA ──────────────────────────────────────────────────────
// ── renderChatMsg — renderer de mensajes del bot ─────────────────────────
// ── ChatSelector — selector interactivo de prendas en el chat ────────────
function ChatBotones(props) {
  var data=props.data, onSend=props.onSend;
  var [usado,setUsado]=useState(false);
  var [selIdx,setSelIdx]=useState(null);

  function handleClick(op,idx){
    if(usado) return;
    setSelIdx(idx); setUsado(true);
    if(op.accion==="ir_configurador"&&op.cart_data){
      try{localStorage.setItem("be_cfg_cart",JSON.stringify(op.cart_data));}catch(e){}
      setTimeout(function(){window.location.href="configurador.html";},400);
    } else { onSend(op.texto||op.label); }
  }

  var opciones = data.opciones||[];
  // Use grid style if opciones have emoji and <=4, else chips
  var useGrid = opciones.length<=4 && opciones.every(function(o){return o.emoji;});

  if(useGrid) {
    return(
      <div style={{margin:"6px 0"}}>
        {data.pregunta&&<div style={{fontSize:"13px",color:"#555",marginBottom:"10px",lineHeight:1.5,fontWeight:500}}>{data.pregunta}</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
          {opciones.map(function(op,i){
            var isSel=selIdx===i, isDone=usado&&!isSel;
            return(
              <button key={i} onClick={function(){handleClick(op,i);}} disabled={usado}
                style={{padding:"14px 10px",background:isSel?"#4c1d95":(op.primaria?"var(--red)":"#fff"),
                  border:"2px solid "+(isSel?"#4c1d95":(op.primaria?"var(--red)":"#e8e4de")),
                  borderRadius:"12px",cursor:usado?"default":"pointer",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:"6px",
                  opacity:isDone?.3:1,transition:"all .15s",
                  boxShadow:isSel||op.primaria?"0 4px 14px rgba(76,29,149,.25)":"none"}}>
                <span style={{fontSize:"22px",lineHeight:1}}>{op.emoji}</span>
                <span style={{fontFamily:"var(--fh)",fontSize:"11px",fontWeight:800,
                  textTransform:"uppercase",letterSpacing:".3px",lineHeight:1.3,textAlign:"center",
                  color:isSel||op.primaria?"white":"#1a1a1a"}}>{op.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // Chips style for more options or no emoji
  return(
    <div style={{margin:"6px 0"}}>
      {data.pregunta&&<div style={{fontSize:"13px",color:"#555",marginBottom:"8px",lineHeight:1.5}}>{data.pregunta}</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
        {opciones.map(function(op,i){
          var isSel=selIdx===i, isDone=usado&&!isSel;
          return(
            <button key={i} onClick={function(){handleClick(op,i);}} disabled={usado}
              style={{padding:"8px 14px",background:isSel?"#4c1d95":(op.primaria?"var(--red)":"#fff"),
                border:"2px solid "+(isSel?"#4c1d95":(op.primaria?"var(--red)":"#e8e4de")),
                borderRadius:"20px",cursor:usado?"default":"pointer",
                fontFamily:"var(--fh)",fontSize:"12px",fontWeight:800,
                color:isSel||op.primaria?"white":"#1a1a1a",
                opacity:isDone?.3:1,transition:"all .15s",
                display:"flex",alignItems:"center",gap:"5px"}}>
              {op.emoji&&<span>{op.emoji}</span>}
              <span>{op.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function ChatSelector(props) {
  var data = props.data;
  var prods = props.prods;
  var imgs = props.imgs;
  var onAdd = props.onAdd;
  var [selProd, setSelProd] = useState(null);
  var [selColor, setSelColor] = useState("");
  var [sizeQtys, setSizeQtys] = useState({});
  var [added, setAdded] = useState(false);

  var prod = selProd ? prods.find(function(p){ return p.id===selProd; }) : null;
  var colors = prod ? (prod.colors||[]) : [];
  var sizes = prod ? (prod.sizes||["S","M","L","XL","2XL"]) : [];
  var totalQty = Object.values(sizeQtys).reduce(function(a,v){ return a+(parseInt(v)||0); }, 0);
  var imgUrl = prod ? ((imgs&&imgs[prod.id])||prod.main_img||null) : null;

  function handleAdd() {
    if(!prod||!selColor||totalQty===0) return;
    Object.entries(sizeQtys).forEach(function(entry) {
      var s = entry[0]; var q = parseInt(entry[1])||0;
      if(q>0) {
        onAdd({
          pid: prod.id, name: prod.name, color: selColor, size: s, qty: q,
          precio: prod.desde||0, desde: prod.desde||0,
          services: prod.services||[], cat: prod.cat||"",
          k: prod.id+"-"+selColor+"-"+s+"-"+(prod.variants&&prod.variants[0]||""),
        });
      }
    });
    setAdded(true);
  }

  if(added) return(
    <div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:"10px",padding:"12px 14px",margin:"4px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"}}>
        <span style={{fontSize:"20px"}}>✅</span>
        <div>
          <div style={{fontFamily:"var(--fh)",fontSize:"13px",fontWeight:800,color:"#166534"}}>{"Agregado al carrito"}</div>
          <div style={{fontSize:"11px",color:"#16a34a"}}>{totalQty+" pzas de "+prod.name+" "+selColor}</div>
        </div>
      </div>
      <div style={{display:"flex",gap:"8px"}}>
        <button onClick={function(){ setAdded(false); setSelProd(null); setSelColor(""); setSizeQtys({}); }}
          style={{flex:1,padding:"8px",background:"white",border:"1.5px solid #e8e4de",borderRadius:"8px",color:"#555",fontFamily:"var(--fh)",fontSize:"11px",fontWeight:800,cursor:"pointer",textTransform:"uppercase"}}>
          + Agregar más
        </button>
        <button onClick={function(){ if(onAdd&&onAdd._goConfig) onAdd._goConfig(); else if(window._lanaGoConfig) window._lanaGoConfig(); }}
          style={{flex:1,padding:"8px",background:"#1a1a1a",border:"none",borderRadius:"8px",color:"white",fontFamily:"var(--fh)",fontSize:"11px",fontWeight:900,cursor:"pointer",textTransform:"uppercase"}}>
          🎨 Ir a diseñar →
        </button>
      </div>
    </div>
  );

  return(
    <div style={{background:"#fff",border:"1.5px solid #e8e4de",borderRadius:"12px",overflow:"hidden",margin:"4px 0",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
      {/* Titulo */}
      <div style={{background:"#1a1a1a",padding:"8px 14px"}}>
        <div style={{fontFamily:"var(--fh)",fontSize:"12px",fontWeight:800,textTransform:"uppercase",color:"white",letterSpacing:".5px"}}>{data.titulo||"Elige una prenda"}</div>
      </div>

      {!selProd ? (
        /* Opciones de productos */
        <div style={{padding:"10px",display:"flex",flexWrap:"wrap",gap:"8px"}}>
          {(data.opciones||[]).map(function(op) {
            var p = prods.find(function(x){ return x.id===op.id||x.name===op.nombre; });
            var pImg = p&&((imgs&&imgs[p.id])||p.main_img||null);
            return(
              <div key={op.id||op.nombre} onClick={function(){ if(p){setSelProd(p.id);setSelColor(p.colors&&p.colors[0]||"");setSizeQtys({});} }}
                style={{flex:"1 1 calc(50% - 4px)",minWidth:"120px",border:"2px solid #e8e4de",borderRadius:"8px",overflow:"hidden",cursor:"pointer",transition:"border-color .15s",background:"#fafaf8"}}
                onMouseEnter={function(e){e.currentTarget.style.borderColor="var(--red)";}}
                onMouseLeave={function(e){e.currentTarget.style.borderColor="#e8e4de";}}>
                {pImg&&<img src={pImg} alt={op.nombre} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/>}
                <div style={{padding:"8px"}}>
                  <div style={{fontFamily:"var(--fh)",fontSize:"12px",fontWeight:800,color:"#1a1a1a",marginBottom:"2px"}}>{op.nombre||op.nombre}</div>
                  {op.desde&&<div style={{fontFamily:"var(--fh)",fontSize:"13px",fontWeight:900,color:"var(--red)"}}>{"Desde $"+op.desde}</div>}
                  {(p&&p.services||[]).length>0&&(
                    <div style={{display:"flex",gap:"3px",flexWrap:"wrap",marginTop:"4px"}}>
                      {(p.services||[]).slice(0,2).map(function(s,i){ return <span key={i} style={{fontFamily:"var(--fh)",fontSize:"8px",fontWeight:800,textTransform:"uppercase",padding:"1px 5px",borderRadius:"3px",background:"#f0ede8",color:"#666"}}>{s}</span>; })}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      ) : (
        /* Configurador color + tallas */
        <div style={{padding:"12px 14px"}}>
          {/* Header con foto y nombre */}
          <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"12px",paddingBottom:"10px",borderBottom:"1px solid #f0ede8"}}>
            {imgUrl&&<img src={imgUrl} style={{width:"48px",height:"48px",objectFit:"cover",borderRadius:"6px",flexShrink:0}}/>}
            <div>
              <div style={{fontFamily:"var(--fh)",fontSize:"14px",fontWeight:900,color:"#1a1a1a"}}>{prod&&prod.name}</div>
              <div style={{fontSize:"11px",color:"#888"}}>{prod&&prod.cat}</div>
            </div>
            <button onClick={function(){setSelProd(null);setSizeQtys({});}}
              style={{marginLeft:"auto",background:"none",border:"1px solid #e0e0e0",borderRadius:"6px",padding:"4px 8px",cursor:"pointer",fontSize:"11px",color:"#888",fontFamily:"var(--fh)",fontWeight:700}}>
              {"← Cambiar"}
            </button>
          </div>

          {/* Selector de color */}
          {colors.length>0&&(
            <div style={{marginBottom:"12px"}}>
              <div style={{fontFamily:"var(--fh)",fontSize:"10px",fontWeight:700,textTransform:"uppercase",color:"#aaa",letterSpacing:"1px",marginBottom:"6px"}}>{"Color: "+selColor}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                {colors.map(function(c){
                  var hex = (prod&&prod.colorMap&&prod.colorMap[c])||"#ccc";
                  var isSel = selColor===c;
                  return(
                    <div key={c} onClick={function(){setSelColor(c);}}
                      title={c}
                      style={{width:"28px",height:"28px",borderRadius:"50%",background:hex,cursor:"pointer",border:isSel?"3px solid var(--red)":"2px solid rgba(0,0,0,.12)",boxShadow:isSel?"0 0 0 2px white,0 0 0 4px var(--red)":"none",transition:"all .15s",flexShrink:0}}/>
                  );
                })}
              </div>
            </div>
          )}

          {/* Selector de tallas */}
          <div style={{marginBottom:"12px"}}>
            <div style={{fontFamily:"var(--fh)",fontSize:"10px",fontWeight:700,textTransform:"uppercase",color:"#aaa",letterSpacing:"1px",marginBottom:"6px"}}>{"Tallas y cantidades"}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
              {sizes.map(function(s){
                var qty = parseInt(sizeQtys[s])||0;
                return(
                  <div key={s} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
                    <div style={{fontFamily:"var(--fh)",fontSize:"10px",fontWeight:700,color:"#666",textTransform:"uppercase"}}>{s}</div>
                    <div style={{display:"flex",alignItems:"center",gap:"2px"}}>
                      <button onClick={function(){if(qty>0){var n={};Object.assign(n,sizeQtys);n[s]=qty-1;if(n[s]===0)delete n[s];setSizeQtys(n);}}}
                        style={{width:"24px",height:"24px",borderRadius:"4px",border:"1px solid #ddd",background:"#f5f5f5",cursor:"pointer",fontFamily:"var(--fh)",fontWeight:900,fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",color:"#666",lineHeight:1}}>-</button>
                      <div style={{width:"32px",textAlign:"center",fontFamily:"var(--fh)",fontWeight:900,fontSize:"13px",color:qty>0?"var(--red)":"#ccc"}}>{qty||0}</div>
                      <button onClick={function(){var n={};Object.assign(n,sizeQtys);n[s]=(qty||0)+1;setSizeQtys(n);}}
                        style={{width:"24px",height:"24px",borderRadius:"4px",border:"1px solid #ddd",background:"#f5f5f5",cursor:"pointer",fontFamily:"var(--fh)",fontWeight:900,fontSize:"14px",display:"flex",alignItems:"center",justifyContent:"center",color:"#666",lineHeight:1}}>+</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Resumen y botón */}
          <div style={{display:"flex",alignItems:"center",gap:"10px",paddingTop:"10px",borderTop:"1px solid #f0ede8"}}>
            <div style={{flex:1,fontSize:"12px",color:"#888"}}>
              {totalQty>0 ? <span><strong style={{color:"#1a1a1a",fontFamily:"var(--fh)"}}>{totalQty}</strong>{" piezas · "+(selColor||"sin color")}</span> : "Selecciona tallas"}
            </div>
            <button onClick={handleAdd} disabled={!selColor||totalQty===0}
              style={{padding:"8px 16px",background:(!selColor||totalQty===0)?"#eee":"var(--red)",color:(!selColor||totalQty===0)?"#bbb":"white",border:"none",borderRadius:"8px",fontFamily:"var(--fh)",fontSize:"12px",fontWeight:900,textTransform:"uppercase",cursor:(!selColor||totalQty===0)?"not-allowed":"pointer",letterSpacing:".3px",flexShrink:0}}>
              {"+ Agregar"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function TicketResumen(props) {

    <div style={{background:"#fff",border:"1.5px solid #e8e4de",borderRadius:"12px",overflow:"hidden",margin:"4px 0",boxShadow:"0 2px 12px rgba(0,0,0,.08)"}}>

        })}
      </div>

        return (
          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 2fr auto auto",gap:"4px",padding:"8px 14px",borderBottom:"1px solid #f0ede8",alignItems:"center",background:i%2===1?"#fdf9f6":"#fff"}}>

            <span style={{fontSize:"11px",color:"#666",lineHeight:1.4}}>{f.detalle}</span>
            <span style={{fontFamily:"var(--fh)",fontSize:"11px",fontWeight:700,color:"#888",textAlign:"right"}}>{f.cant}</span>

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:"#fdf9f6",borderTop:"2px solid #e8e4de"}}>

function ProdCard(props) {

  if(!prod) return null;
  var imgUrl = (imgs&&imgs[prod.id])||prod.main_img||null;
  return (
    <div className="prod-card">
      {imgUrl&&<img className="prod-card-img" src={imgUrl} alt={prod.name} onError={function(e){e.target.style.display="none";}}/>}
      <div className="prod-card-body">
        <div className="prod-card-name">{prod.name}</div>
        <div className="prod-card-sub">{prod.cat+(prod.sub?" · "+prod.sub:"")}</div>
        {prod.desde&&<div className="prod-card-price">{"Desde $"+prod.desde+"/pza"}</div>}
        {(prod.services||[]).length>0&&(

// ── renderMd — markdown completo a JSX ──────────────────────────────────
function renderMd(text, baseKey) {
  if(!text) return text;
  var k = baseKey||0;
  var result = [];

  // Split by lines first
  var lines = text.split("\n");
  lines.forEach(function(line, li) {
    if(li > 0) result.push(<br key={k++}/>);

    // Bullet list: lines starting with - or *
    var isBullet = /^[-*]\s+/.test(line);
    var lineText = isBullet ? line.replace(/^[-*]\s+/, "") : line;

    // Parse inline: **bold** and *italic*
    var inlineParts = [];
    var rx = /\*\*([^*]+)\*\*|\*([^*]+)\*/g;
    var last2 = 0, m2;
    rx.lastIndex = 0;
    while((m2 = rx.exec(lineText)) !== null) {
      if(m2.index > last2) inlineParts.push(<span key={k++}>{lineText.slice(last2, m2.index)}</span>);
      if(m2[1]) inlineParts.push(<strong key={k++} style={{fontWeight:800,color:"#1a1a1a"}}>{m2[1]}</strong>);
      else if(m2[2]) inlineParts.push(<em key={k++} style={{fontStyle:"italic"}}>{m2[2]}</em>);
      last2 = m2.index + m2[0].length;
    }
    if(last2 < lineText.length) inlineParts.push(<span key={k++}>{lineText.slice(last2)}</span>);
    var lineContent = inlineParts.length > 0 ? inlineParts : lineText;

    if(isBullet) {
      result.push(
        <div key={k++} style={{display:"flex",alignItems:"flex-start",gap:"7px",margin:"3px 0"}}>
          <span style={{color:"#7c3aed",fontWeight:900,fontSize:"14px",lineHeight:"1.55",flexShrink:0}}>•</span>
          <span style={{lineHeight:"1.55"}}>{lineContent}</span>
        </div>
      );
    } else {
      result.push(<span key={k++}>{lineContent}</span>);
    }
  });

  return result.length > 0 ? result : text;
}

function renderChatMsg(text, prods, imgs, addToCart, onSend) {
  if(!text) return text;
  var parts = [];
  var remaining = text;
  var keyIdx = 0;

  // Detectar confirmación de cotización |||COT_CONFIRMADA:{...}
  var ccIdx = remaining.indexOf("|||COT_CONFIRMADA:");
  if(ccIdx >= 0) {
    var ccStart = ccIdx + "|||COT_CONFIRMADA:".length;
    var ccEnd = remaining.indexOf("\n", ccStart);
    if(ccEnd < 0) ccEnd = remaining.length;
    var ccBefore = remaining.slice(0, ccIdx).trim();
    var ccJson = remaining.slice(ccStart, ccEnd).trim();
    var ccAfter = remaining.slice(ccEnd).trim();
    try {
      var cd = JSON.parse(ccJson);
      if(ccBefore) parts.push(<span key={keyIdx++} style={{display:"block",marginBottom:"8px",whiteSpace:"pre-wrap"}}>{ccBefore}</span>);
      parts.push(<TicketConfirmacion key={keyIdx++} folio={cd.folio} nombre={cd.nombre}/>);
      remaining = ccAfter;
    } catch(e) {
      remaining = remaining.replace("|||COT_CONFIRMADA:"+ccJson, "");
    }
  }

  // Detectar selector de prendas |||SELECTOR_JSON:{...}
  var sjIdx = remaining.indexOf("|||SELECTOR_JSON:");
  if(sjIdx >= 0) {
    var sjStart = sjIdx + "|||SELECTOR_JSON:".length;
    var sjEnd = remaining.indexOf("\n", sjStart);
    if(sjEnd < 0) sjEnd = remaining.length;
    var sjBefore = remaining.slice(0, sjIdx).trim();
    var sjJson = remaining.slice(sjStart, sjEnd).trim();
    var sjAfter = remaining.slice(sjEnd).trim();
    try {
      var sd = JSON.parse(sjJson);
      if(sjBefore) parts.push(<span key={keyIdx++} style={{display:"block",marginBottom:"8px",whiteSpace:"pre-wrap"}}>{sjBefore}</span>);
      parts.push(<ChatSelector key={keyIdx++} data={sd} prods={prods} imgs={imgs} onAdd={addToCart||function(){}}/>);
      remaining = sjAfter;
    } catch(e) {
      remaining = remaining.replace("|||SELECTOR_JSON:"+sjJson, "");
    }
  }

  // |||BOTONES_JSON
  var bjIdx=remaining.indexOf("|||BOTONES_JSON:");
  if(bjIdx>=0){
    var bjS=bjIdx+"|||BOTONES_JSON:".length;
    // Try |||END terminator first, then newline, then end of string
    var bjE=remaining.indexOf("|||END",bjS);
    var bjAf2="";
    if(bjE>=0){ bjAf2=remaining.slice(bjE+"|||END".length).trim(); }
    else { bjE=remaining.indexOf("\n",bjS); if(bjE<0) bjE=remaining.length; bjAf2=remaining.slice(bjE).trim(); }
    var bjBf=remaining.slice(0,bjIdx).trim(), bjJ=remaining.slice(bjS,bjE).trim();
    try{var bd=JSON.parse(bjJ);if(bjBf)parts.push(<span key={keyIdx++} style={{display:"block",marginBottom:"8px",whiteSpace:"pre-wrap"}}>{bjBf}</span>);parts.push(<ChatBotones key={keyIdx++} data={bd} onSend={onSend||function(){}}/>);remaining=bjAf2;}
    catch(e){remaining=remaining.replace("|||BOTONES_JSON:"+bjJ,"");}
  }

  // Detectar resumen de pedido |||RESUMEN_JSON:{...}
  var rjIdx = remaining.indexOf("|||RESUMEN_JSON:");
  if(rjIdx >= 0) {
    var rjStart = rjIdx + "|||RESUMEN_JSON:".length;
    var rjEnd = remaining.indexOf("\n", rjStart);
    if(rjEnd < 0) rjEnd = remaining.length;
    var rjBefore = remaining.slice(0, rjIdx).trim();
    var rjJson = remaining.slice(rjStart, rjEnd).trim();
    var rjAfter = remaining.slice(rjEnd).trim();
    try {
      var rd = JSON.parse(rjJson);
      if(rjBefore) parts.push(<span key={keyIdx++} style={{display:"block",marginBottom:"8px",whiteSpace:"pre-wrap"}}>{rjBefore}</span>);
      parts.push(<TicketResumen key={keyIdx++} data={rd}/>);
      remaining = rjAfter;
    } catch(e) {
      remaining = remaining.replace("|||RESUMEN_JSON:"+rjJson, "");
    }
  }

  // Detectar ticket |||PRECIO_JSON:{...}
  var pjIdx = remaining.indexOf("|||PRECIO_JSON:");
  if(pjIdx >= 0) {
    var jsonStart = pjIdx + "|||PRECIO_JSON:".length;
    var jsonEnd = remaining.indexOf("\n", jsonStart);
    if(jsonEnd < 0) jsonEnd = remaining.length;
    var before = remaining.slice(0, pjIdx).trim();
    var jsonStr = remaining.slice(jsonStart, jsonEnd).trim();
    var after = remaining.slice(jsonEnd).trim();
    try {
      var td = JSON.parse(jsonStr);
      if(before) parts.push(<span key={keyIdx++} style={{display:"block",marginBottom:"8px",whiteSpace:"pre-wrap"}}>{before}</span>);
      parts.push(<TicketArte key={keyIdx++} data={td}/>);
      remaining = after;
    } catch(e) {
      remaining = remaining.replace("|||PRECIO_JSON:"+jsonStr, "");
    }
  }

  // Detectar [MOSTRAR:nombre] + renderizar markdown
  var mostrRx = /\[MOSTRAR:([^\]]+)\]/g;
  var last = 0;
  var m;
  var textParts = [];
  mostrRx.lastIndex = 0;
  while((m = mostrRx.exec(remaining)) !== null) {
    if(m.index > last) {
      var seg = remaining.slice(last, m.index);
      textParts.push(<span key={"t"+keyIdx++}>{renderMd(seg, keyIdx++)}</span>);
    }
    textParts.push(<ProdCard key={"pc"+keyIdx++} nombre={m[1].trim()} prods={prods} imgs={imgs}/>);
    last = m.index + m[0].length;
  }
  if(last < remaining.length) textParts.push(<span key={"t"+keyIdx++}>{renderMd(remaining.slice(last), keyIdx++)}</span>);
  if(textParts.length > 0) parts.push(<span key={"txt"+keyIdx++}>{textParts}</span>);


  return parts.length > 0 ? parts : text;
}

  function onFileSelect(e) {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    handleImageFile(file);
    e.target.value = "";
  }

  function handleImageFile(file) {
    if(!file || !file.type.startsWith("image/")) return;
    if(file.size > 5*1024*1024){ alert("Imagen muy grande. Máximo 5MB."); return; }
    const reader = new FileReader();
    reader.onload = function(ev){
      const dataUrl = ev.target.result;
      setPendingImg({ base64: dataUrl.split(",")[1], mediaType: file.type||"image/jpeg", dataUrl: dataUrl, name: file.name||"imagen.jpg" });
    };
    reader.readAsDataURL(file);
  }

  function handlePaste(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if(!items) return;
    for(var i=0; i<items.length; i++){
      if(items[i].type.startsWith("image/")){
        e.preventDefault();
        handleImageFile(items[i].getAsFile());
        return;
      }
    }
  }

  function handleDrop(e) {
    e.preventDefault();
    setDragOver(false);
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if(file) handleImageFile(file);
  }

  function handleDragOver(e) {
    e.preventDefault();
    setDragOver(true);
  }

  function handleDragLeave() {
    setDragOver(false);
  }

  async function confirmarCot() {
    if(!pendingCot) return;
    setCargando(true);
    try {
      const folio = "CAT-"+Math.random().toString(36).slice(2,8).toUpperCase();

      // Construir grupos desde el carrito
      var gruposCart = [];
      if(cart&&cart.length) {
        // Agrupar por nombre+color para crear grupos
        var grupoMap = {};
        cart.forEach(function(it){
          var key = (it.name||"")+"_"+(it.color||"");
          if(!grupoMap[key]) {
            grupoMap[key] = {
              nombre: (it.name||"Prenda")+(it.color?" — "+it.color:""),
              prendas: [],
              designs: [],
              precios_grupo: null,
            };
          }
          grupoMap[key].prendas.push({
            pid: it.pid||it.id||0,
            modelo: it.name||"",
            color: it.color||"",
            size: it.size||"",
            cantidad: it.qty||0,
            precioPropio: it.precio||it.desde||0,
          });
        });
        gruposCart = Object.values(grupoMap);
      }

      // Guardar cotización con estado "nueva"
      const { error } = await sbCat.from("cotizaciones").insert({
        folio: folio,
        tenant_id: TENANT_ID_CAT,
        cliente: {
          nombre: pendingCot.nombre||("Prospecto "+folio),
          empresa: pendingCot.empresa||"",
          tel: pendingCot.tel||"",
          email: pendingCot.email||""
        },
        estado: "nueva",
        notas: "📱 Solicitud desde el catálogo en línea:\n"+(pendingCot.notas||""),
        grupos: gruposCart,
        leida: false,
        fecha: new Date().toISOString(),
        total_piezas: cart ? cart.reduce(function(a,x){return a+(parseInt(x.qty)||0);},0) : 0,
      });
      if(error) throw error;

      // Guardar como prospecto en tabla clientes (tipo=prospecto, no cliente hasta que compre)
      sbCat.from("clientes").insert({
        tenant_id: TENANT_ID_CAT,
        nombre: pendingCot.nombre||("Prospecto "+folio),
        tel: pendingCot.tel||"",
        email: pendingCot.email||"",
        empresa: pendingCot.empresa||"",
        notas: "Cotización desde catálogo: "+folio+(pendingCot.notas?" | "+pendingCot.notas:""),
        tipo: "prospecto",
        tipo_cliente: "express",
        updated_at: new Date().toISOString(),
      }).then(function(){});

      // Registrar 1 consulta IA en ai_usage para este tenant
      var mes = new Date().toISOString().slice(0,7);
      sbCat.from("ai_usage").upsert({
        tenant_id: TENANT_ID_CAT,
        cotizacion_id: folio,
        mes: mes,
      }, {onConflict:"tenant_id,cotizacion_id"}).then(function(){});

      setPendingCot(null);

      // Mensaje de confirmación tipo ticket
      const confirmMsg = "|||COT_CONFIRMADA:"+JSON.stringify({folio:folio, nombre:pendingCot.nombre});
      setMsgs(function(prev){
        return prev.concat([{role:"assistant",content:confirmMsg}]);
      });

    } catch(e) {
      console.error("[LANA CHAT] Error en enviar:", e);
      setMsgs(function(prev){
        return prev.concat([{role:"assistant",content:(()=>{ var waLink=(()=>{ var wa=(iaConfig&&iaConfig.negocio&&(iaConfig.negocio.whatsapp||iaConfig.negocio.telefono))||""; var t=wa.replace(/\D/g,""); return t?"https://wa.me/"+(t.startsWith("52")?t:"52"+t):"https://wa.me/"; })(); return "Hubo un error de conexión. Por favor intenta enviar tu mensaje de nuevo 🔄\n\nSi el problema persiste, escríbenos por WhatsApp:\n👉 "+waLink; })()}]);
      });
    } finally {
      setCargando(false);
    }
  }
